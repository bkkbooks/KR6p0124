body:
  text: 醒迷歌五十章寫經壇中原作十四章與勸俗歌同例雜以里諺使上中下根皆易曉了原不敢瀆搢紳先生也越今二十年憫時局之阽危民心之乖離日甚因取舊稿稍稍潤色之併省為十章而增四十章於前以諷當路諸君子庶幾悔禍勿復執腐儒門戶之見為外道淵叢之毆衰病餘生見聞淺陋倘並世不乏有心人欲求其語趣別有經正民興説詳在卷附雖必為講學家所詬病亦不遑自恤焉佛教與儒教可以心理通言説皆應迹萬萬難強同門內巧推附門外醜抵攻何不將此心普入衆生中一遷殷動浮言先人作災福尋師視三軍亦云夢與卜人心有鬼神馭世微權託即此是教原一大事機熟二死生有其説鬼神有情狀合之以教民厚本而尊上一氣論屈伸喪祭等誣妄死則還太虗天民真逸蕩三授田復還田孅悉到餘夫民無甚貧富後世能也無相形豈不羡畏死忍須臾來生仗佛力此情其念諸四小學遍國中大學羅俊選王子齒庶人性善無貴賤此意一以亡入夢金人現咄哉本論篇道得祇一半五昌黎不知佛儒術見根本原道良相心蒼生要安穩野狐腥穢涎殷鑒況滋近不同門戶私爭勝弄唇吻六陳時觀民風納賈觀好惡四教亦非他當代之掌故榮古而陋今乃詫用行誤從此氓永斷入頭路七虞廷授受語仲尼祖述焉明稱亦以命何處益三言偽書巧回互突出拈花前從茲孔教外別有心法傳八華嚴四法界理事雙圓融體微用則顯不二台觀宗子思述祖德乃似他家風三身性道教枕祕將毋同九輶軒不采詩詩亡春秋作是是而非非凡以同惡欲五孝立大本天性無不足中庸擬華嚴兩經束高閣十大學明政本修治有次第物來心有知著力在誠意推之好惡同始能畏民志如何道闕訛支離乖大義十一三吳庶富教讓王開其先聖人稱至德難弟但中權同逃不同讚倘出莊列篇文身且斷髮抹殺三千年十二才窺少分禪舉出大頭話十年讀其書弗覺吁可怪淨宗道平常又怕齒牙挂知他何心行應示孔子戒十三才將佛字提元辨渺河漢離句絶百非怕落斷常見譬諸吾道傳開口説一貫手無一文錢何處用錢串十四即論一貫傳歸結民生重參乎説哀矜賜也歎綏動撰集多苦心兩語揭真種可憐七百年空談禪儱侗十五空談窺聖人大似霧中坐不見微子篇明白兩言我曰惟斯人徒曰無可不可推高而鑿深禍烈祖龍火十六空談道統傳無乃語顛倒不見堯曰篇從政有心要尊美首因民屏惡先不教四海倘困窮何畏儼然貌十七禍福由自召有時顛倒施不答南宮問知其所不知昨夜又明日正繫今日思誦言而忘味三生真我欺十八三生固茫然往生有誰見借問有生來可識厥初面匇匇數十年一瞥隙中電平心放下看無量光壽現十九孔子去文王五百有餘載黮黑頎而長琴罷宛然在現量難為言拈向指弦外且道觀佛門何故便驚怪二十聲音道最微恍惚中有像八變地示出六變天神降真言三密宗先梵一音暢同是譜宮商何泥文字相二十一五胡雲擾時性命爭呼吸大悲乘願輪異地並來集棲止視遠安去殺賴澄什洵知出世心總為度生急二十二歷代護法君往往在開國藉以維人心正史多諱飾性道駕空談興衰昧實迹溫公真我師斯言不可易二十三世祖建皇壇開國法輪轉勸善頒要言佛語選平淺語淺入人深樂與民同善一舉國本安百世廟謨遠二十四列聖承家法儒佛道並隆元旦祭堂子典禮天壇崇護持關至計出治民心同以平欲惡憾以濟刑賞窮二十五小民信因果正是向善機士夫鄙勿道反更斥其非魔民乘此隙引入岐中岐邪正不復辨厥咎將安歸二十六川楚用兵前疑謗法門少官紳多護持小民看樣好上下情既通魔説露形早硃批諭旨中成案可稽考二十七川楚用兵後粉飾稱太平諱邪為齋匪巨變至林清因咽而廢食疑謗益橫生前車不知鑒寇亂遂成二十八驅僧括寺田祖宗有明禁詔編會典中永遠著為令如何置罔聞違制絶窮命一罪百抄封此例誰家定二十九西人富強本護教順民心民心所信向不論其淺深今我患貧弱病本須推尋大醫王出世頂門先下針三十醫王莫遠求法會當今集狂禪及迂儒勸戒恩周洽硃批手親編切用成方恰庶幾勿愆忘遵守先皇法三十一右三十一章為疑謗者説此與下九章皆新增儒教莫講求佛教更何有西學人人談何者為綱紐民心日散離利器付誰手草年練水師可忍一回首三十二西方勝天堂娑婆有地獄充盡苦樂情萬化入爐槖無遮折攝門鬬諍恣蠻觸善導因所明乃讓泰西獨三十三美國阿爾君提倡佛正教風動遍四洲合建新旗號專電四百所日發令知報斯真菩薩心乘願再來到三十四賢哉各國王從民所欲惡初禁旋即開不忘佛囑付戒壇新戒多官長親送護鄰善民之望敢告我當路三十五英國李君言教必明生死因翻起信論勸進彼多士此亦乘願來開闡真如理可知公是非終古不能毀三十六西人開哲學各教加品題無緣而平等惟佛大慈悲餘教莫能外公論千古垂弭兵消劫運先兆其庶幾三十七衆行星繞日日行繞恆星恆星亦有繞終古常不停常動故常靜即此一念靈莫謂無淨土覺體包萬形三十八摩醯首羅天常為諸天主請佛轉法輪同脫五衰苦西教殆相沿數典而忘祖從今倘晤明五洲一佛土三十九儒佛兩大教中國人心同儒教賢智獨佛教愚賤通失之為顫獺得之即淵叢我歌當誰聽付之天下公四十右九章兼為外國人説我讀全藏文八千五百卷無非説衆生佛性本來善本善而皆修佛道原不遠奈何末法中卻受魔説轉四十一魔説卅餘種一樣敬三寶各自有祖師各自稱正道各自立名目暗號瞞人巧不佛亦不仙多道祕傳好四十二豈知佛正教如日當中天處處多照見那有祕密傳人人多有分那用出銀錢何不依佛説了此魔障纏四十三佛説十種仙三災終不免惟有佛淨土天人常充滿純陽與紫陽仙籍最名顯尚且樂皈依況在道根淺四十四佛説淨土教包括盡無餘十方大菩薩普賢與文殊馬鳴龍樹等一切聖賢徒尚且求往生況在凡夫愚四十五又説彌勒佛歷劫苦修行不聞無量壽終不斷死生可知三世佛多由念佛成彌勒尚稱重衆生豈可輕四十六佛説當來世一切經滅後大悲願力持獨留無量壽稱名求往生有願必成就舍此而不求諸佛不能救四十七如是佛正説供奉在內廷萬善殿常諷無量壽佛經維皇誠感格福國佑生靈維皇宏護意我儕當敬聽四十八宏護恩已深更使魔歸化髮逆甫蕩平減賦詔隨下國恩佛恩深難報敢言謝安分念彌陀肝膽共傾瀉四十九如何念彌陀彌陀正相望釋迦久涅槃彌勒未下降賴有此法門現在作倚杖請看摩崖經相勸歌更唱五十右十章為歧誤者説勸俗歌五十章佛法無量門總門歸淨土釋迦為本師彌陀為教主稱讚六方同攝受三根普所以一聲佛獨留萬萬古一淨土今何在今現在西方西方原不遠來路爾自忘爾忘勸爾記彌陀大願王歷劫有宏誓導爾還故鄉二右二章淨土總綱法華經中言大通智勝佛發心出家時捐去國王職王子十六人同修佛功德第九即彌陀成就極樂國三悲華經中言無諍念輪王見佛發大心莊嚴淨道場親蒙佛授記作佛在西方輪王即彌陀國名安樂四出生菩薩經輪王名持火太子勝功德童年信因果棄俗作沙門勤修不退惰太子即彌陀修成識故我五又説光明王太子年十六聞説陀羅尼七萬世修福皈依舍利弗精進不睡宿太子即彌陀歷劫因果熟六方等總持經無垢𦦨如來當其説法時僧衆繞蓮臺一僧號淨名通經萬法該淨名即彌陀蓮華結聖胎七賢劫經中説雲雷佛化導爾時有王子名為淨福報供養諸如來宏揚佛經奧淨福即彌陀多生修得到八過去世無量精進佛陀耶力宏法化日國王名德花聞法證三昧修道而出家德花即彌陀賢劫説無差九彼經又宣説佛號金龍光時有一法師寶音震十方力宏佛經教苦海作慈航法師即彌陀樂土在西方十無量法門經國王名勝威供養師子佛尊重而皈依常修禪定行念佛絶百非勝威即彌陀光明萬古輝十一成利惠如來寶積經中記爾時有國王皈佛名焰意與太子同修珍寶多捐棄𦦨意是彌陀釋迦即王嗣十二智印經中説然燈佛以前有佛號月髻度衆生無邊時有惠起王修善種福田成佛即彌陀惠起證夙緣十三賴叱和羅經有德光太子王名額真無天親樂依止不起五欲貪同得如來髓太子即釋迦國王彌陀是十四法炬陀羅尼山上佛滅時菩薩號明相建塔如須彌塔中供舍利永作天人師明相即彌陀密部勸受持十五謗佛經曾説國王名月得供養辨積師獲陀羅尼力竭誠七日中成就多福德月得王非他即今彌陀佛十六耆年號首達釋迦夙世因維先年少者教化六萬人首達謗維先地獄受沈淪維先即彌陀佛説生經云十七觀佛三昧經有四僧同住不得見空王煩惱覆心故諸天令念佛四僧皆得度前生阿彌陀當其第三數十八鼓音王經説彌陀眷屬全父號月上王母名殊勝顏太子號月明弟子集羣賢永離胞胎穢同生七寶蓮十九如上諸經文釋迦金口授乃知阿彌陀萬德莊嚴就無央數劫來聖果證無漏故號無量光又名無量壽二十右十八章衆經説彌陀夙因即此無量光衆生障耳目即此無量壽衆生局軀壳諸佛觀衆生誰餘誰不足不修生娑婆修之生極樂二十一因之佛又説無量壽專經專談阿彌陀成佛之一生本居國王位出家慕修行其名曰法藏古佛為證明二十二古佛號為誰世自在王是法藏見佛時心生大歡喜頓發六八願願願度生死皆順衆生心滿願而後已二十三衆生心欲壽淨土壽命長衆生心欲富淨土七寶莊衆生欲清淨託質蓮華房衆生欲尊貴妙相金輪王二十四天膳及天衣天華并天樂園池鳴仙禽快心悅耳目同會上善人團圞多眷屬經法到處聞神通自在足二十五右五章大本説彌陀本願如是大願王盡滿衆生願衆生願往生稱名可操券因復説小本發願三番勸更為説觀經勸信令親見二十六乃知極樂國不同幻化城彌陀修歷劫衆生修一生譬如祖父業子孫享現成善感而善應祇在一念誠二十七念誠亦非難難在牢牢記一聲阿彌陀管束身口意善則與佛同惡則與佛異善惡心自知此是真實際二十八是故念彌陀先當孝雙親雙親即活佛供養及生存親喜佛亦喜親瞋佛亦瞋經中言孝養往生植正因二十九是故念彌陀皆當敬君長及時完錢糧莫存推諉想國豐民自安大本經中講粒米見至心當作佛供養三十是故念彌陀在家勝出家衆生尚普度何況妻子耶妻是蓮花葉子是蓮花芽隨緣消宿業依經自無差三十一是故念彌陀弟兄要和睦本是同根生同在佛心腹俗眼同路人佛眼同骨肉依經勿欺侵同向蓮胎託三十二是故念彌陀親友莫拋疏有緣幸相識緩急當招呼牡丹花雖好全仗緑葉扶依經戒欺誑即此是工夫三十三是故念彌陀無須諱生死怕死求長生邪魔從此起為善更念佛念念常歡喜臨終決定來華臺迎接你三十四是故念彌陀錢財莫貪多便宜在自己喫虧即在他平心安分過勤儉補蹉跎厚己而爭利大本經中訶三十五是故念彌陀不礙家務紛念佛愈純熟作務愈精勤遊蕩敗家子訶斥在經文佛法通世法本來無可分三十六是故念彌陀老實為第一唆訟搬是非不但傷陰騭一字入公門九牛拔不出王法當畏懼大本經中述三十七是故念彌陀有過即當改明知而過犯加倍沈苦海五惡五痛燒依經常懺悔懺悔求往生佛垂金臂待三十八是故念彌陀在家律弗深戒殺食五淨戒盜戒邪淫酗酒大妄語一一戒從今前迷概勿論還復清淨心三十九是故念彌陀平常勿揑怪彌陀與衆生祇説家常話但除煩惱心了却輪回債一生便成佛還要如何快四十是故念彌陀名為易行道單提一念心一切皆包掃根弗論利鈍數弗計多少至心十念稱彌陀誓擔保四十一右十六章決正念佛法門是故念彌陀妙有即真空雕塑及彩畫皆與法身同佛既無不在豈獨離像中癡人怕著相反落空魔宮四十二是故念彌陀即是無上禪大集經中説誰敢道不然散心同一心至頓且至圓塵勞無障礙淤泥出青蓮四十三是故念彌陀即是多善根即為多福德古本有明文臨終佛來接慈悲加佑恩令心不散亂往生隨至尊四十四是故念彌陀即入大願門譬如願則嚏俗語詩亦云我願應佛願願願相注存時至覿面現生佛本同根四十五是故念彌陀即是彌陀靈彌陀本願説十方知我名今此願已應豈不願願成一應自百應求生決定生四十六云何求生者但執持名號三身十界通萬德一聲召譬如遙喚人全體心心照易知而易行聲到心自到四十七云何決定生全仗佛功德如寒定須依如飢定須食非關喫著能米漲綿溫力莫執心性談心性但理即四十八理即説惟心惟心量無邊理即説自性自性萬德全非謂無佛土豁達墮狂禪心佛生平等真實常通圓四十九圓常通真實真實斯元妙説法卌九年於此握樞要出世達心源入世扶王教所以能獨留普為當來告五十右九章結歎念佛功德往生公據述意昔人謂淨土法門於在家尤為切要旨深哉斯言於無量壽經徵之矣經言三輩往生皆以發菩提心一向專念為正行修諸功德萬行回向為助行其所謂修不外有為事相且廣談世諦歸重人倫日用前後反覆至二千餘言直令行者即世間法成出世法何則本以一念流動現諸有為迹象還以一念回向發願攝歸本際則全體大用觸境圓彰不墮偏小是真就路還家至極直捷普收羣機而無外者也故自東林蓮社開先至今綿歷千五百餘載搢縉士大夫下至傭奴販婦屠沽雜流躡迹往生於劉張宗雷諸賢之後者代不乏人本朝名臣若張蘭渚宿將若金光前通儒耆德若周安士彭二林諸先生類皆不捨塵勞脫然西邁事迹尤著而我世宗憲皇帝以天縱神聖激揚宗乘御選語録亦深契雲棲列聖奎章咸贊極樂至會典垂法萬世且奉斯經為中正殿僧徒日課定制而歲時大內諸佛事亦多用之蓋三古以降帝王導俗之微權盡未來際衆生成佛之慧命胥於是乎在慧遠法師所謂適俗固是教源濟俗亦為要務良不虗也比來法運中衰迂儒狂禪堅固鬬諍宗教律儀罔弗訛替魔伺其便邪説橫行僅此真俗不二圓融無礙法門張皇支搘於其間亦復若存若亡不絶如線吾儕幸沐聖化薄植信根將欲報佛深恩護世眼目赤骨擔荷今正其時若乃沈空滯寂高談性天舍此現前一念平實心地法門謂為別有則離經畔道上負列聖提持之深心而自招疑謗法門之懼亦世道之憂曩歲感憤發願探本斯經述報恩論若干篇以顯正教翊皇度息鬬辨破邪外都凡二萬餘言粗舉綱要香巖息庵兩君讀而善焉為之評點流通屬更備其章條以貽同志爰復廣甄教典辨異統同演列五門為日課表首信願根本門次正行莊嚴門次助行回向門次戒行培護門次方便憶持門門若干條別為詮釋使上中下根境緣違順柔強秉異廣略好殊皆得據依以自考驗因取坡公語名之曰往生公據與見聞隨喜共證明焉勉矣行人資糧已具到家消息不離途中他日一笑歸來留此數百十番故紙以當遊記舉似諸方其不虗此娑婆之行多生之本願也哉庚辰春日善登謹識往生公據往生公據淨課日單橫排十日直立五門每門略開禮誦等條行者各量日力或專或兼或多或少隨條記數如別有所課則於後列空條下記之每屆月終彚集所記填入月單若干紙一於佛前焚化發願求生極樂一附日單後餘送諸同願互相考校並為焚化發願同生極樂滿一年後次年正月再集上年逐月所記填入年單若干紙如月單例並加送諸同學各一紙留為將來往生證驗傳記張本如是通年日單三十六紙月單十二紙年單一紙共四十九紙閏月多四紙合成一册行者留存隨時自考臨終焚化昔東坡居士繪阿彌陀佛像謂是往生西方公據今此單日日自記有據月月佛前證明有據同學互校有據年年彚總白佛有據白衆存驗有據真可謂大公無私真慂實據矣諸欲往生者不必問臨終感應之如何第於此自信可以對佛可以對衆則執此以往可也首信願根本門者信彌陀願力不可思議故十念決定得生信淨土法門一切圓融故世法決定不廢願修持十念以顯佛力令衆生同入淨宗願不捨世法以證佛法令衆生同開圓解必如是乃為自他兼利菩薩發心然後一切正行無非莊嚴一切助行皆可回向而往生有根本矣十念為淨宗最深密義能信受者乃入願門故慈雲幽溪楚石堅密諸祖師皆於常課外終身力行並以勸衆今以晨起及臨睡兩時為極少之定課或量力酌加或為雜緣所牽不及照常記數念佛即多加若干時逐一記之不廢世法乃真佛法大本經勸修五大善二千餘言悉是世法今以三條約之一重倫紀如家門雍睦一無間言可逐日記之如承事親長躬執勞役侍疾居喪竭誠盡力及料理親族戚友醫藥婚喪等大事乃至消釋嫌疑規過勸善等均逐事記之二畏王法如勸息諍訟遵完國課等亦逐事記之三勤生業如安分營生終日不間宕不偷懶可逐日記之三者皆本分內事所謂庸行故但記一事一日云云不必著明何事二正行莊嚴門者以本宗諸行莊嚴此信願根本也十念之外專一持名勿夾雜觀想參究亦勿論散心一心但出口入耳聲聲記數各量日力寧少念而有恆勿貪多而費事如有餘力多念歸入加課記之所列各條略以前後分緩急如不能宏利即但經呪不能經呪即但懺禮不能懺禮即但念佛又如不能禮願即但禮懺乃至但禮三聖不能誦大本全經即但發願章乃至但誦小本總之各隨境遇及所信樂量力勤行但能外不廢事內不偷安即是當日圓滿莊嚴不在乎行之多少也宏法如校刊著述施送一切藏經善書及於三寶門中一切護持修建供養莊嚴之事乃至為人講説隨緣勸誡等利生如賑濟飢寒放生薦亡若追薦五服親屬及宗族戚友等應記重倫紀條下及一切利人利物之事乃至隨手方便隨口勸讚等皆不論其事之大小及其已竟未竟已成未成但本日曾費心力即記之此兩條皆陰德不可宣露故亦但記數不著何項三助行回向門者以餘宗一切善法回向此信願根本也三藏經典皆可回向今專取世所信樂而又合於淨土願門者列之行願品普賢願王導歸極樂藥師經仗彼佛本願送往西方普門勢至二經顯菩薩願力攝受行人大悲準提兩呪令行人滿願往詣淨土而穢迹為本師大願化身金剛護持正法摧滅一切邪魔穢惡悉變清淨於末法時在家菩薩道場尤切要焉此門各條先經呪後禮拜與正行門不同者緣既為助行行者自以餘力及之無分緩急餘如儒門格言善書醫方算術道家道德經感應篇及至斗懺雷經文帝武帝純陽紫陽勸善諸文凡平實切近有裨世法不謗佛法者苟所素習不忍捨棄但以念佛為本勿論深淺雅俗皆可回向惟除修煉精氣遣召鬼神一切丹經符籙等術即確有真傳心得亦必割愛方是正知正見深入淨宗四戒行培護門者梵網經云戒為諸佛本原菩薩種子此專指聖道門而言也淨土門則以信願為根本故大本經言雖不能大精進持禁戒要當作善蓋根本既立還以五戒十善培養之防護之使日生日長有進無退也諸惡悉從邪見起故淨土諸經皆但言臨終感佛來迎不許現生空談妙悟行者若稍存元妙見解及希望奇感捷應之心即是違背教理生大邪見障往生路故應首戒諸戒勿論已受未受曾犯不犯行者既依上來三門求生極樂則佛前求懺後但自謹飭將來不可空悔已往自生疑障且在家五戒本寬但制粗述惟殺戒必應嚴細雖蠅蚊蟣蝨等微命亦不得殺當知物我一體斷無令物慘死而自得樂生之理故與邪見戒並重特列專條逐日檢點餘四戒寬嚴粗細或具或不具量力自勉可也持齋不必論功德現獲三種利益一斷殺緣二免穢濁三省費用然在家必不能終身長齋佛制有不見殺不聞殺不為己殺及物自死鳥獸殘等為五淨肉可食又正五九月為四天王巡察人間善惡名三長齋月見梵網經誦此經者應持初八十四十五草三草九三十為龍樹菩薩六齋修淨業者應持加初一十八草四草八為金剛十齋又為準提齋持此二呪者應持他如諸佛菩薩蓮宗諸祖誕日及天赦天願等日均宜齋素各隨心願多多益善佛制已受戒者當於望日晦日誦梵網經若不誦者非菩薩非佛種子然十重戒實人人所當力持即當常誦不嫌盜法遺教經略説戒相為本師臨入涅槃最後教誨無量悲心言盡於此知有佛法者皆應持誦無分道俗也此門實各條並重其先後次序為欲方便勸誘中下根耳五方便憶持門者如上世出世間一切善法行者既隨分酌取日有常課自入彌陀大願門矣還當隨緣進止方便安心使常與不常不離念佛方可一無違礙從容到家如為宏法利生等事及重倫紀條下等事以致間輟一時多時一日多日不能禮誦乃至不能念佛及應齋不齋而僅持十念者於為法方便條下記之如為客中主伴異見生嫌恐他謗佛而間輟僅持十念者於護嫌方便條下記之如為公私急務賓朋往來應接不暇而間輟僅持十念者於隨順方便條下記之至於病困之中顛沛之際禮誦固所不能念佛正當著力設實身心危殆不得自由亦可僅持十念於調伏方便條下記之當知此四方便正為萬不得已而心常憶持故不為退惰又當知記此一時隨緣之方便正以勤䇿終身不變之有常故不為退惰也淨課月單每屆月終彚集所記日課隨條填入先以一紙佛前焚化發願再填若干紙分送同願彼此互易以相考校並各於佛前代化發願同生極樂婦女則令家屬出名代送不得自通單末填明某某眷屬字樣否則不收一寸時光一寸命光諸同學但日自檢點信願真切否諸戒不犯否淨課不退否孝養無缺否家門和順否國課遵完否如是自心自問或生歡喜或生慚愧便是佛光加被性地開明不必頻相往來向人討消息尤不可集會禮誦致多雜緣間費翻招疑謗淨侶難得氣類難齊苟非彼此熟識勿相送單至方外自有同參雖或相識亦勿攀引單到不收送單專為互相警䇿一切人事應酬向無者不必因此而有向薄者不必因此而厚惟生死事大如本人生日或父母生日子女彌月則各為念佛或念消災延壽藥師佛喪事則加經呪懺等各隨心願皆自於佛前回向發願不得會集道場亦不得到本家禮誦初次送單各置一册記明各人十念佛號兩條各若干數倘後單到數缺而四方便條並無所記則是無故退惰即各於佛前發願願以日課若干回施其人䇿其精進如是歷三月不改不復答單改後再答修世善法歸重倫紀經有明文如或過誤同學交深者應隨時善巧規勸並於佛前代為求懺交淺者則但求懺亦三月為限如上條單上作阿彌陀佛攝受接引像者明所記各課一一皆自心光與彼佛光互攝互入無間無漏故填單時當作必蒙證明想發殷重心下作僧相者明當人身在娑婆此心早歸極樂他日往生不論道俗男女皆具足大丈夫相法衣被體故化單時當作決定得生想發歡喜心彌陀願力如是應同信受也伏讀會典詳載大內供奉佛菩薩像及一切典禮備極尊崇而定制萬善殿僧衆日課尤以大本無量壽經為最多仰見列聖提持至意實統世出世間道法一貫諸同學幸沐聖化獲聞斯經國恩佛恩應早圖報爰據教理公議規條附列單首庶幾日省月察常共遵循盡此一生同歸極樂月單於上端年字下填寫某月字年單於年字下分字上填寫全年字佛説阿彌陀經禮想儀願此香煙雲遍滿十方界供養一切佛阿彌陀世尊當來獨留經世間難信法觀音與勢至及諸上善人普熏諸衆生皆發菩提心一心頂禮娑婆世界五濁惡世説難信法本師釋迦牟尼佛一一心頂禮四維上下世界稱讚本師説難信法恆河沙數諸佛二一心頂禮東方世界出廣長舌勸發正信護念持名恆河沙數諸佛三一心頂禮南方世界出廣長舌勸發正信護念持名恆河沙數諸佛四一心頂禮西方世界出廣長舌勸發正信護念持名恆河沙數諸佛五一心頂禮北方世界出廣長舌勸發正信護念持名恆河沙數諸佛六一心頂禮下方世界出廣長舌勸發正信護念持名恆河沙數諸佛七一心頂禮上方世界出廣長舌勸發正信護念持名恆河沙數諸佛八一心頂禮西方極樂世界成佛至今現在説法阿彌陀佛九一心頂禮西方極樂世界神通變化寶樹靈禽宣流法音阿彌陀佛十一心頂禮西方極樂世界光明普照念佛衆生阿彌陀佛十一一心頂禮西方極樂世界十劫成佛壽命無量名稱普聞阿彌陀佛十二一心頂禮西方極樂世界攝受持名臨終現前慈悲加祐令心不亂接引往生阿彌陀佛三稱三拜十三十四十五一心頂禮西方極樂世界大願攝持已今當願皆得不退阿耨菩提應願往生阿彌陀佛十六一心頂禮西方極樂世界阿彌陀佛所説經法及此娑婆世界當來獨留稱讚不可思議功德一切諸佛所護念經十七一心頂禮西方極樂世界寶欄楯邊寶羅網下寶行樹間具受諸樂一切菩薩摩訶薩十八一心頂禮西方極樂世界蓮華池內寶樓閣中一切菩薩摩訶薩十九一心頂禮西方極樂世界黃金地上盛華供佛一切菩薩摩訶薩二十一心頂禮西方極樂世界靈鳥樹下聞音正念一切菩薩摩訶薩二十一一心頂禮西方極樂世界阿羅漢果聲聞弟子及諸菩薩摩訶薩二十二一心頂禮西方極樂世界觀音勢至一生補處諸上善人菩薩摩訶薩二十三一心頂禮文殊彌勒諸大菩薩舍利弗等諸大弟子及無量諸天一切聖衆二十四一心頂禮結集流通迦葉阿難舍利弗等諸大比邱護法天人一切聖衆二十五禮經必二十五拜令經文完全若作禮懺用則除去末一拜緣懺須發願恭對三寶與禮經不同故不必觀想流通分也禮二十四拜後接唱慈雲懺主懺願原文謹附於後右參酌堅密大師及玉峯師所輯本據經增損使廣略適宜約有六善一顯彌陀三身謂第九為報身第十為化身第十一十二為法身第十三為應身亦即報即法即化也二顯諸佛接物俱有四益彌陀獨多名號一益謂第九説法為聲益第十變化為神通益第十一光明為光益第十三現前接引為身益而第十二壽命為名益以大本直稱無量壽佛觀經下品下生文中亦明云應稱無量壽佛也所以者何猶之光壽同是法身而壽可賅光光不可賅壽故無量壽為通稱也三散心一心皆得往生彌陀本願如是大本及觀經具有明文而本經結重亦全在此故特據唐譯本慈悲加祐令心不亂二句增入禮想以釋行者自疑令平日熟習臨終任運往生感應倍捷也四種種依報莊嚴據經撮略次第唱念令觀想易熟倍生殷重宛似神遊又令不能讀經者不啻全讀讀而不解者亦漸能解也五不依懺法常儀兼及十方三世三寶顯極樂淨土即賅恆真淨土極樂世界圓攝華藏世界亦令行者專想易成也六據大本增入當來獨留此經又據賢護經增入彌陀所説經法以大本雖據當經而宗旨歸重一向專念正與此經同其力用賢護明載彌陀法語亦正此經現在説法之證也以上六者在兩師本或顯或隱且一則令行人拜時廣想種種依正莊嚴似非初學雜亂垢心所能猝辦一則令拜時但想經文以代妙觀似較簡易而文句長短不齊前後顛倒不全恐亦難為通軌今盡取什師奘師兩譯本並大本經種種依正𭬚括綱要為句令拜時曼聲唱念隨聲入觀則觀拜會一身心會一並向來常儀能禮所禮性空寂等句亦不必更舉似較簡捷圓融日課單中有禮經一條特擬此公諸同好又培護門中特提殺戒最重故并擬懺願偈一章附後戒殺懺願偈稽首本師釋迦佛西方阿彌陀世尊稽首淨土修多羅諸佛本源毗尼藏稽首清淨海會衆願同攝受我今願我聞無量壽經言諸欲往生極樂者雖不能大精進戒要當作善首戒殺又聞觀經九品章慈心不殺是諸戒及與回向發願心皆得上品上生記又聞在家五戒相能淨一戒即生天若回天業求淨土應願往生蒙接引因茲發願依教持第一殺戒期嚴淨等慈一切衆生類常勤救護令安穩復依在家修齋法內量身力外護嫌或正五九月長齋或六齋與十齋等餘日但食九淨肉獸毛蠶吐衣亦淨更依龍舒懺願法日課加持佛名號若經若呪若禮懺回施所食所衣衆及一切時一切處不見不聞誤殺者願悉承斯懺願力多生殺因緣業果盡此一報償無餘先我往生安樂剎當來同我上善會亦同我願入娑婆廣宣如是戒功德莊嚴我佛大願海令諸有情咸發心以慈忍力證淨樂如是一念戒光明畢竟無作無受者三寶一體自證知決定現生滿我願附録慈雲懺主懺願文禮拜已兩膝跪地執手爐燒香至誠而唱是言我今普為四恩三有法界衆生悉願斷除三障歸命懺悔起禮復跪執手爐云至心懺悔我弟子某某及法界衆生從無始世來無明所覆顛倒迷惑而由六根三業習不善法廣造十惡及五無間一切衆罪無量無邊説不可盡十方諸佛常在世間法音不絶妙香充塞法味盈空放淨光明照觸一切常住妙理遍滿虗空我無始來六根內盲三業昏暗不見不聞不覺不知以是因緣長流生死經歷惡道百千萬劫永無出期經云毗盧遮那遍一切處其佛所住名常寂光是故當知一切諸法無非佛法而我不了隨無明流是則於菩提中見不清淨於解脫中而起纏縛今始覺悟今始改悔奉對諸佛彌陀世尊發露懺悔當令我與法界衆生三業六根無始所作現作當作自作教他見聞隨喜若憶不憶若識不識若疑不疑若覆若露一切重罪畢竟清淨我懺悔已六根三業淨無瑕纍所修善根悉亦清淨皆悉回向莊嚴淨土普與衆生同生安養願阿彌陀佛常來護持令我善根現前增進不失淨因臨命終時身心正念視聽分明面奉彌陀與諸聖衆手執華臺接引於我一剎那頃生在佛前具菩薩道廣度衆生同成種智起云懺悔發願已歸命禮阿彌陀佛及一切三寶一拜次旋繞法或三匝或七匝乃至多匝如是稱念隨意隨匝不拘遍數稱云南無阿彌陀佛南無觀世音菩薩南無大勢至菩薩南無清淨大海衆菩薩摩訶薩自歸於佛當願衆生紹隆佛種發無上意拜三歸遵華嚴淨行品自歸於法當願衆生深入經藏智慧如海拜原文自歸於僧當願衆生統理大衆一切無礙拜附一法治四病説改正玉峯師作原名四大要訣念佛有四種病一貪靜境二參是誰三憂妄想四求一心惟以一法治之曰出聲記數而已出聲記數之法無他巧妙只要信深願切每日限定多少數開口散念終身不改久而久之自知不可貪靜境不可參是誰不可憂妄想不可求一心四病盡除而往生可決矣當知每日限定多少數開口散念終身不改即是信深願切信深願切即是至心信樂至心信樂即是阿彌陀佛四十八願中喫緊為人語既合阿彌陀佛之願即報阿彌陀佛之恩而釋迦本師惡世説法之恩六方諸佛勸讚護念之恩亦無不報矣所以決定往生也若無此一法便生四種病一貪靜境必以清坐頑定為奇特極力持名為平常一參是誰必以依稀解悟為奇特憶佛念佛為平常一憂妄想必以權巧強制為奇特老實記數為平常一求一心必以泯默無記為奇特開口散念為平常以邪為正以正為邪豈不顛倒之甚此四種病究其根源前二由於混濫禪宗後二由於誤會本宗故稍或犯之必難往生今逐一詳辨如左一不可貪靜境者靜境是四禪八定偏小之法念佛人貪之即是背大向小捨妙有之用取偏空之體何足為奇譬如死水不能藏龍若是大乘境界全體大用正在一句彌陀活潑潑處譬如大海神龍出沒教理分明無庸更辨每聞他師於念佛止靜時開示云此是好消息各人要仔細看看腳跟未穩者以為奇特便捨却阿彌陀佛向鬼窟裏作活計香又坐不來佛又念不起真是可憐生多日念佛不説其功暫時養靜稱好消息豈不大違經中執持名號憶佛念佛之旨夫念佛止靜者譬如行路時長力倦暫歇而已若當作好消息豈正當念時反是惡消息乎如此開示不但辜負彌陀慈父在蓮花上日日望汝之恩且非禪非淨二門俱破真實可悲可痛將萬修萬人去之勝異門翻作銅牀并鐵柱之黑暗門矣故余嘗有偈云仔細看一看已隔千萬山不如老實念恰恰是真參今更續四句以明之曰稱名為動清坐為靜捨動取靜墮坑落穽二不可參是誰者經云是心作佛是心是佛可見念佛人分明以我自己本來之心念西方阿彌陀佛仗西方阿彌陀佛顯我自己本來之心念念是我心向佛念念是佛向我心心佛宛然心佛一體感應道交不可思議故要解云離卻現前一念無量光壽之心何處有阿彌陀佛名號而離却阿彌陀佛名號何由徹證現前一念無量光壽之心也若念佛時更參是誰即是頭上安頭騎驢覓驢故靈峯大師呵云以參話為奇特念佛為平常棄如意珠王競取瓦礫可哀矣堅密大師亦云劫濁盛時衆生垢重無以持名雜參話雜參話則濁智騰波定起邪見又云淨土必不可入禪機意見稍乖二門俱破此皆二大祖師父子相傳的的宗旨若不聽受即是信不深願不切縱使日日念刻刻參亦不得往生何以故念分兩頭故與佛本願不相應故也每聞他師將一箇誰字話頭破卻我佛徹底悲心所説執持名號之大方便法門害人參又參不到念又念不起假饒參得到還是守尸鬼緣不見彌陀徒然發狂慧不如不參者念念知慚愧奉勸發心念佛人吝遵二大祖師之訓勿稍疑惑當知念佛法門乃是以他佛名顯自心體他與自佛與心名與體正同一東一西兩面相對中間一條直路並無絲毫灣曲斷著不得絲毫巧見故幽溪大師云瓊林玉沼直顯於心源是從彼一面直透此一面之謂也徹悟大師云能於念念中頓契靈源直趣覺海是從此一面直達彼一面之謂也故念佛時祇須直心直意一直念去不可更問是誰不是誰反成迂曲他師教人參念佛是誰者亦非杜撰乃因禪宗本有參誰字話頭法門不論行住坐臥一舉一動皆令自看是誰後來學者參不得力或兼學念佛或竟改念佛彼宗師匠乃不得已勸令更看念佛是誰此實曲為彼宗之善巧方便意在化淨為禪並非淨宗本旨故淨土諸經及蓮宗諸祖之書皆無此説惟雲棲大師兼采之而靈峯父子終不以為然也今恐他師自亦不知此説所由來將謂淨宗本旨如此致成鬬諍故不憚苦口痛辨之而復括以偈曰念佛為直參誰為曲捨直取曲瞎人天目三不可憂妄想者妄想是意地之法果位聖人尚難除斷何況凡夫故直指云能運身口之念無論其散但不間斷自能一心亦可即名一心惟行之不休為度固不必憂散亂矣夫出聲持名即口業清淨手珠記數即身業清淨深信切願求得往生即意業清淨的的確確是三業清淨至圓頓至直捷之大法門也故善導永明極重記數古稱二祖皆彌陀化身決定可憑當知持名法門功重帶惑位重橫超六方諸佛釋迦本師極口勸信悉皆為此總仗彌陀大願普收故也末世衆生障重心亂欲向今生脫苦捨記數持名一法決定無門其餘竪出三界之法必須斷盡無明業惑方了生死禪宗所謂毫𨤲繫念三途業因自力難成故也曾見他師輕念佛人云汝念佛時若有妄想定然無用其人不能答余恐其被惑因問云汝不念佛有妄想否答無妄想又問云汝不念佛既無妄想當有何用亦不能答因復告之云雖無妄想而不念佛實無可用譬如黑夜中無浮雲亦無明月必無所用念佛人有妄想實有大用譬如白日中太陽熾盛雖有浮雲重重亦不礙陽光普照令大地人皆得受用故靈峯云深信切願念佛而念佛時心多妄想者即是下品下生雖是下品亦不礙與諸上善人俱會一處同受法樂豈非大用故余又嘗有偈云彌陀一句法中王雜念紛紛也不妨萬里浮雲遮赫日人間處處有餘光又云散亂持名大有功幽途蒙照悉皆通莫令佛日西山落那怕迷雲百萬重故知多妄想人肯記數念佛者定是信願堅固決定往生以其即是多善根多福德之大因緣也不念佛者説無妄想不是無妄想實在通身是妄想自不覺耳縱使真無妄想而坐在無事甲裏轉身不來出身不得亦禪家所謂立地死漢耳縱使由此無妄想境界漸入九次第定居然能坐脫立亡亦教家所謂不回心鈍阿羅耳何足貴哉總緣彌陀經中一心不亂四字今人錯會不少致念佛退息者多經意只要專意持名不被貪嗔等所亂即是一心不亂並不教人斷盡妄想方名一心不亂若斷盡妄想判位已是大阿羅漢千古以來諸大祖師能有幾人到此地位然多有往生者全仗平日信願堅固念念不退合佛本願被蒙攝受故也智者大師即其明證位登五品帶惑可知何況今時之人業障越重功行越淺豈能斷盡妄想普賢菩薩教人發願願我臨終盡除障礙慈雲大師教人發願願命終時心不倒散此皆平時念佛不求無妄想之明證也今人何故不肯勸人先多念佛偏要逼人先除妄想認頭作尾認尾作頭顛倒之甚矣經云汝若不能念彼佛者應稱阿彌陀佛如是至心令聲不絶具足十念即得往生夫心不能念即是散亂之極口稱十念得生即是帶惑往生故西齋下品下生詩云一旦魂飛心散亂十稱佛號罪消鎔金蓮鑠鑠如初日當念西升極樂宮又經云末法億億人修行罕一得道唯依念佛皆得度脫末法億億人修行罕一得道者即是今時妄想紛紛之人也唯依念佛皆得度脫者即是帶惑往生也若是定要斷盡妄想方名一心不亂方得往生且道如何融會可知末世衆生業障越重此法度世功德越顯乃全仗彌陀大願加被帶惑得生故也亦因衆生與彌陀結緣已深故也奉勸有緣之士立決定志記數持名莫管妄想不妄想當知修行法門有橫有竪餘宗竪出斷妄方成淨土橫超帶惑可至故不論散亂多少只要信深願切決定往生普望諦聽不疑繫以偈曰帶惑為橫斷妄為竪捨橫取竪彌陀呌苦四不可求一心者疑問曰一心不亂是彌陀經所説開口散念是祖師所呵何謂以邪為正以正為邪耶答曰可惜汝未曾久常念佛若久常念佛自知一心不亂定從散念做成若不先重散念焉能成就一心譬如儒士必先讀書然後能成文章今責人先成文章而不許先讀書豈非以邪為正以正為邪乎又譬如一切技藝從生至熟乃至熟能生巧無不皆從肯學而成今不肯學散念記數何能便成一心不亂乎且所謂不可求一心者非余杜撰也上條所舉直指之説即是此意其曰無論其散但不間斷自能一心者正謂欲求一心必先散念由散漸一自然而然不可遽求其一亦斷不能強求其一也又曰亦可即明一心惟行之不休為度固不必憂散亂者正謂一心甚難而能不畏其難日日定課散念至死方休則即此不畏難一之心先已歸一故雖未實到一心亦可名一心也當知此乃妙叶法師透徹淨宗普收九品圓極之談喫緊全在但不間斷行之不休為度兩句若非信深願切必不能無間無休果能無間無休則念念之間多散者自必漸少少散者自必漸一原非謂全不用心隨口呌喚也願深思之願深思之每聞他師先將一心不亂四字打退多少信心學者都説今生做不到西方也不想甚或怕開口之易散而用力默努致成病痛或昏沈成片墮入無記而誤認為心空境界總由説法不知難易故也用敢不惜話墮復説偈以救正之曰散念為易一心為難捨易取難過頭狂談大衆倘能不棄我語惟願同除四病同學善導永明記數之樣每日或千或萬多至數萬盡力行之必定往生古崑為感衆友極力護持得滿摩崖經及種種心願乃成此篇以暢破病之志故於光緒七年秋日在護國寺彌陀關中敬然臂香四十八炷供養阿彌陀佛至心發願願我一卷苦書竪窮橫遍不絶滅我多生罪愆斷人四種疑惑人人依此修行箇箇同生極樂改定僧玉峯摩崖圓滿白衆偈光緒三年秋般若庵妙然法師擬刻阿彌陀經石本商之衆善信皆曰不如摩崖遂於是冬卜地杭州錢唐門外碁盤山發心創募次年二月佛涅槃日沈覺塵居士與張常惺等四居士結壇蘇州鄧尉聖恩寺念佛許靈虗居士助緣外護沈居士長跪寫經口不絶念字字頂禮閲三七日寫畢復如法寫楞嚴經大勢至菩薩圓通章並著報恩論二萬餘言至四月佛降生日一切圓滿先後五十三晝夜中佛聲浩浩無一息之停而一壇主伴祇有五人輪轉精進無病無惱實為世間甚難希有之事若非精誠所結蒙佛如被焉能及此爾時妙然法師因冬春間募緣開山奔走風雪中感病垂危久矣自知不起惟竭力念佛祝願此事之必成適於三月初六本經寫成日安詳西歸若非法師願力與彌陀願力感通攝持又焉能遠隔四百餘里而冥契若此可見此事之關繫法門重大矣法師辭世後事多掣肘遷延至六月諸居士因余曾於創議時力贊其成遂寄書勸請爾時余正患病掩關舜江旌教寺念佛待死又自問抄化等事生平未諳不敢應命次年七月護國寺成方師兄渡江來備述崖工情形知沈居士已收回鈎本余若堅不肯出則寧可緩辦決不輕付他手余前讀諸居士壇中發願文不勝悲感以為現當邪魔遍地不但法運大衰而世相亦壞幸賴諸居士發此大心成此勝功德或尚可漸漸挽救之今若半途而廢豈不可痛因虔禱佛前拈鬮求示可去承辦與否三拈皆可遂決意破關至護國寺細看崖工一道齊平宛同粉壁上鑿飛簷旁留兩柱全體似石屋式柱外開溝直透崖頂頂亦有溝以瀉雨水摩崖如此精緻實從來所未有足見前手一片苦心惟因經費不充遷就圖成高廣丈尺未照原議沈居士恐經文排擠行長離地太近易致汙損然尚幸崖下留有石坡若亦鑿去之使與地平而人不能登則崖壁自然顯高數尺萬事隨緣可了即了應當如是即雇船訪沈居士於青鎮不遇又至南潯歡然相接取鈎本歸乃敬然臂香四十八炷供養阿彌陀佛發心募刻祈早圓滿並粗述募刻偈懇諸同學代為廣勸一時樂助者三千五百餘人共收鷹洋三千八百三十圓別具名册壇施既集遂一面開工鑿坡一面啓建四十九日念佛道場至十一月十七日阿彌陀佛聖誕良辰圓滿發願為助緣諸善信回向西方莊嚴淨土幸蒙佛佑於今光緒七年四月一切工程次第告成除前手工費各自經理外統計續開崖工鷹洋六百五十四圓刻字九百圓置道場地四百七十三圓造彌陀院九百圓造彌陀橋修接引橋周公橋並填地基鋪路開河等九百零三圓此乃就所募信施隨收隨銷之數其間各項工程先後緩急實亦入不敷出乃各以香儀嚫資補湊之並於佛前立誓云承辦崖經敢不慎過因果分明公超私墮凡崖壁經字各工匠始終皆齋素從事於七年三月先成余當爾時回想渡江接手以來共閲二十一月無日不早出暮歸經歷許多曲折自愧毫無道力不耐動緣以致萬念起滅大為苦纍若再違誓不住院之本願管此道場必造生死業實大可怕急欲辭歸成方師兄發大慈心挽留切勸云兄自專辦西方一切勞役我願身代余乃作禮三拜稱謝同發誓願願往生後我為法師他為僧主盡未來際同揚佛法廣度衆生又有淨民同學亦發慈心助力百圓願同往生常為善友作大護法真可謂百劫千生難遇之因緣矣遂起七回向至第三日念及承辦此事至今打失正念所纍之際失聲痛哭因發憤於解七日閉關立志求早往生以報衆德對衆告假時説及近時念佛法門之病聲淚俱下得要語四則隨手録之名為念佛四大要訣今將摩崖始末及不肖前後心行披露白衆並演作長偈普望證明戀西學人玉峯古崑謹記我集四要訣究竟從何起總為辦石經事大身無倚不蒙衆友扶必定隨他去一片西求心變成東想意今日想護法明日想施主若能都想倒更加苦不已如此惡作為諸佛皆不喜我若到此時惡報將誰抵因此心發憤封關立規矩四月七進關示衆淚如雨幸蒙佛力護成此報恩語又想六方佛及我娑婆主同説彌陀經功德不思議但一稱洪名萬德齊包舉再不生深信轉回何日止想我得出家真實心歡喜本是地獄種受苦無窮已何幸於今日名標蓮池裏總是佛慈悲徹骨又徹髓故我讚淨土拚命讚到底讚到心血乾還要讚幾語才得有此書供養諸善侶唯願見聞者切莫看不起當發至誠心信受如佛語種種諸疑惑從此永勿起佛説一切法門門好無比我為業障重只可憑一語不是毀謗他實為愧自己十方諸學人正可將心比倘若業障重切莫貪元理急須相信我依我立規矩每日念彌陀必從一萬起朝朝十念法必要盡力舉倘若肯信我即是我善侶我若到西方決定不忘你倘若不信我我亦記得你待我入婆娑決定來尋你不如早信我早作西方侶大家同回去一團大歡喜十方諸上士見我如是句莫謂是魔言當信是佛義我曾立誓願不貪虗名利豈肯出妄言自投舌地實為諸衆生同具此心理心理既皆同即與佛一體是故阿彌陀等視如一子哀我六道中流浪多生死特開大願門普望同歸去還恐我障深觀想力不濟教我但稱名出口念能繼又恐我亂心難到一心地許我帶惑生妄想亦不忌又恐我命窮業緣多牽繫教我修十念朝朝向西記庶不費工夫相續亦容易如此大悲恩昊天同覆被我每一思量感極為墮淚況既為佛子衆生即同氣若作自了漢豈稱慈父意故采種種言流通於處處苦苦勸同倫此事非兒戲當知呼吸間無常難回避及早同西歸莫再自暴棄報恩論卷附桐鄉沈善登述海鹽張常惺校録上鍾子勤夫子書以下三書勸讀書人兼論道家某月日接讀復諭適微感風邪身熱嗜臥越日乃愈今一切如常矣肅復稍遲職是之故秉氣受形名為始有實日即於無波斯面之談距近故易見陰符殺機之説據遠故難知其實一而已矣陰符雖偽託而其理甚精文亦奇倔久無其本頗思一翻未識函丈有否坡公赤壁賦變不變兩義互融最為空靈敏妙慈體頭風因熱益劇而課卷批閲勢不可更緩同是境風所迫而儒冠獨當其衝抑亦時為之耶日夕神馳感歎曷已命擬再書後篇而具釋前者不敢不能之疑敢勿勉力惟太史公論道家要指語意似未可闌入吾聖人之時與西方聖人之所謂時皆兼定不定兩義而互為體用隱無正而元年必正桓無王而始終皆王於辭則本無而故著有於義實因有而益顯無總之物物現成覿面即見不待差派還其本來春秋之義本未有正有王所謂王心也而隱心本來無正桓心本來無王則兩還之不兩還則一亦不立矣慈意所謂春秋記人心者疑是如此本經不熟私意窺測未知然否佛教小始終頓四者亦是當機本來其實師子搏兔何非全力華嚴圓旨普具衆經惟其各還本體故曰我無加損情見乎詞不獨詞已惟其各還本來故曰方便説法非遷移變化之謂也人人心中本來有正有王今乃無正無王而正王之義顯然矣人人心中本來各具圓旨今乃局於小始終頓則還他小始終頓而華嚴圓旨自見矣故未嘗隨之遷變也史公所稱道家無為無不為及有法無法有度無度等似與此近而實大不同下文虗者道之常因者君之綱兩語分明吐實非虗無以為因則體用祇著一面而所謂無為無不為等者顯然以無為為為而不知為即無為以無法為法而不知法即無法以無度為度而不知度即無度故善用之則為管子而規摹不能宏遠管子列於道家列傳敘其一生本領亦止一因字馬班皆巨眼也不善用之則或清靜而廢事班志所謂任一清虛或刻核而少恩致虗之流極必至於此老子與韓非同傳史公未必無意要其本原祇是不為天下先一語惟善於用因故却覺其不為物先不為物後以視儒佛之物各還物本無先後而我亦未嘗與焉者相去不可道里計矣比之算術似祗平圓面積而未合球體楞嚴所列十仙道家似當堅固精氣一種仙道似二實一達磨所闢六宗有相無相定慧戒行無得寂靜後二宗正是道家其實皆是也病在執著耳燦然明白范書以佛經為道書之流自是牽於志略家數又譯本少出宗旨未透無可比擬班志於各家必曰其源出於某某章實齋以為成周官師之掌殆為近之佛生於周昭王時身毒至漢武時始通中國前此莫往莫來安得淵源吾柱下之藏而沿為此流耶蔚宗以其無可位置而牽合之後人樂其説之足以勝佛也遂不加察而并以為多襲莊列真所謂齊文定旨不足辨也今欲暢明儒佛貌異心同之旨似未可更涉道家轉見椎拍痕迹也時節因緣四字妙絶無對時節即數因緣即理不答南宮之問正熾然説此四字耳必兩義交融互攝乃無滲漏前信以圓體顯時自當以八線詮理親切易明理本是萬物之線路耳許書本義自明而近來算術一事衆心所注於焉取譬冀可曉了亦誠如慈諭所云惟措詞恐難得恰好與説經體裁尤易犯手容徐思之隨時擬稿録請訓定連日擬議似可以問答發端即從經圓例方一語引入頗亦真切而仍巧捷更推上一截從刻書起如曰刻既成或問云云篇末遂及集資情事如漢陰例則此一段時節因緣似亦可於言外得之其中間尚有一層必應補足斡旋者生斯為斯閹然媚世天下中庸有胡公臣妾人人學圓轉其於聖人之時真所謂彌近理而大亂真孟子既稱聖人所惡又直斷之為邪慝且以是殿七篇而後歷敘道統以見自任之重大聲疾呼憂深思遠概可見矣今欲拈時字為儒佛貌異心同之據將上焉者誤解為易地皆然無分別中轉生分別文中子即如此其次委心任運墮入無字甲裏隨任不是諸祖痛呵其下謬詡通方正蹈鄉願之害更不可救藥張蒿庵論誤解中庸二字之失今且無賢無愚無貴無賤觸處皆是可勝浩歎所謂偷心不死佛也救你不得殊不知春秋雖東周列國二百四十二年中之事之文之義而實從此內外九州百千萬世後聖有作更無二義衆經必如開皇時揀別疑部方可安得復有智果其人者儒書雖亦有此憾而智慧日出文字彌縫居然言之成理直翻易曉橫翻多隔一層無如何也雖迦維衛國四十九年中之言説章句而實從此無量阿僧祇劫墨塵世界未來諸佛普説此句何則推驗一時之人心是非邪正無不曲到猶割算一渾圜之線縱橫弧直無不周遍必周遍至見線不見圜而後其中之孰法孰實無不會歸圜體猶必曲到至見心不見時自三世之説盛行遂疑聖人有所諱避正好為鄉願開解免之路可歎而後其中之若豫若奪無不恰好時中故知小圓不異大圓即此時不異彼時彼未嘗割算周遍者必不能泯合圓體未嘗推驗曲到者必不許假託時中前信所言兩聖生於今日論語及諸契經未必一無改易者正謂必如上云云而後改易猶不改易也如是立説庶幾可息疑謗而工夫下手處亦自分明不生諸弊至象山先生語簡括顯豁而嫌於太渾侖且異同之爭到今未盡息引之恐似特地更樹一幟又三教並稱不知起自何時中説居然筆之於書矣漫無區別道家是非且置好辨之徒復有謂既是儒佛一理何必更佛者亦有謂物莫能兩大果孰優劣者此兩疑皆甚淺而實不易破殊不知儒書見線不見圓使人因線以會圓而終未嘗舉似本無諸線之全圓論語有多章分明道破矣而為集注塞斷此路春秋諸例錯出處亦隱然舉示矣而非函丈之穀梁補注八面扎緊直會到無字句處迸出字句亦徒覺其亂佛書亦何獨非線却隨處道破線從圓出使人欲求本來自具之全圓不得不從線入故曰不立一法亦不捨一法又曰治世語言資生事業皆順正法乃為彼學者又死煞句下必謂羲媧孔顏皆即某應真示現何其陋也其並取媧分明惑於漢後之道書然則全圓無則已有則豈能廢佛書宋儒所得盡從此出漢唐以來學脈具在不可誣且自不覺耳必謂陰用而陽拒之過也諸線無則已有則又豈得謂不從圓生而圓反從線生乎置全圓於此曰是不成線置諸線於此曰是不合圓從而優之劣之稍知算術者必為噴飯矣登又嘗疑春秋託始乎隱為隱讓國耶則且不正之矣為平東遷耶則何不於惠矣一部大書發端乃無一事真是大奇或者有元有春有王有正不必盡如五始之説則天清地平本來無事聖意正欲從此拈起而既為王者迹熄而作則時代不可太遠於惠固礙有公即位文義不可削於桓則弒立於莊閔僖又皆繼弒而復遠在周桓莊之代故不得不於隱歟不能詳實但向空寬處搜求未識有當否叩求訓示細思始元終麟之萬八千字在聖人祇是欲無言是故開端元年春王正月者天何言哉也向下千八百餘事者時行物生也絶筆獲麟者夫何言哉也故曰我欲託之空言不如見之行事之博深切明也如此拈題似極現成昨夜枕上忽然見此意尚不是入魔道否叩求訓示至蒙擬示再書後文語雖止六七句而意已圓到登他日屬稿或照録入或但用意且看通體文勢如何茲難預定竊議若可不著理學心學等字樣似當略少葛藤又諭謂補注心思門路在漢莫近於揚雄在國朝莫近於李榕村登仍有未喻疑亦謙詞止尚書説事春秋説理兩言恐亦祇大段見分曉使章章節節執筆詳説之正未知如何素不喜法言不知溫公何所見以侍談時每聞稱許之因復假讀數過眼光自是不同然似未脫辭賦家習氣道理亦似其文依墻摸壁湊泊得來者多遊行自得者少太元尤不解似可不必作作亦非難只難在字句古博耳任作若干畫但弗欠三亦弗過十言之皆可成理有如泰西各國之閏法及其以十二為成數等元將安施得無尚白之誚乎榕村全書未得見惟周易觀彖反覆數過折中亦未詳讀易本圓物體又整齊且虗立其象説固易圓觀彖密亦密矣圓亦圓矣不知何以總覺輪轉不靈活一似有意為之者登前信謂函丈之穀梁補注心思門路為昔人所未有者正不似此本書大旨多於侍坐時親承指授前年因作書後文略翻全書一過至介人侵蕭節不覺身心踊躍真似有一圓物掍出通體靈活不可名狀其實此事何關宏旨自亦不知何所契證大段舉似不得而至今憶及如在心目間不可解也東事曷勝杞憂金星躔日自有書契至今未之前聞前得之新聞紙檢開元占經同類相近者亦無其比果何祥耶世變日新求吾本有之不變者又猝不可得彌可懼也甲戌七月草五日又頃間肅呈寸箋附再書後擬稿並論所擬微意各兩紙皆甚草草尚祈原恕並有一節應申説而別紙中匇匇忘之春秋盡性之書邵子語傳心之要典胡文定語載道之文四字却非程子本文本文是書詩載道之文春秋聖人之用云云竊意六經皆載道之文故借用之初稿是説理之文特地改去不但其句未安也道是四通八達渾侖之名理乃一彼一此分別之號此段説春秋全部總統大旨對上段渾侖天體祇可用道字勢難用理字以理是上段推步諸術之對此段文並未説春秋是是非非之例非其比也每疑宋儒主張理字不過為道字被釋老兩家説成間家具特地別開生面耳其實説事物皆有一理皆當依理而行豈不安穩精到必以此為涵天蓋地統宗會元之大號則終説不去譬如一箇線團名其渾侖全體則曰道名其衆線相際之夾縫則曰理故理之本義紋理也即夾縫也引申之為條理也則兩邊之線也今必謂理在氣先夫氣且未有則何物為能夾而成所夾之縫乎假若理字果是涵天蓋地統宗會元之大名件豈得論語孟子大學中庸竟不提起而六經中亦絶無僅有乎孟子理也義也對舉中庸文理密察並稱只是條理紋理耳樂記始言天理二字亦祇是人心中所有在天之理耳天理千條萬縷分言之為天理渾言之為天道手頭無北溪字義不知其説云何未識黃氏日鈔中有論及否春秋千八百事事事辨其理猶就線團上所有夾縫條條捱邊擦際周遭走盡依舊還他渾侖線團不短一絲此所以但觀春秋可以盡道程子此一説理道二字極分明主張理字何嘗不是救世衛道之苦心但説得過分只見粉碎不見渾侖譬如將線團扯成一條長線謂即是團體亦何嘗不是然而一直到底四面盤不通戴東原直謂之以理殺人矣可稱放膽文字變成有盡道豈有盡乎與天地全不相似矣佛教萬不可闢即如華嚴四法界曰理法界事法界理事無礙法界事事無礙法界何等精深博大晉譯已如此居然對舉理事豈非導宋儒之先路宋儒有理法界其平心靜氣説到精微處亦有第三法界朱子兼有第二法界論語亦祇到第三法界如公山章等惟春秋竟是第四法界所以宋儒怕講以其動成違礙胸中祇有理法界也適見家人輩繳線團縱論及此狂妄實甚求涵育訓正之又昨鐙下肅一箋全是放言線團之喻恐雖有廣長舌相亦無可置辨道字無對而可為散文如乾道坤道之類然亦終是通論二卦之辭君臣父子長幼之道之類亦是舉凡之辭若相師之道及察革之道等則猶言法術矣然亦祇可言道不可言理宋儒以理對氣於是理成大名其實理從氣生二者並非平列譬如樹木得地氣自成花紋其氣或有盈不足小則花紋散亂大則連皮坼裂此顯而易見者惟人亦然凡物皆然故理字祇能對事字在物為理四字乃真攧撲不破也春秋之有第四法界趙盾許止衛輒之事最其大而顯者齊桓之入之卒及前諭陳侯鮑之卒之類雖小小處亦俱觸發無礙所謂聖人灑然地步惟其於道大適則然若執煞理字則不待終隱篇便已到處荊𣗥而要非將理字閣起一邊春秋所以實在難讀也來諭自以補注恐不免遺憾此雖遜辭而以道觀之亦應有此理猶天不可度縱極推算之密於萬斯年亦終不能盡其變穀梁之有補注已泄二千年來不傳之祕即留小缺陷何傷大體正惟平心盡心至三十年之久且專而猶自以為有憾此春秋之道所以大而補注之功所以不在孟子下也登此語實非過分將來必有印證興起於此語者特登非其人雖有言不足取信耳又此簷論儒佛異同勸謗法者接展賜書附還再書後文改稿半篇讀悉種種時令溫升寒燠不定慈躬舊疾間作心力疲煩致前諭引弱草輕塵之喻語多歎聲讀之百感交集時移境遷無幾微之頃可以自主無智愚無窮通一也所終不可得而變滅者惟此妙明本心耳穀梁經傳補注開前古所未有引來哲於通途綜四十餘萬言若非此廣大心量本有如是之通古今而不隔者即亦安能鑿空而出耶朱子贊周禮謂一一從廣大胸襟流出而周禮實多可疑故知藏識中固無所不有還當於緣生時慎持之耳然則立德立言必有其能立者與所立並立不朽矣民無信不立乃信立即民立也身世之感不過一期適然耳前此後此皆不能必知其必不如是即不如是而今固如是則同一無可自主矣以適然還適然庶幾非空非有不昧本有伏求隨時以道自衛無任馳仰至儒佛之異同可以心通難以迹較據迹則説同説異或全或半或非或即盡是情見卜度終與道體不相似所謂我真文殊無是文殊若有是者則二文殊而我今日非無文殊六句四轉轉轉入微轉轉出顯前再書後承命擬稿初不敢下筆敬辭不可再三思之又無從下筆如是留之心目間幾兩月餘忽悟盡捨諸相自然無不恰好所以既屬草後尚不苦難而修多羅語亦一句不引用如心行平等不説是非二句未嘗非孔非佛而正多此不非之見所謂若有是者則二文殊也前作微意前半喫緊在以身世之多故數語後半喫緊在雖然下一轉所謂而我今日非無文殊也此等體會以迹求之真同夢囈郭遠堂中丞所謂言有愈説愈不明者實是閲歷有得之談故惟有函丈前乃敢直貢其愚知蒙垂察中間數節喫重在機數既極還達本原兩句以為道理只是如此故先結以物固莫不有然一語而後拍入春秋蓋機數兩語人人如此世世如此閲世生人閲人成世就中析而言之則竟是日日如此機數者猶例之方也本原者猶經之圓也機數即從本原生故本原要假機數顯道體渾圓其大無外由一身言必通於生死之故而後還原由歷世言必盡其文質之復而後還原人之於道譬猶盡大地為白紙而著墨點如芥子許耳自少而壯而老而死譬猶引此墨點為線墨盡則止耳厥初生民不可得而知矣鴻荒之代大氐率性而行其線或交錯紛糾而前後若斷若續但有男女尚不知父子兄弟之義則於線外餘紙固茫茫大白不可得而辨別也既而漸推漸廣漸成邊積其三皇之世乎所成邊積或三四角或不等角以其數之不齊而難稽也則命之一縱一橫一斜為正三角其五帝之世堯舜之前乎然其角猶或鋭或鈍邊或等而積不等也數固有邊等積不等者乃命縱為股命橫為句命斜為弦或長或短必取平直蓋規制漸漸整齊矣堯舜似之至於夏殷乃知合角成方破方即角惟變所適皆有法實而所占白紙亦愈廣矣至於有周若方若角邊邊相並占紙更廣漸見穹面至於春秋之世推諸方角數漸難合於是聖人直據圓體制為割圜密率隨拈一線無不均等無不吻合即無不會於全圓春秋是也以上但假喻以明其説耳與大禹制句股之舊説故自不同而周髀矩生規與班志規生矩之異説卻可因此和會是故孔子賢於堯舜春秋貫攝羣經非堯舜之智小而羣經之道狹也時節因緣為之也時節因緣誰為之人人本有之廣大心量為之也由皇而帝而王而霸日新日盛養生送死之道備而陰陽消息之機顯矣世界者萬億愚賤之心之所結也前前生後後後後師前前以有涯之生逐無涯之知忽於目前而遍計所未至念念趨前不極乎有生之後而不止者亦時節因緣所必至者也聖人者合萬億愚賤之心而常得先覺是故死亦有知聞道則可表生德之在己歎逝者之如斯天何言哉之談無隱乎爾之教或冥契於無始或拈舉夫現前皆羣經所不言前聖所未發而撰集者歷歷記之初不見為元祕者衆感而聖應前此非不欲先天以開人無所憑以為開也本無所謂元祕也自時厥後侈鬼神論精氣神仙之説方伎之書雜出爭鳴皆自以為窺見至道更數百年而大法東來矣此又聖感而衆應無非時節因緣之所為莫之主而若或主之矣凡物之自無忽有積微成著者莫不人感天應天感人應相待互發故其運不窮聖人之於衆人亦若是焉故其變無方而其勢常順佛生於天竺其人多好深思窮物性不得則世其子孫必得乃已師評恐與泰西有異今泰西各國猶然其於死生之故見之獨早前此七佛之生又皆於其地傳習之資亦宜獨博無足怪焉明乎死生之故則其一身自成一始終推之多身無不同推之他身亦無不同矣而於大道乎何有以周公之多材多藝不必能知今日之機器而不失為大聖有今日之遠涉重洋纍譯通使尋常之梯航不足恃矣則機器亦不失為至精此其適於一節之宜非如飲食衣服之切於日用猶尚時至理彰不可得而偏廢況死生大事古今必至之理苟為可免孰不願免之是故有醫禱之禮雖必不免而心以為必有死而不亡者是故有祭祀之禮記曰豈知神之所在亦以主人有齋敬之心焉心有即物有一有自衆有而幽明不二之理斷可識矣夫自太朴既散機智日深春秋一大變陵夷至於戰國皇古熙皡之氣象澌滅殆盡矣苟有可以得生免死者何所不為何所不至南宮之所疑盲史之所紀載其理莫可究詰其事亦不足盡憑然非當日之人心實有險怪百出如是者安從發為言而筆諸書是故淨土實有其處地獄亦實有其處非故作是説以為勸懲也樂生惡死之心聖凡所同但判於理欲公私而已充從理之公心不至於壽敝天地羣生在宥不止諸佛菩薩證之充從欲之私心不至於巨痛劇苦求死不得不止十惡五逆證之所證維何還證此心而已以此心本無能所而其廣大亦本無止境也三代而上無所謂治統也道在斯統在君師一人也世及之天下不能矣猶有祖宗之功德存焉至於春秋先王功德之在人心者亦日遠日忘而道統乃專在師儒是以百家爭鳴思有以維持之向非董生獨推孔氏不知其敗亂何所底止海外諸大率以力征經營興廢無常故有國主有教主君師分治而統歸於師故歷記動稱幾千幾百年今泰西各國所奉之耶穌可證已佛國之印度猶是也過去七佛之長壽猶吾儒書相傳之初中三皇因提禪通前記諸説莫可深考或譯者誤以傳統當年歲耳師評此未必然其佛亦有入統不入統之異師評此不知何故釋迦之本師燃鐙可證也不入統而不失其為佛猶吾伊周也其教亦有損益因革至釋迦而始明備猶吾孔子乃集大成也師評初佛後佛總是一佛法華以過去未來無量億劫縮之於一時以三千大千世界縮之於一處故千萬億佛多在一佛光中教五分時由淺入深猶吾之有小學大學皆一時人心為之非有優劣也其經論多以六度為本以遮惡進善極於忘善獲本妙心而所謂善者但舉大綱其細目專在律藏亦猶吾餘經但言綱要而品節之詳有少儀有曲禮尤以十七篇為專書故最後叮嚀以波羅提木叉所在為導師猶在也其律之繁文縟節殆過於十七篇而專在於動作云為之細別無冠昏喪祭之分以諸禮儀制從其國之時主所定非教主所得專也其發明心性而推諸倫紀者止於修齊略無治平之術以兵農刑政皆非教主所有事其所傳受專以師道為重苟不得人不輕付法或以有體無用詆之或以心性為本強為之解皆非也師道立而善人多所益於家國者大矣心性果明如鏡照物遠近高下焉有不如其本分以從時王之制酌古今之宜奚不可者惟既已為僧則所重在彼不在此而世亦斷無以僧蒞事者必責其若者可以為堯舜若者可以為伊周憶朱子有此語則吾儒之以師道自居不出而求仕者雖西河老師不得免矣未為通論也其衣冠以別於凡民猶吾儒服也原不舉國而髠之其初制春秋家居養父母夏冬入蘭若結制修學故其序年齒稱夏臘久漸衰敝至有破夏破臘離衣結制時不得離三衣遠出者乃變其法而有別築室以養親之事其世俗男子從學者或思欲歸家欲飽還來但戒多淫邪淫耳亦非不近人情也其不畜妻子者所承者師之統故所傳者以道為重以法為嗣不得其人雖所生不輕付羅睺羅是也誠得其人則統終不絶何久遠如之故律制傳戒一壇過三人者即犯濫法罪其三人所受戒亦必多年熟習先沙彌次比邱次菩薩循序漸進有終身不得圓具者唐代猶存古意今則一壇數百人三戒並傳無惑乎不能得人也堯舜變古來常局遽以天下授匹夫而不疑大禹又變堯舜之局竟授其子而亦不疑聖人作用無非因乎其時豈凡情所能測乃戰國時猶有德衰之惑魏晉而降更託禪讓以售其姦人心之變幻信無一法可以持久不敝者今無知窮民以披剃為生計不足辨亦不足責顧以歸罪於釋迦何異以操莽之所為歸罪於堯舜周公乎不待智者而知其不可也其教以音聲入故不立文字諸經皆語録非文字也密部諸呪所謂耳學或一音含多義或多音成一義其所謂義亦在文字之外故不能翻譬吾經解文評詩品之屬彼雖讀至瓶翻水瀉亦終不能得吾會心之所在而吾則一一功用一一效驗學之可至自然分寸之無差蓋耳治目治之格不相入本來如是彼此相望應信失笑也其言大而無當橫賅竪徹動稱無量無邊無非顯示此心量而亦無非實證之圓體非設辭也譬如凝想佛像為若干高大則竟眉目了了夫既若干高大矣以吾仰視豈不僅見其足底而不然者以吾之見性本不局於兩目也又如近世圓光術之精者舍親曹星濤宰青田以捕盜輒獲庚申辛酉間家茂二叔倩人圓許貫翁一家蹤迹晤後問之歷歷如繪夫已過之事距遠之境而光中若有留著攝之可見以此知虗空之光無非人心本光如鏡含影雖多不雜而世界詎復有盡乎西人所測見中實地猶其淺近者矣推此以思善惡報應之理所以不啻燭照數計者正為皆自心光變現也更何敢以目所不覩而疑之也親切示人莫要於像易理之神妙不測殆亦此意乎即正法時無非像法師評儒以文字教佛以像教即彼之目治也經首每言一時佛在某處與某衆俱為時處主伴四者成就結集時加如是我聞為信聞二者成就亦有稱聞如是亦有稱我聞如是及無我字者或譯略或本缺遺教無此四字者通序始終不可稱一時也四十二章八大人覺亦無此四字者雜集之非一時也共六成就而經體立此最是一代時教之大主腦即所謂時節因緣也蓋人與人相接無一而非此四成就在凡在聖皆不能以須臾離則道在其中矣縱曠野獨處而情與無情俱猶主伴也但無説聽則不成經耳故知時時處處無隱乎爾時時處處現身説法此其妙何等現成而其教人何等明白故隨説隨聽便稱此經貴使即目會心乃真不立文字法華開端最顯此理華嚴八十萬言而佛説乃止二品亦此意也其學有先知後行者楞嚴圓覺諸經是也有先行後知者梵網華嚴行願品之類是也雖分先後而要皆以戒定慧三學為始基及其至也亦不過充滿此三學無他道也或謂其精粹理趣皆中國文士所為此不足辨其字句名目既皆儒書所絶無六十四卦名及爻象彖等皆羣經所無且無別用可謂大奇而理致又惟論語時一相類後之文士若能為之安得唐以前諸説理者竟無一二可證取吾之言性心者斷自隋以前止取宋以後言心性者斷自明季止中間獨有佛書而脈絡可尋矣蓋自隋智者大師創四教儀而唐之杜順賢首清涼圭峰諸師繼之此道乃粲然明備宋儒初皆沈潛於此如空印空必不能更分界限原非陰用而陽拒之也是故有取其意義者如説心與其非外而是內不若內外之兩忘全是楞嚴徵心本意也誠無為只換卻真如二字耳幾善惡只換卻動念二字耳動而無動靜而無靜等圓覺諸經廣見不可悉舉也多得諸宗鏡録故記不清有直用其文句者如體用一源顯微無間華嚴家常語也不記出何本無間原文作不二止動歸止止更彌動四祖信心銘也善登所見唐代諸師釋經之書極寡陋而已觸處皆是朱子尤多並喜用宗門語是故唐賢之闢佛是恐其惑人宋賢之闢佛是惡其勝己言語氣象之間不可得而掩也夫既深入其中至十餘年之專且久而後此力排之以為是吾道之大害者千言萬語歸根只是滅絶彝倫一句大頭腦話師評快論從未經人道破然則前此十餘年竟并此極粗淺之大害而不能覺察有是理乎亦可知其非出本心矣竊謂儒佛之異同真不必辨亦不待辨以言乎同則兩家均是白紙墨線以言乎異則一則舉線以表紙一則舉紙以表線必謂其線畢竟同中有畢竟異則左看成正弦者右看即成餘弦而較其長短之畫則盡是半徑究其起畫之點則隨在中心徒為紛紛返諸身心實無所益夫道與心與時皆無窮也必如白紙墨線之喻則更積數千百年竟至滿紙皆線將不變異乎而正不然也我所畫者無論滿一象限或半象限要已中邊暢足成半徑線從此八面圓轉悉皆平等倍之成通徑亦悉平等割之生諸線亦悉平等是故兩土聖人占斷諸方盡未來際更莫能外縱或破紙穿入地中畫其所謂擺線拋物線等彼終不能穿過全地畫於地外則亦仍可以諸線御之而盡窮其數此則善登所為見得線外惟紙紙外惟線離不成二合亦非一而不敢更生分別相之微意也春秋之為圓經惟函丈創通斯祕二千年來未有能見及者正為牽於前後諸例之參差不能因其參差而參差之不知聖人本無成心我自執之而有成見也前擬再書後篇亦不敢稍有成見所以疊次往返函商諸意悉置不用竟作為隨口問答之語不大著力安排恐轉失真後幅雖然云云仍不敢不歸還儒書面目似與前此來諭所謂非同非異者尚不背謬或亦無須更改也近見為兩家左右袒諸書都不得要領欲作勸刻全藏疏不能不略有辨論又甚不欲蹈鬬爭惡習故以所自謂心得者覼縷如右冗繁無緒伏求隨便批示於原紙行間勿過煩心別賜箋答無任叩感屏營之至穀梁補注再書後是篇以天佛聖合言之可見道無方體當下即是説異説同祇成戲論是書既修定一時賢士大夫知與不知相勸助剞劂越三年遂付手民於是先生謂諸君子嘉惠之意甚盛不可忘則於卷尾備書之用漢陰記出錢例也客或私於善登曰若是其不類於釋子之募刻諸經乎而可乎曰是固紀實也奚而不可且先生以身世之多故而穀梁家學之垂絶復興也難故謹而志之亦春秋所謂變之正也奚而不可客笑曰有是哉人謂子好佛氏書癖固有至是者乎曰然然則子今殆進矣乃好春秋曰否始吾於佛氏書三入三出讀先生此書而後乃今不復出子謂吾進焉否也且子獨未聞洪氏慶善之説乎曰春秋本無例學者因行事之迹以為例猶天本無度治曆者即周天之數以為度是説也其於三乘權實之旨亦猶二五之於十也吾為子言之子行復大笑之夫行事之迹其可見者也而周天之數不可見所可見者七曜到星之懸象而已其寓焉者也然且推步家舍是無以布其算則從而經之緯之平之穹之俄而得其嬴縮侈斂焉則又制為里差歲差諸密率以求之蓋始亦雜候氣朔取足順時序列人事而已而機數既極還達本原大圓亦幾一引錣而如在戶牖然則其寓焉者其即真焉者邪其佛氏所謂顯密不二者物固莫不有然者邪以事迹求春秋何以異於是夫春秋者載道之文盡性之書而傳心之要典也其事則齊桓晉文其文則史以為心與性道之無在無不在而不可以察察言也則生乎春秋而言春秋焉可目接乎魯史而言魯史焉可也是故始元終麟之千八百事猶懸象也寓也是其是非其非固其是其非之相形而愈出則賅而存焉亦寓也雖然有辨焉亦既身際乎其時而愀然不獲己於言矣而又謂此是是非非之相形愈出者均之未概乎所欲言之數是即與於惑之甚者也寓云乎哉故曰我欲託之空言不如載之行事之深切著明也此之謂也子休矣吾所窺竊於先生此書者若此則未知吾果進也否矣客既退以質於先生先生曰善哉喻乎弗亦已察察言之乎盍并次斯語以視後賢吾為子分謗焉遂書諸記出錢之右甲戌冬十月庚午朔致楊仁山書代許息庵去春得接慈光轉眼已踰年半垂天大翼九萬高騫下視鸒鳩搶枋如故雖等逍遙之樂能無升沈之殊西向瞻風可勝馳結去春停雲歇浦息庵曾肅短箋附上宗範刻資番銀雙百想經局接替得人早為鏤板此書足令末法狂禪觸目知懼而傳本絶少急望流通刻下尚未見鐫樣或當俟全帙告成并原本寄還校讀耶跂盼跂盼法運久衰異説蜂起自非深心大力密轉潛移殆未易著手賢橋梓溈仰一門普賢再世以抒海移山之願現請纓投筆之身定知往昔賢護會中發心再來應時應機善巧若此前次高情遠覽新刊法寶捆載西行手眼已非凡可測近幸交益固梵院創興想公暇圓修不違本誓淤泥池裏蓮種早自深栽野狐窟中師子正好遊戲且聞彼都人士盛稱其算學格物諸法率曰東來代數則演自天元化學亦昉於丹訣矧此般若親種本含靈所同具詎遷地而弗良一旦時至理彰闡提歸命推本所自安得不復以東來大法尊所師承圓滿願輪會當有日瓣香遙祝昕夕以之息庵垂暮之年塵勞轉重自利不足遑云利他幸色力差勝於前而法緣亦頗不淺去冬從本願寺笙洲上人購得彼國校刊大藏疏行密字豁目爽心其書實合宋元明藏及高麗本逐一詳勘異同標列眉際而密部諸經若神變疏鈔等尤賅備無遺彼國諸宗著述亦附載焉都凡千九百零部略依蕅師知津例分二十三門合八千五百餘卷可謂洋洋大觀矣分編四十函又逐册為目而重譯互見之本往往虗列其數體例殊疏檢尋亦大不易覺塵適於去臘遷居來吳相與商榷依其所分門類稍稍移易增省之益以歷代目録所載及明季至今若緇若素未入藏諸作勒為一編其中國失傳諸書乃至日本撰述現有刊本未入藏諸書亦函屬笙洲鈔目甄揀附入之而一一志其存佚別其部居提其綱要辨其疑偽使當來見聞隨喜之者若信若疑悉有依據不復啓訛替混濫之嫌如是則二千年來中東兩國相傳教文并其古有今無諸經目庶幾其大備矣顧猶有奢願難酬不能不仰希護念者曩承教言數年前英國廣求印度梵夾僅得三百餘種而小乘居十之八其大乘中幸存金剛般若小本彌陀兩經東僧已重為翻譯且有大本無量壽經數種文多彼此異同此可見本師懸記五大部次第先亡之説已驗而淨土教典法滅獨留之讖應亦殆不遠矣每慨劉略班志之作結集家無聞西域史乘亦無聞焉故自天方盛而佛道衰到今又千餘年貝多羅本傳寫久近孰存孰亡率茫乎無可考英國乃於此時創意搜羅傳習梵學其本志原不為宏利而推其經營藩部到處護持先佛遺迹之盛心與夫平素書院規制實事求是全力之所注至可以特開梵館廣授生徒則其所據本雖少而又皆巴黎文字要可決知其實已盡括今日五乾竺孤行垂絶之本而為其境內秉教遺民抱殘守缺師師相授之真後有信心足以考鏡而不惑息庵等每論此事及尊者先後壯遊之作略輒喜躍不自禁蓋迂儒門戶之見動疑三藏勝義為中國文士竊取六經語孟莊老緒餘潤飾附會今觀東僧新譯之兩經不直由梵翻華而先假道於英音英義展轉置驛以通於華而大致還同舊譯則歷代翻經館之妙選十師口譯筆述證義潤文參稽互決而後寫定者固不容有私意點竄其間可知矣迂儒又疑三藏之多謂由雙林入滅以後番僧師弟向壁虗造登壇演宣猥曰親聞實多贋鼎今考東僧所據之本直從三寶掃地歷劫兵火灰燼之餘出自民間藏諸官府名目有定章品可稽而金剛新譯并舊而七彌陀新譯并舊而三文既粗同義亦略等則據衰驗盛前此之具有淵源可知推一例餘後此之無大徑庭更可知矣夫網羅散失考證源流冀墜緒之可尋續慧燈而不滅方今急務孰過於斯若乃盡信實難自昔攸歎或詐得遺簡或賄定私文或變亂古經或依託聖證儒且多有釋豈獨無要在善讀者廣學博究分別觀之而已故竊謂英國此舉實關一代時教利害出入之機非細故也以其利言之則於過去為大佐證於現在為大結束於未來為大防間初中後三善備焉以其害言之則去聖久遠羣言淆亂苟非大權菩薩祕慶喜之多聞達淨名之隨墮示與同事而密持法印以一再證明印定之即安知今日聲明絶學之興不為他日盜法亂統之漸此息庵等所由掩卷俯仰西笑方濃輒復憂從中來不可斷絶也爰不自量願託慈照末光得讀所稱三百餘種之首題名字具載録中華梵並存用備參考其間同名別行之本重出誤收之本殘缺失次之本統求憫念衆生勘詳開示存校録之實決方來之疑茲事非旦夕可成初不敢仰勞神用前曾函乞文雄上人録示所見笙師介紹之計達到矣今思上人遊歷數載之間學通三國語言文字譯成兩經則歲月已淹奚暇遍觀餘部且乍習華文彼此又非雅故脫或來教未達存疑不可遣疑又不能必出於再三之瀆心云何安是用復叩大慈籌量方便或借院中存日徑翻華言或凂肄業諸徒轉度英語計每經但取題名無過四五千字文義本不連貫譯手應尚易求筆札供養多少若何先乞裁定示下覺塵有弟味畬現當上海道署洋務局委員與電報局友相熟家仲禮參軍亦在道署謹擬密電數條於後一惟慧照孰便或附官報傳致之均可無誤十六觀圖頌經本新刻精妙絶倫啓發不少前乞大智權巧以如幻法入燈影鏡戲中不識能如願否法弱魔強至於此極方復徐行雅步欲以空名爭之兒戲化之是猶不可以已乎惟尊者宿與同願幸垂手焉臨頴無任渴仰不覺詞煩敬請道安統惟心印不備是書寫定未發而仍存之者蓋有故也初余假讀息庵所藏徑山本全藏有某氏手寫總目一册以閲藏知津對勘之闕數十種後聞日本新校大藏同徑山例變摺本為書本亟購得之凡四百十八册合八千五百三十四卷略依知津分別部居而無總目殊不便於翻檢息庵續購得四五部檀施諸山亦無之且其每門列目有知津及某氏所載而反關如者於是發心共議據之為藍本略為增損合南藏總目行素堂彚刻藏經目參以龍藏彚記傍及藏外流通諸本通為一編而英國所得印度流傳梵文原本三百餘種尤為末法吉光片羽并附入之以待將來大心菩薩得有所據網羅散失以集其成惟時仁山居士方從曾惠敏公出使英法俄諸國因作此書求為臂助既而諸方緇素諈委息庵復購得五六部而以其一施西天目山常住子簡為之檢理忽獨多總目一册且詳載其校勘凡例若干條知其用心至為深密為之狂喜蓋彼中道俗鄭重此編初出書時總目未遽定也於是此書前幅所言不可用而息庵訪聞翻譯梵夾亦頗繁費仁山又將次期滿言歸未必能從容為此遂不復發然此書本旨關係一代時教利害出入之機誠非細故具如後幅所云法運將轉當有深心大力護法諸君子覽而興起荷擔斯事者故特存原稿拭目以俟善生經序佛以五時設教遍赴羣機固不能無小大偏圓之異而要使隨類得解以止惡進善而極於忘善則一也故諸大乘經廣談理性罕及事修非廢事修也得乎後時之説者自必會通乎前時之説喻如老師宿儒豈復待順朱填墨口授四聲若甫得乎前時之説遂謂不必更有後時之説則兒童見解矣此善生經屬小乘部蓋佛在第二阿含時專為在家衆説親切簡要諸小乘中説世法者莫尚乎此使人人能依教奉行豈惟法運轉機翹足可俟抑遠公所謂適道固是教源濟俗亦為要務者其不在茲歟淨侶蕅香募刻長阿含經竟復流通此一分單行廣勸用釋羣疑爰歡喜讚歎為敘教乘大意於首簡與諸方道俗共信受焉精嚴寺同戒録序代妹壻劉頌年作此篇勸官長護法維繫民心一代時教台四賢五科判不同約而論之不外乎戒定慧三學由戒生定由定發慧門仞階級條然歷然初無二致故律別為一藏而欲續佛慧命成菩薩道者必自戒始戒有多品莫不以在家律之殺盜淫妄酒五戒為根本必先具足能持然後聽許出家授以沙彌比邱菩薩三壇淨戒而亦必量根利鈍若五夏若多夏步步增進不許躐等雖菩薩戒間有正受權受漸受頓受之差而佛制謹嚴大要如是菩薩戒有二本其一出地持品為慈氏菩薩所説其一出梵網經即今所傳受之十重四十八輕戒乃七佛遺制本師所説也故經言我今半月半月自誦諸佛法戒是諸佛之本源行菩薩道之根本是大衆諸佛子之根本而又申誡之曰受而不誦者非菩薩非佛種子受而犯者即失比邱比邱尼位墮三惡道中夫其章條簡約不及比邱律四分之一既必能持彼戒而後進以此戒則復何虞其失墜而本師乃鄭重提撕至於現身説法常自讀誦勤慎如此吾於是歎佛法世法之所以圓融而吾儒反經合權之説之未易言也蓋比邱戒局於出家四衆專為自度故但遮不開所謂可與立未可與權未至菩薩位者應如是也菩薩戒則通乎在家七衆當自度以度人故開持犯方便隨宜所謂忤而能合為知權不但能立也所謂治世資生皆與實相不相違背菩薩位應如是也故其章條有雖重而為衆生故開之不為失者有雖但遮不開而失之許復受者有雖開遮隨宜而一失永失不許復受者此其輕重無常形持犯無常準自非精思熟習深解義趣毫𨤲有差天地懸隔然則菩薩戒之不得白衣徑受而世尊履憂濟民之心不尤彰明較著歟末法衰敝教觀全荒毗尼尤失本旨蓋自直指單傳之旨五宗盛行豁達狂禪輒以祖師應機豫奪一期方便之談執為實法謂貴見地不貴行履而律儀疏謂直證心源不立文字而經教亦幾廢於是南山宗下諸大師先後輩出扶持之而沿習忘返旋復旋失卒至三壇併受取辦於旬日之間而大壞矣法運轉機不可思議明季則有慧雲三昧二老大權善巧乘願再來因其末失約歸本制以折其中而賢宗蓮池台宗蕅益二大師復著戒疏發隱合注箋要三書發明昌大之然後趨時適變契理契機至於今不廢本朝龍興世祖章皇帝肇啓皇壇親受戒於玉琳國師大內供奉佛菩薩像日祭月祭季祭及堂子立杆大祀典禮綦隆而列聖深心宏護又特沛殊恩開除則代官限戒期部頒度牒二例使天下叢林隨地隨時授受無礙於是海隅日出之地咸開戒壇而三昧門人見月師所著傳戒正範一編亦時至理彰咸知信受兩浙號稱僧海雍正初元撫臣李馥欽奉世宗憲皇帝批諭加意護持至今士民傾向瓶鉢相安實惟列聖深恩是賴精嚴寺為秀州名剎代出高僧詳載志乘咸豐間住持濟延和尚梵行卓然一時推為長老兵後寺廢和尚竭十數年銖積寸絫經營之不假檀施頓復舊觀傳戒兩期宏利甚大嗣法孫願新師能承其業往歲藏經閣一役始終以羼提波羅密成之亦不假檀施猶先志也今於佛誕日放戒奉所編同戒録謁余為之序余曩者承乏天台退食餘間訪尋國清真覺諸老宿知台家子孫於布薩誦戒遺規猶有存者其門庭之不廢益有本矣余因是重有慨焉國朝尊崇佛教家法相承我世宗天縱至聖世出世間道法一貫特頒御選語録宗鏡大綱經海一滴於龍藏中勸誡緇徒美矣備矣顧於傳受訛濫之處不強以復古且寬其戒牒舊制者抑豈不知教網張弛之異宜折攝之必當互用哉休養日久生齒日繁計夫授田勢有所不給而近世出家者流率不免七種衰相其品類固鰥寡孤獨顛連無告者居其半而種性亦愚懵偷懦者有之孤僻不近人情者又有之進之既無以圖存退之復恥為人役空王可托姑妄自寬此固仁政所宜先如來説為可憐憫者因而任之所欲與聚之使得藉夫法食二輪之運內消磨其氣習而外以支其身而一二能持師説以匡其徒者穎脫於中為世良導則即其藏小二教緣業感應諸説亦足濟刑賞忠厚之窮而蠲敝崇善是則佛心天子御世微權所為同民出治以滌瑕蕩穢於無形中者至大且遠固非小儒淺夫所能仰窺萬一者也嗟乎教者維繫民心之具也後漢迄唐三藏靈文盡入中國佛遂為中國之教與儒教並行久矣近數十年來海內多故異説喧豗愚民之為利誘以去者日深而日衆而以余所聞見庸庸緇素與夫鄉愚婦孺之皈心佛乘者其説雖多鄙誕不足道而先入為主無淺無深胥不為所搖動其效可覩矣世之人顧猶以其傳受訛濫流品猥雜少之動用詬病何所見之不廣也余於三乘諦理無所窺見顧國家護持至意具載硃批論旨欽定會典皇朝通志等書不敢不讀而其今昔盛衰之由與夫民俗向背之所在尤不敢不盡心焉願師勉乎哉夫必能於入世法中為安分之良民斯能於出世法中為學佛之肖子今將紹隆祖席普與初發心者翻染成淨沾戒品而暢宗風其必當約飭同參生大慚愧生大慶幸兢兢焉惟真俗二諦不圓之是懼而後於五篇之文六和之義廣學博究以實證乎梵網所謂諸佛本源菩薩種子者庶幾佛恩國恩可報萬分一而濟延和尚之家風亦可以不沫已尚勉之哉尚勉之哉謹序又序此篇勸信入法門者可證禪教律三宗統歸淨宗攝無不盡余自咸豐庚申避地奔走始學佛流浪三十餘年未嘗歸一句彌陀相隨於苦樂違順境緣中亦未嘗去也今春養疴吳門客自故鄉來謂余曰聞子學佛久矣所見三藏靈文禪教律淨諸家之説亦不少矣而專好淨土何也曰余根鈍無量法門不能遍學而淨士家乃禪家教家律家所歸宿也龍樹菩薩所謂易行道者也故專好之也曰有同好者乎曰余性懶寡交遊方外則尤寡若國清後堂昭凡龍華觀竺天童廣昱金陵妙空杭州玉峯諸師固皆相識也諸師之行解淺深不同與余交淺深亦不同而念佛則同余故益自信也曰吾鄉濟延和尚獨未相識乎曰是精嚴住持也庚申前亦嘗識之聞其語甚異其為人和尚約衆甚嚴余曾親見之一日偕親友隨喜方丈偶談及幼時背書孰師執卷懵騰乃佯忘不能背孰師茫然不能舉其處旁學生皆笑話未終和尚遽色變頓足曰讀書人待先生如此尚自多其能耶拂袖而出嗟乎近時那得有如是人耶余故別有説記其事惜當時未知有佛法未與深談也曰佛門衰壞近數十年矣而異教轉盛行子盍出手眼一救之曰余凡夫自救不了焉能救人曰姑言其意曰無可言也昔朱子讀佛書謂門人曰可見他家自有人我家自無人那得不被他揮下也然則苟不得人非他人所能救更何言曰今和尚嗣法孫願新師於佛誕日放戒所請羯磨教授及正副訓諸師皆一時龍象子盍往瞻風焉曰余病未能也曰故事以在壇師弟之名號年歲籍貫編為同戒録而地方官紳隨喜法門者得辨言簡端為外護子固郡人也又深於佛請子從衆為之序聊一言之以勸進諸新戒其可乎曰法界從緣起余與和尚交雖淺而緣有在矣微子言固當序之雖然余所得於佛法者不過大海中毛端之一渧不足以酬諸新戒又方病不能文勉強為之將益困可奈何曰無傷也有方便也我為諸新戒質所疑子第舉古人公案一二則酬我問子口而我手不揀粗言細語若語録然有不顯則更詮解之使皆易曉不拘拘於文律亦庶乎其可也曰可哉曰敢問是録之體裁頗似舉子題名録古有之乎曰無有也余謭陋所見前代高僧集中猶無之儒家可知矣蓋自世祖章皇帝親受戒於玉琳國師儒佛並重列聖家法相承深心宏護開除前代部頒度牒之例使叢林師弟得自傳受明眼者創為此録以別宗派敘夏臘亦所謂禮由義起也故自彭二林集中始有之時為之也曰每壇必三人何也曰佛制也多則為濫法佛世在家五戒不嚴淨不得進沙彌戒末法世道苦窮民多一期傳受絫至數十壇名盛而實衰矣亦時為之也曰沙彌比邱菩薩三壇并進亦佛制乎曰非佛制也東土傳律始於曇柯迦羅其後南山一宗盛衰無常凌夷至於明季國初慧雲三昧二大師因其末失而變通折中之見月師傳其業作傳戒正範一編至今遵守亦時為之也曰佛法可變通乎曰可昔魏嘉平中僧徒請譯戒律迦羅不許謂律部文言繁廣佛教未昌必不承用僅譯僧祇戒心立羯磨法而止以今方古五夏學習之舊制必不承用殆有過之存此告朔餼羊以待轉機奚而不可曰然則得戒乎曰是難言也昔道進欲從曇無讖受菩薩戒讖云且悔過乃竭誠七日七夜詣讖求受讖忽大怒可見不許數日內輕忽了事進更思維但是我業障未消耳乃戮力三年且禪且定可見但定不是禪禪與定是兩種工夫敢請坐香跑香諸菩薩平心靜氣於此著眼即於定中見釋迦文佛與諸大士授己戒法其夕同止十餘人皆感夢如進所見進欲詣讖説之未至數十步讖驚起唱言善哉善哉已感戒矣凡真參實究觸境遇緣而頓悟者明眼師家一望即知載在諸家燈史多矣據此段公案可見真得戒者與禪宗所謂破本參無異方是一得永得近人輕視持戒為著相菩提可謂瞎卻正法眼藏其實梵網經中前偈有云衆生受佛戒即入諸佛位位同大覺已真是諸佛子試思其云即云同云真是箇甚麼後偈有云應當勤觀察諸法真實相不生亦不滅不常亦不斷不一亦不異不來亦不去如是一心中方便勤莊嚴試思這八箇不字是箇甚麼再試思這數句與念佛法門何等親切尚可看輕念佛不能透宗乎普望諸菩薩平心回首我當更為汝作證次第於佛像前為説戒相焉據此則苟師皆如讖師弟皆如進師何不得之有曰進師既見佛得戒矣讖師復為説戒何也曰佛法理事雙圓不得偏廢苟舉理遺事則墮於沈空滯寂苟執事昧理則失之色見聲求進師雖得其理而事相未圓故必重説之所謂即理成事也昔智嚴未出家時嘗受五戒有所虧犯後入道受具常疑不得戒每以為懼可見在壇一期説戒佛門規制如是出家人應當演習此儀非謂説過了便為已得試看古人何等鄭重不肯自欺如此且係未出家時所虧犯尚不敢輕自放過況出家求戒以後乎普望諸菩薩留心著眼積年禪觀而不能自了遂泛海到天竺咨諸明達值羅漢比邱具以事問羅漢不敢判決可見證明極難羅漢尚不敢輕易乃為嚴入定往兜率宮咨彌勒彌勒畣云得戒嚴大喜時年七十八矣如此高年不憚遠涉辛苦勤求古人辨道心殷重如此據此公案則所謂因事顯理也蓋此理非他即諸佛衆生同具之戒體清淨本然在聖不增在凡不減梵網經言汝是當成佛我是已成佛常作如是信戒品已具足正指此也夫能信則必勤懺悔勤懺悔則翻染成淨還其本然初非新得故或先證此體而一切戒法戒行戒相可具足焉進師其榜樣也或先由戒法戒行戒相一切具足而後能證此體焉智師其榜樣也客瞿然而興曰若是則入道初基先已難之又難無量法門何自得入乎曰子無疑沮也復坐吾明語子子疑無量法門何自入亦知無量法門何自建立乎建立於無量法界也無量法界束之為十法界無量法界何自建立建立於子之一念也子若無念則同木石不可云出入有念即落一法界不落於此即落於彼然則子本未嘗出更何求入曰若是則迷悶滋甚曰即今迷悶亦落一法界迷悶屬癡業所攝即三惡法界而知此迷悶者為有念乎為無念乎為入乎為出乎有念無念兩頭關斷而無量法門之總持門堂堂在目前矣曰是何説也曰是即念佛法門之説也何以必念佛正以念即落法界與其落他法界不如落佛法界也曰不嫌著相乎曰無相可著也何以故譬如子聽我説我説有聲子聽成聞聞全是聲聲外覔聞不可得彼此能所交互反覆可成多疊今文從省舉一反三在善讀者則子之能聽不立矣聲全是聞聞外覔聲不可得則我之所説亦不立矣念佛亦然正當舉念念佛而已念念是佛更無念外之佛為念所念全佛是念亦無佛外之念能念於佛是故熾然念他佛熾然無相可著也夫現前之一念本自離過絶非今即以此離過絶非之一念念彼修證圓滿之洪名則念念之間萬德熏染更何惡之不除何善之不集而奚啻持戒乎曰念佛即淨諸戒古有是説乎曰傳戒正範嘗言之矣其説懺悔法云或死心參究實悟無生或結壇禮懺求見相好或專修淨土帶業往生此段本文係説犯七遮罪者不得受戒其下文義甚明不可誤會蓋七遮罪即是五逆大本説彌陀四十八願中明云唯除五逆誹謗正法彌陀本願如是斷不能帶此五逆重業而往生也至觀經乃本師釋迦所説其下下品中五逆亦得生者似與大本相反諸家解釋此經多方和會其實皆屬牽強難通當知彌陀發願之不許往生者乃在兆載永劫以前及後願滿成佛彼時大千世界彌陀為教主佛化一統無非念佛衆生習慣已久故不許恃有彌陀攝受任作重業即使臨終能念亦因習慣已久信力悔力轉不能真決勇猛雖有彌陀攝受亦心力已軟不能往矣本師説觀經之許往生者彼時淨土法門甫開下品下生輩生平未聞臨終始聞一聞即念念畢即終悔力信力二俱勇決更無轉念故得往生此剎那頃稍一遲疑決難徼幸其所以生平未聞者大本經有明文佛告彌勒諸佛經道難得難聞若聞斯經難中之難無過此難據此可見菩薩尚爾難聞況下品下生平日具諸不善者乎方今阿彌陀佛名號人人會念正與彌陀佛化一統時相同故造五逆者斷不能往生與彌陀本願正相應兩經本是各明一義不勞和會此説於戊寅年元墓寫經壇中五十三晝夜念佛不斷欲釋此兩經相違之疑求佛加被忽於正念佛時若聞人説如上云云豁然心開隨筆成文壇中衆人共見今載在報恩論中見月師如此明説不許受戒正是大善知識獨具隻眼其不説明七遮不得往生者一則不能不遷就諸家和會之説二則戒壇中有此等人既不許其受戒祇得姑許懺悔庶不當場揭破世相能圓此中具有苦心也前二法即道進智嚴二師已收之效後一法則永明壽禪師所謂無禪有淨土萬修萬人去但得見彌陀何愁不開悟者也蓋帶業云者謂無作之業無力懺除自今以往更不復作則雖未證罪福性空之理而事相已當下清淨不啻持戒矣觀經九品往生章中下品以次種種生相其明證也曰敢問其詳曰昔蓮池大師以一句彌陀全攝六度波羅密徹悟禪師念佛伽陀亦同此義其中尸羅度者即持戒也今請為子演暢之此一句佛念念慈悲即殺戒淨念念定靜即淫戒淨念念放下即盜戒淨念念誠實即妄語戒淨念念覺照即酒戒淨夫戒名制止所以止惡也戒名三聚一攝律儀一攝善法一攝衆生故名三聚所以進善也五戒列十重之前為一切戒之根本於此能淨餘可類推則制止之義念佛盡之矣經云衆生心想佛時是心即是三十二相八十隨形好何律儀而不攝乎又云是心作佛是心是佛何善法而不攝乎又云觀佛身故亦見佛心佛心者大慈悲是以無緣慈度諸衆生何衆生而不攝乎此三義菩薩戒彭二林居士所説最為精要則三聚之義亦念佛盡之矣小本彌陀以念佛為多福德因緣者以此大本彌陀以一向專念為正行萬善回向為助行者亦以此也曰律家歸宿淨土既聞命矣敢問教家曰世尊四十九年中五時設教應機不同天台智者大師據法華宗旨判為藏通別圓四教至賢首師時因禪宗盛行別教收機不能盡復據華嚴宗旨判為小始終頓圓五教乃益周備矣昔蹣庵成禪師以一喝入五教謂方喝是有能入小教喝已是無能入始教道無則原初實有道有則即今實無不有不無能入終教有喝之時有非是有因無故有無喝之時無非是無因有故無即有即無能入頓教一喝不作一喝用道有而纖塵不立道無而橫遍虗空即此一喝入百千萬億喝百千萬億喝入此一喝能入圓教吾嘗以淨宗為教內別傳與禪宗之為教外別傳者正相對待一時具眼者頗韙斯言今試將阿彌陀佛一句作一喝觀則與蹣庵一鼻孔出氣更無差別三乘十二分教一例普收矣是以千經萬論處處指歸淨土乃至般若大經六百卷為衆經中王而大智度論謂如來所以説此摩訶般若波羅密者為欲令衆生念佛三昧得增益故正為此也曰教家歸宿淨土亦聞命矣禪家如何曰達磨西來直指心源不立文字而末後以楞枷四卷印心可知五宗門下棒喝交馳語録塞破四天下亦無非印心之具故若但指心源則上來以阿彌陀佛一句作一喝觀即於禪宗攝無不盡若謂五家宗旨非異非同而門庭設施各不相濫則此阿彌陀佛一句又能於其各不相濫處分別攝之何則此一句佛斬斬截截直下承當能攝臨濟宗此一句佛密密層層一絲不亂能攝曹洞宗此一句佛平平實實儘受商量能攝溈仰宗此一句佛孤孤迥迥羅籠不住能攝雲門宗此一句佛現現成成拈來即是能攝法眼宗夫彼此相攝正是彼此相成禪淨之本無高下尚待辨哉末法禪和借一句話頭躲跟枯坐不但於淨土教理一無所知即諸家祖師語脈亦全未體會而但儱侗顢頇執禪謗淨脫空謾語自欺欺人實犯大妄語戒而不自知聞此諸説亦可以深長思矣客曰甚矣子之於淨土也可謂能張大其説矣抑思是一非餘都成戲論子又安知彼禪教律三家不能各各張大其説以為餘家皆歸宿於彼乎曰不能也教者佛言也戒者佛行也禪者佛心也而淨土則全體佛境界也舉全體佛境界而心言行自在其中初非有意張大之也既自在其中則亦何庸是此而非彼乎且世人都以禪淨並稱者亦謂既得佛心自賅言行而心與境本對待故大集經有若人但念阿彌陀是為無上深妙禪二句也殊不知上句特下但念二字次句特下是為無上深妙六字經意分明以淨攝禪直謂不念彌陀不妨是禪而終不為無上深妙禪佛言如是子尚何疑乎客乃恍然曰善哉吾未之前聞也洵所謂無礙辨才哉雖然必若子言不知此一録中若者能如昭凡諸師為子同志也曰是無庸慮也子以是録為類乎舉子題名録昔人固嘗歎羡題名録為千佛名經矣即今直省三年大比列名録中者率千數百人而其間心術學術易簡正大可言可行而不傍門戶卓然獨有千秋者曠世不一二其次傍門戶矣而未始空言也其次空言矣而未始無心得也則或百年一遇焉或數十年一遇焉最下依草附木乃至終身抱兔園册舍利祿之途不復知有何事者比比皆是也生才之難古今同慨世出世間豈有異哉亦辨乎其志而已今諸新戒慨然有志斯道不欲以粥飯僧自了而發大勇猛生大慚愧勤求大戒以自度度人則必將內量根器外察時機研教或入歧途之迷參禪又蹈頑空之險惟日勉勉焉於淨土三經深心信解而單提一念以會歸於彌陀願海中為末世建精進幢開正法眼使諸衆生咸知念佛一門賅貫一切應佛本願欲求往生全重發願大小本經皆有明文願力真切則信行在其中矣決定得生念自佛亦生念他佛亦生雙念自他佛亦生三藏中本無此三種分別後人欲與禪宗相對乃援實相無相之義而為念自佛之説其實自慧遠曇鸞道綽善導諸師一脈相承皆老實念他佛正以他佛即自佛無須分別也一心亦生小本言一心不亂者祇是專修無雜之謂耳蓮池大師時因狂禪謗淨特地推至窮高極妙以折服之而有事一心理一心之説其實惟有上三品生者能到此一心境界中品便做不到況下品乎所以昔人亦多辨論疏鈔以為主張太過若必如其説則龍樹不得判為易行道矣近見念佛者多為此四字自疑以致退墮故特辨明之散心亦生漢吳二譯大本彌陀經善導觀經疏妙叫直指蕅益要解宗論堅密十要序皆有明文蓋散心者並非浮泛之謂但不專修念佛或兼他法門或雜修世善而信願堅固故亦得生乃至半信半疑而亦生漢吳二譯大本有明文至捷至圓至穩至易宗龍義虎萬善同歸然後親近彌陀現生取辦則豈惟十方上善把臂同行抑過去若禪若教若律若淨諸祖師常寂光中咸垂護念且使是録也亦得如吾儒紹興寶祐兩朝登科録傳信力來增重法苑而余今於病榻中與子問畣解説書寫往復精神亦託之以常住不壞豈非時至理彰龍天推出夙緣有在不可思議者哉客歡喜作禮曰是我心也亦見子之心矣請詮次前後手草以勸進諸新戒並俟同志緇素共商訂焉余應曰諾遂略刪定付之而去天台縣護持叢林永禁私占示代妹壻劉頌年作可為護法榜樣為頒章勒石護持叢林永禁私占事照得象教之興有裨世教東漢以降歷代尊崇本朝家法相承儒佛並重大內一切祀典法事及列聖提持宏護深心具載欽定滿洲祭天祭神典禮欽定大清會典庭訓格言硃批諭旨上諭內閣御選語録御録經海一滴欽定日下舊聞考敕修直省通志列聖御製詩文集等而各處名山古剎亦往往親製文闡揚佛法世法圓融不二之旨使道俗咸欽常住永賴凡屬釋子宜如何仰承德意感奮修持勉遵淨住之規無失叢林之望況本寺為智者大師應化之地後起有章安以下嗣法諸賢門庭設施舊章具在本縣夙聞台宗四教法海全收末後單提淨土尤合法華開權顯實會三歸一之本懷為諸宗所莫能外故凡道場所在皆以講經為本念佛為歸其住持亦皆合衆公推不拘宗派但能嚴淨毗尼兼是二行即可瓣香別接秉教匡徒乾隆間國清寺因教下無人約集諸山耆宿公議延請臨濟宗寶林禪師主持方丈由是拈椎豎拂與經聲佛號並暢家風傳衍到今是為明證據此可見惟人宏法非法宏人但期續𦦨於心燈總是傳家之種草是以專就法論則所重講經念佛尚不容以本宗子孫無知濫位況在他宗而兼就人論則但肯講經念佛并不揀於他宗子孫兼修餘行況在本宗此不獨宗教律淨本屬一家無庸割截虗空強分疆界抑亦大師門下知恩識法重道輕財真實為人圓通善應使學者如古人之義社常得親賢亦師家譬俗姓之兼祧無嫌亂統權不失正公而忘私洵足起末法之衰頽作諸方之標準已乃近來法門不振僧徒無慙借參話以躲跟託坐香而養懶心常著有反斥持名為色見聲求目不識丁輒誚研教為算沙數寶如斯執謬猥號師僧自誤誤他已堪痛恨況復分人分我爭利爭名三毒熾然六和全背占十方常住之産為一門火主之私付法卷必手剃親徒輪房分作堂頭和尚則是名為佛子而實作家賊毀滅宗主欺罔人天既紊亂乎清規亦大干乎法紀本縣親查密訪有天封護國兩寺正犯此弊而天封僧兼并華頂方丈一案輒敢委地方公議於草莽視前縣詳案如辨髦尤王法所難寬實佛門之敗類若不專案嚴辦通飭定章革除弊風永禁私占上何以副國家護持之意下何以慰士民皈向之誠為此申明例禁參酌律儀刊頒章程並附發古德共住規約二種剴切曉諭除將天封護國兩寺僧分別查辦外示仰合境各寺僧知悉嗣後無論是何宗派所有住持一律公推現頒章程一律恪守其古德規約二種準其酌量本地情形另議呈核一律祇遵倘有違犯定即照章懲處決不能以姑息為慈悲冀徼幸於萬一懍之慎之勿貽後悔至台宗提唱諸經著述繁富而現頒章程獨舉大本無量壽經遺教經二種者不特畏繁樂簡隨順時機亦乃統宗會元賅通教理蓋奉佛當隨佛學誦經必依經行惟大本當來獨留以明倫建萬行之首惟遺教最後略説以持戒結五時之終故一則大內常宣一則先儒稱重誠見其性修不二真俗雙圓必無愧為盛世之良民乃有合於樂之教主其理尤深切著明也諸僧等當知佛法大要不外乎時節因緣現當異説橫行正教訛替信種日少疑謗日多固由世道艱難人根陋劣亦半由爾諸僧不自量度空腹高心以至於此本縣身膺民社政務殷繁今特於退食餘間不惜婆心苦口為此一番整頓者非謂爾諸僧足以擔荷大法振興叢林也此非常流所能為亦非今日所當急但願爾諸僧自知慙愧善護譏嫌勿濫收徒勿早領衆勿輕視文字勿妄弄機鋒守分安愚少欲知足常念國恩難報信施難消保此可為之基勿令自我而壞龍天在上呵護有靈法運轉機庶乎日近本縣望有厚焉其各懍遵切切特諭募修揚州高寺正殿疏代寺僧了凡作勸緇素各安本分即俗恆真寺本聖祖仁皇帝南巡行宮雍正初奉敕發帑改建維時恭逢世宗憲皇帝聖神天縱乘本願輪提倡宗風護持正法江南北剎竿相望而道場之盛得人之多推高為冠逮道光壬寅癸卯間海波不靖僧徒散亡寺頗廢壞賴衆信力旋復舊觀咸豐初軍興寺遂變為白地衆信又併力修復之禪堂僧寮香積廚等若干楹次第具備獨正殿工費約萬緡山僧慙愧緣淺至今不能舉且諸方元氣未復物力艱難我法門中又魚龍混雜幸有一椽庇風雨安杖拂亦樂得耽間守拙隨分度日一任山門外草深數丈誰曰非宜然雖如此要是一往之談未可執著方今種種邪魔揑怪逞強妄立名目遞相眩惑世人多謂佛法大衰流弊至此不知我佛祇是一箇安本分人本分之外原無一法繫綴人天從上諸祖師亦祇傳得箇無法之法完其本分法尚自無弊從何有世人果能一眼破將世出世間異同同異無量法門一串穿却拈來放去不費纖力直使普天匝地大定永清士農工商各安本分則豈唯魔外潛蹤亦乃佛祖杜口從此僧也得俗也得儒也得佛也得疑也得信也得生也得死也得乃至窮未來際無邊剎海蠢動含靈無一不得即無一不在世宗憲皇帝常寂光中包涵遍覆不識不知國恩佛恩一時報盡若也如斯會得莫道高寺正殿永遠廢壞不為欠缺縱饒禪堂僧寮等一切廢壞仍前一片白地亦不為欠缺何以故是諸衆生本分中覔絲毫壞相不可得故亦莫道高寺禪堂僧寮等早自圓成不為諭侈即今正殿一切圓成無量莊嚴突過從前百千萬億倍亦不為諭侈何以故是諸衆生本分中覔絲毫成相亦不可得故既成壞皆不可得更何佛魔利弊之可言若也不會眼見佛魔魔佛利弊弊利葛藤遍地未有了期又何敢脫空謾語撥無因果且既不諱有魔豈諱有佛不諱有弊豈諱有利山僧亦祇得隨順衆生向葛藤窠裏更扯葛藤普望長官居士善男信女隨緣布施成就勝因貧者勿吝齒牙富者更資財力且道即此貧富不同是葛藤耶還是本分若作葛藤會人天福報決定不虗祇恐彈鵲用珠到手翻成失算若作本分會山僧敢直言告報還肯信否即此便是高寺正殿巍巍卓卓彈指落成山僧雖分身千百億一一身出無量舌一一舌出無量聲讚歎福德亦不能盡惟有恭敬禮拜而退光緒二年秋八月募建真覺寺緣起勸法門中人護持台教翊皇度崇正辟邪寺在天台佛隴右峯本隋智者大師藏骨塔院始建於開皇十八年唐末衰敗宋建隆初十五世法嗣螺溪寂公將錢忠懿王命重建如舊明萬歷時二十八世法嗣真稔秀公重修之國朝嘉道間相國阮文達公捐俸更新焉易今名嗣是數十年舊材益朽蠧不可支中更兵燹緇錫星散道場樹亦化汙萊無過而問者夫一代時教莫大乎時節因緣緣熟時至則聖感衆應衆感聖應交顯互發有不可得而思議者漢永平三年大法始來震旦越四百七十九歲當梁大同三年而大師生宿契冥符出家嗣南嶽當是時禪宗方盛承虗接響顢頇儱侗之流半天下而齊梁義學家北七南三又紛然競作莫知所折衷大師既證法華三昧遂貫練群籍判五時張八教俾學者自初發心以至成道塗轍門仞階漸位次歷歷如觀掌紋諸宗莫能外豈非法王大統垂絶復續應機示現有由來歟大師既順世禮塔者往往覩靈迹塔前有井曰甘泉白膩如乳旱潦不增減亦數有異徵法運盛衰驗之若蓍蔡自始建院至今千二百六十餘年成壞無常不足繫輕重獨錢王重建一役山中人至今豔稱之神應衆著先是台家遭會昌沙汰之厄教文散亡寂公悉力搜羅不能得會錢王讀永嘉集疑其語國師韶公勸王召寂公問義遂發使高麗日本求遺書得諸疏論以歸王大悅命寂公還山重興祖庭韶公偕焉至之日甘泉忽清徹見底六閲月始復而韶公足迹所到一一如其故居道俗驚歎知為大師再來顯示茲瑞亦惟寂公之能紹家學有以啓發王心收中興之烈焉夫昔人於伽藍廢興恆有慨乎言之謂可以覘世運則豈惟是物力之豐嗇云爾哉抑三代下人心轉移離合之機於是乎在本朝家法儒佛並重大內供奉聖像日祭月祭季祭及堂子立杆大祀諸典禮既勒為專書復特命纂入會典頒示中外蓋惟聖知聖導俗無方因其所明而默寓勸懲凡以同好惡而一觀聽為天下後世慮者至深且遠夫是以近數十年來教觀雖衰世相亦壞而殊方絶區不經之説終不得大逞於時其效可覩已天高聽卑無往不復昨歲五月至八月甘泉復清山中人色喜相告謂大師有靈門庭當復振願返侵地而受役焉四十世法嗣曦公感其義以狀謁錢唐許君息庵謀集資息庵方校刊台家書又適得淨名經疏於海外為自來南北藏所遺本機感之捷宛與昔符遂捐金若干為之倡而以其募啓屬余余復何言哉夫台宗者法門之管鑰而佛海之梯航也將欲蠲敝崇善翊皇度而破羣邪道固莫先於此曦公徐俟之世必有大勢力而高識遠覽如錢王其人者出而荷據斯事俾萬億器界含生之倫屹然見東土小釋迦法幢再建已信者增進未信者回心於以報佛深恩同扶聖化則固不獨一家子孫之私幸也曦公其勉旃教網弛而更張福田曠而復闢追美螺溪在此時矣余復何言哉爰歡喜踴躍識其緣起以告諸方時光緒六年夏五月謹撰補玉峯師念佛開心偈六首念佛求往生念念括三藏切忌泛騖心自疑執著相不見大本言專念貴一向念佛求往生念念福慧聚切忌下劣心自疑當不起不見中本言心作即心是念佛求往生念念應佛願切忌欲速心自疑無效驗不見小本言臨終佛親現念佛求往生念念入佛智切忌巧見心自疑尚迷昧不見六方佛護汝終不退念佛求往生念念罪消滅切忌恐怖心自疑不得力不見本師判下品多惡逆念佛求往生念念證淨滿切忌計較心自疑行解淺不見彌陀言十念亦入選達磨祖師像讚盡道西來傳佛心印正眼看時一場笑柄肩頭擔子腳跟蘆畫取形模堪作證誰作證萬代兒孫墮坑落阱又指畫像讚不現浮圖不出師子畫此老胡似則似矣祇得其皮不得其髓賴有腳跟一葦而已安得天龍快刀救取者張好紙免教無相主人更索未還跋尾大通智勝佛拈頌廣昱和尚問大通智勝佛十劫坐道場四句作麼生會拈頌答之月到中天絶點埃沈沈夜氣鎖樓臺一聲破曉金雞唱萬戶千門蕩蕩開末句原作次第開和尚改抹之作一時開謂曰居士者箇還有次第麼余甚心折但於理則頓悟事須漸修二語義未圓今易蕩蕩靜坐針歲乙未辟地滬上作此以規我友亦用自省蟄爾身利用晦也息爾機以遠害也虗舟是居泛無繫也蓬纍而行樂亦在也勿處下而窺高勿楮小而懷大慎爾內閉爾外往者勿追留來者勿逆計也綿綿其若存其有守氣也寂寂而常惺時哉其不可再也微乎微乎其審諦乎幸此須臾其澄然無事乎不深根寧極於此狂走而愈迷其不殆乎戒之哉一世亂而吾國自治一國亂而吾家自治一家亂而吾身自治古之人有行之者諄諄其爾悔矣爾庸罔念聞匪散伊昏終沒溺於尤悔矣噫留仙閣頌有序另録居士無相遊戲華藏蟬蛻塵障以多善根福德因緣轉本願輪有大寶閣莊嚴淨樂八藏具足與其同倫校理其間提要鉤元由是法喜觀諸教體即寶閣比體本無生土木丹青常説常聽閣亦本幻登降照爛惟是心觀心觀云何二十三科會極須摩家珍自數觚繩豪斧式廓靈宇五衍三乘堂陛襲仍高軋霄崢經部木叉前導草鞋緊峭許汝親到律部奧窔開通四日並中八聚致功論部是三總別一多多一門庭秩秩目録部爰有總持多聞遍知方便階梯纂述部升高自下文字般若歌唄陶寫詩歌部半滿書篇華梵量詮管籥寄焉音義部初桄一步工巧術數亦驥之附藝術部於顯樂彌陀願王導歸故鄉妙蓮一瓣門千戶萬直入一貫淨土部二密三宗冥應絶蹤即此蓮宮祕密部二華二教唯識閫奧亦此深造教觀部直指單傳回途重關到此心安禪宗部邪師暗證旁門曲徑由此勘定疑偽部豈無纖塵汜篲時勤還清淨門懺摩部亦有緣纍人天寄位得安樂地雜集部嗟去來今幾輩登臨傳寫光音傳記部前身賢護金湯永固萬劫常住護法部如是圓觀東震西乾現一毫端正像末法珠函寶笈同此結集鳳子翩翩來自鈞天仙乎其仙為如來使為本光瑞為密印記我聞儒書天祿校儲精感星符矧茲寶所宗龍義虎神明之府爰崇其靈爰落其成錫以嘉名名字無性我我所淨獨留讖應即土即身法界一真巋然長存
