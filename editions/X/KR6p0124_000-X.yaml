body:
  text: 報恩論報恩論目錄卷首恭錄列聖護法綸音證經十二則答問二十五則卷正上淨土法門綱宗無量壽經綱宗往生正因定論辨正五逆謗法不得往生說二教通喻雜說二十五則代眾回向發願疏寫經記卷正下醒迷歌五十章勸俗歌五十章往生公據阿彌陀佛禮想儀戒殺懺願偈附錄慈雲懺主懺願文附一法治四病說改正玉峯師作原名四大要訣改定僧玉峯摩崖圓滿白眾偈小霍山摩崖道場寫經始末記續出上卷多說理性下卷先以兩歌斷疑生信次以公據等三篇專說事修而末篇之說遂附及之者所謂應病與藥期於病藥雙忘性修不二而止世界無盡未來無窮區區本願具在代眾回向疏矣度必有無量發心菩薩覧而興起者佛法世法真俗圓融之本旨庶幾普徧昌明歟其卷首卷附諸篇無非欲發明此旨已詳卷首述意篇子簡既為寫錄隨依香巖例句讀圈點之為令閱者易於醒目文人批尾陋習固不暇避也其用意良苦有心人應共諒爾未還謹識卷附上鍾子勤夫子書以下三書勸讀書人兼論道家其二其三穀梁補註再書後是篇以天佛聖合言之可見道無方體當下即是說異說同祇成戲論致楊仁山書代許息安善生經序精嚴寺同戒錄序代妹𦕓劉頌年作此篇勸官長護法維繫民心又序此篇勸信入法門者可證禪教律三宗統歸淨宗攝無不盡天台縣護持叢林永禁私佔示代妹𦕓劉頌年作可為護法榜樣募修揚州高旻寺正殿疏代寺僧了凡作勸緇素各安本分即俗恒真募修真覺寺緣起勸法門中人護持台教陰翊皇度崇正辟邪補玉峯師念佛開心偈六首達摩祖師像讚又指畫像讚大通智勝佛拈頌靜坐箴留仙閣頌經正民興說續出列聖護法綸音報恩論卷首順治十五年九月世祖章皇帝敕諭玉琳通琇國師書朕惟立綱陳紀敷政而易俗移風見性明心傳教以牖民覺世考其功業則事有殊途論厥精微斯旨歸同軌然遡無生之真諦不緣意象以求證般若之妙源非因文字而顯欲問大千之覺路先皈不二之度門賴初祖之既來遂灋衣之不絕燃燈而照昏瞶建鼓以醒愚聾爰指善誘之津誕施方便之力付灋將逾百代知名何僅千人莫不宗旨共扶流風大闡用慈悲而度天下佐平治以化民生允有裨於盛時故恒尊於歷世茲聞爾僧通琇慧通無始智洞真如續五葉之正宗萬灋從而歸一屏六根之邪識四大是以盡空掃末世之狂禪秉如來之正覺誠超生融之學而迥播觀摩之名者也朕俯詢灋器緬想高風思御宇以來期沛無為之治而虗席以待樂聞無漏之因用是特遣司吏院掌印官張嘉謨頒賜璽書遠延杖錫爾其遄驅象馭早踐龍墀陳密義之慧空贊皇猷之清淨嗚呼順風而問朕將同訪道于崆峒計日以來爾尚效朝宗之江漢欽哉故諭又順治十六年四月朕維教闡西乾灋流東土付妙心於四七傳正果於二三莫不以參悟透脫者為真乘操履純一者為灋器故南嶽不汙垂護念於庾嶺馬師大用揭震喝於雄峰以至滹水建黃檗之宗高峰繼雪巖之緒源遠流長良有以也朕殫心誠正遜志危微務期於道岸誕登允懷乎德修罔覺因念夫禔躬立政聿本於見性明心大道本同精義無二緬思宗派必有高人聞爾禪師通琇臨濟嫡傳笑巖近裔心源明潔行解孤高故於戊戌之秋特遣皇華之使聘來京闕卓錫上林朕於聽覽之餘親詢釋梵之奧見其機鋒峻利論義圓通直指向上之關信稱諦當證徹無生之旨不落言詮實獲我心深契予志間泛及於眾說亦博綜乎百家名理恒超決疑無滯洵灋門之龍象禪苑之珠林者也用是特降褒綸賜號大覺方欲久留瓶鉢時聽伽音冀朝夕之啟予庶默成夫元旨而禪師欲全子道祈盡孝思堅請還山勉襄石塔遠追目犍連之度母近承陳尊宿之養親有裨人倫克端風化朕俯徇其願敕護遄歸惜山川之既遙倐夏秋之已隔永言遺韻惓惓於懷追惟對御之言實發大乘之秘傳燈可續末灋所希爰是復降溫綸加封大覺普濟禪師賜以紫衣並予金印遣使齎往昭朕眷衷重揚灋席之輝永鎮山門之寶於戲龍章載錫式增慧日光華椹服新頒克紹佛衣灋數祈承顯命益勉勤修欽哉故諭又自杖錫南還時勤企念五湖煙景三江秀麗荷衣松食致足樂也閶闔風至秋色依依益深白露伊人之想自邇以來企徹禪宗勤心灋寶慨佛果應庵之後差近閴寂今雷音雖震而北方猶若未聞故末灋比邱少奉戒律其口談無而行在有者又如麻粟也茲欲於都城建立皇壇俾衲子一千五百人眾受毗尼戒七條一縷出自上方五戒三皈重宣佛義然非禪師親為羯磨正恐以最上慈航為人天階級耳惟冀荷擔如來闡明大灋不辭遠道惠然肯來則皇城四眾重聞薝蔔之香新學緇流頓長菩提之樹知禪師以佛灋大事為先不以靜退小節縈念也遙瞻浮渡速慰悠懷康熈四十年嘉平月聖祖仁皇帝御製補陀羅迦普濟寺記稽考梵書補陀羅迦山有三一居厄納忒黑一居忒白忒一居南海即是山也本山誌書未得其詳當年海寇猖狂凡禁海之外寺宇梵剎皆為灰燼自康熈二十二年蕩平臺灣海波永息故遊方衲子因舊基址斬蓬蒿艾藜藿而更新焉朕時巡浙西特遣專官虔修淨供敬書題額永鎮山門復發帑金重修寺宇務俾殿堂廡牖丹碧華燁棼橑煥美而一木一石悉出公家一夫一役不煩民力上為慈闈延禧下為蒼生錫祉也朕自弱齡誦讀經史以修齊治平為本未暇覧金經貝葉空寂泡影之文所以不能窺其堂奧槩而言之元者善之長也佛者以善為本推而擴之大約無二上天好生化育萬彚大士慈悲度盡眾生亦無二也朕求治勤民四十餘載矣今者兵革已銷而民生未臻康阜梗頑雖化而民心未盡淳良皆因水旱靡常豐歉各異此朕寤寐孳孳不能釋也以大士之力庶幾慈雲法雨甘露祥風使歲稔人安萬姓仁壽則普濟之弘功即時雍之上理是朕之心也夫爰書翰簡勒諸穹垂示無盡云又御製重修天竺寺文朕御麻凝庥心周區域省方設教蹕駐山湖眷茲民力於東南詎止皇輿之名勝若迺因其舊蹟無侈前觀則天竺寺之所由以重修也粤惟鷲嶺著於西方法輪則一竺峰麗於南國名剎維三固緇梵所薰修亦僊靈之窟宅潮音送響遙接普陀塔影橫空長留舍利瑞光發於㵎上奇木像大士之容白衣感夫夢中淨域建看經之院或旱乾間作禾麥告枯而幡蓋來迎霪雨濡足有禱輒應無福不臻斯固歷晉宋以迄今實亦載簡編而可信意者能仁之量等於好生佛道之成關乎民隱推斯指也不其偉與將使般若之門隨方而啟仁壽之域舉世咸登有其興矣曷可廢哉朕曩者親奉慈闈式臨茲宇自芳湖而西顧望初地以南循輦過花迎旌迴雲捲巖深乳竇含真珠之寶光峰轉飛來帶琉璃之紺色百靈斯護七聖不迷既祝我皇太后壽履康甯復冀凡茲庶民室家盈慶然則迦釋之弘慈與國家之布德豈有殊也顧念山靈如昔寺貌未新我皇太后為國發心為民祈福時申慈命重葺香林茲役之興不妨民事凌雲再煥將無乾竺之靈匪日成功實篤坤元之慶恒沙國土偕常樂以同升億萬蒼生享太平而無極是則我皇太后之聖心依然迦釋之心而於朕經營天下利濟生民之心亦適有愜也夫雍正元年六月十八日世宗憲皇帝硃批浙江巡撫臣李馥奏再諭溯道統之傳堯舜以至周公孔子聖聖相承精一不雜原無藉於釋道自漢以來三教流傳炳若三光屹然鼎峙歷千百年而不廢不墜豈非道並行而不相悖歟吾儒正心率性釋家明心見性元門修心煉性以言乎體則同聖人之明德新民如來之自利利他太上之度人無量以言乎用又同中庸曰戒慎乎其所不睹恐懼乎其所不聞內典云六塵涉境心不隨緣道德經云不見可欲使心不亂以言乎進修工夫亦未嘗不同何下士往往以管蠡之見縱橫辯駁以逞其胸臆蓋止據形迹而論而實未窺其奧蘊也其言以為二氏之學全無關乎世道人心而孰知有不然者夫積善之家必有餘慶積不善之家必有餘殃理載於周易善惡之報如影隨形義著於感應篇四生六道因果輪迴之秘諦散見於大藏諸經其所以警戒提撕誘掖獎勸若合符節究其指歸無非勉人為善而已况細而閨闈里巷遠而海澨山陬有不可以禮樂維持詩書訓導者而二氏之教皆足以感發其皈向之誠消磨其隱微之慝由是觀之釋道甯無補於王化也哉試問中國將此三途去二留一能乎否耶不能則何必分門立戶互相排擠有若聚訟然顧茲末法黃冠緇流下愚者多率皆餓夫懶漢苟希利養以故招提蘭若竟成藏垢納污之地此輩猶如穀之有稗粟之有粃惟在分別孰稗孰粃豈可併穀粟而概棄之乎朕向來三教並重一體尊崇於奉佛敬仙之禮不稍輕忽每見章句之士鄙薄二氏動輒輕蔑擯斥而託名理學者尤甚及考其操履與理學真詮又大相徑庭此不過井蛙籬鷃之徒耳何足與較浙江俗稱僧海乃衲子卓錫勝地近十年來不特指月清機宗風透徹者罕見即精通教律者亦未聞其人叢林凋謝可勝太息汝仰體朕意於公務之餘留心護持使不至過於寥落傾頺不必著相莊嚴也此諭汝自領會毋令眾知何也士子聞之徒為好佛之譏釋子聞之致增我慢之相其中庸流或因而縱肇甚至紊亂清規有千法紀是朕憐之而反害之也密之又雍正二年四月十九日上諭內閣前有條奏婦女入廟進香成羣聚會混雜行走妄費無益及入于別教妖言惑眾理宜禁止者曾降旨准行但並非禁止民人于名山寺廟中禮拜也今聞凡係寺廟概行禁止不許民人叩拜又往𩫶髻山進香人等于金盞河地方掛號取稅皆與朕旨不合其禁止太過之處在京著禮部查明具奏金盞河地方交與直隸巡撫令其查明具奏又雍正八年二月初三日硃批福建巡撫臣劉世明奏但應禁止邪教惑眾從未有禁人喫齋之理此奏甚屬乘謬之至朕不解汝具何意見而云然若將此等無理妄舉以為盡心任事實力奉行則大誤矣既云年老願齋者聽而闔家大小喫齋者又欲坐罪更屬可笑之談如於一家老者小者飲食之際稽查某齋某不齋其紛擾為何如耶觀一切辦理覆奏不但浮泛不實且每多乖張失指大有心志惶惑光景嗣後仍不痛自儆省加勉誠敬則朕恩殊為可惜也又雍正十一年二月十五日上諭內閣朕惟三教之覺民於海內也理同出於一原道並行而不悖人惟不能豁然貫通於是人各異心心各異見慕道者謂佛不如道之尊向佛者謂道不如佛之大而儒者又兼闢二氏以為異端懷挾私心紛爭角勝而不相下朕以持三教之論亦惟得其平而已矣能得其平則外略形迹之異內證性理之同而知三教初無異旨無非欲人同歸於善夫佛氏之五戒十善導人於善也吾儒之五常百行誘掖獎勸有一不引人為善者哉昔宋文帝問侍中何尚之曰六經本是濟俗若性靈真要則以佛經為指南如率土之民皆湻此化則吾坐致太平矣何尚之對曰百家之鄉十人持五戒則十人湻謹千室之邑百人持十善則百人和睦持此風教以周寰區則編戶億千仁人百萬而能行一善則去一惡去一惡則息一刑一刑息於家萬刑息於國洵乎可以垂拱坐致太平矣斯言也蓋以勸善者治天下之要道也而佛教之化貪吝誘賢良其旨亦本於此苟信而從之洵可以型方訓俗而為致君澤民之大助其任意詆毀妄揑為楊墨之道之論者皆未見顏色失乎瞽之說也朕居藩邸留心內典於性宗之學實深領悟御極以後宵旰靡遑且恐啟天下以崇尚釋教之疑是以未嘗形之談論欲俟庶政漸理始舉三教合一之旨提撕警覺以明互相詆毀者之非今逾十年矣聽政餘暇偶將朕之所見並昔人論說數條舉以示天下之學道者古人有曰周孔六經之訓忠孝履其端李老二篇之言道德創其首瞿曇三藏之文慈悲為其本事跡雖異理數不殊皆可崇可慕者又有曰儒以正設教道以尊設教佛以大設教觀其好生惡殺則同一仁也視人猶己則同一公也懲忿塞欲禁過防非則同一操修也又有曰以佛治心以道治身以儒治世又有曰佛之言性與諸書同聖人同其性則廣為道德人能同誠其心同齋戒其身同推德於人則可以福吾親可以資吾君之安天下又有曰佛之道與王道合王道者皇極也皇極者中道之謂也佛之道亦曰中道不偏不邪其旨相同又有曰佛教之設使人棄華而就實背偏而歸善由力行而造於安行由自利而至於利彼其為生民之所依歸者無以加矣又有曰人謂釋氏惟務上達而無下學不思釋氏之六波羅密由禪定而到彼岸豈非下學上達之旨乎又有曰天下無二道聖人無兩心蓋道者先天地而生亘古今而常存聖人得道之真以治身以其緒餘土苴治天下國家豈不大哉故聖人或生於中國或生於西方或生於東夷西夷生雖殊方而其得道之真若合符契未始殊也以上數條皆於聖賢之理同流共貫未見其為謬異也三教雖各具治心治身治世之道然各有所專其各有所長各有不及處亦顯而易見實缺一不可者夫習釋道之學雖有偏有正而習儒者之學亦有真有偽即如釋中以狂空欺世道中以邪術愚人是固釋道之罪人也亦如儒中博覧詩書高談仁義而躬蹈亂臣賊子行之者謂非名教之罪人乎若掩人之長而斥其短隱己之短而誇其長互相肆口詆排者皆私詐小人形態非仁人君子懷德抱道之所為亦徒見其不自量耳數年來有請嚴禁私自剃度者有請將寺觀改為書院者有縣令無故毀廟逐僧者甚至有請僧尼悉行配合夫婦可廣增人丁者悖理妄言惑亂國是不思鰥寡孤獨為國家之所矜恤彼既立願出家其意亦為國家蒼生修福田耳乃無故強令配合以拂其性豈仁君治天下者之所忍為乎因皆下愚小輩朕亦未窮治其妄誕之罪至於品類不齊其中違理犯科者朝廷原有懲創之條而其清修苦行精戒明宗者則為之護持其邪說外道則嚴加懲治如道忞行峰之紀載謬妄法藏弘忍之魔說猖狂朕悉降旨指摘決不令混冒正法以致真偽罔辨也朕於三教同原之理探溯淵源公其心而平其論令天下臣庶佛仙弟子有各挾私心各執己見意存偏向理失平衡者夢覺醉醒焉故委曲宣示以開愚昧凡有地方責任之文武大臣官員當承事朕旨加意護持出家修行人以成大公好善之治特諭又御選圓明居士語錄有儒士問三教之同異王云若論以內三教實同一道不可泥於迹象涉於事為而妄生分別也儒以修齊治平設教道以虗無清淨設教究其所以示人者不能外者箇而釋教亦不捨離者箇既不捨離即此內而言則不謂之一貫不可也若以之外周孔黃老之書未言及此能明此者惟有釋典耳下士愚盲小智見淺謂以內尚不明了何暇究以外不知以內者倚以外者而立若不明以外則以內無論不能頓地透脫即使到得盡處猶有者箇在人但知拘滯生死不知窮其無生不死此一大關惟此一路方透即以佛教而論如講演戒律何嘗不與宗為一貫必須宗為之統攝離宗則盡屬幻作宗乃第一義也然一亦不立方是佛旨即此觀彼自明三教分合之定論圓明寧甘汝等迂儒之謗斷不忍令眾生長溺苦海而不拯救指迷也士聞愕然諾諾而退乾隆元年高宗純皇帝諭朕前以應付僧火居道士竊二氏之名而無修持之實甚且作姦犯科難於稽察約束是以酌復度牒之法使有志修行者永守清規而無賴之徒不得竄入其中以為佛老之玷其情願還俗者量給資產其餘歸公留為養濟窮民之用此亦專為應付僧火居道士而言也名山古剎閉戶清修者在所不問前降諭旨甚明現交與王大臣九卿會議乃聞外省傳述錯誤一切僧道皆有惶惑不安之意恐將資產歸公遂爾弊端百出有將己身田宅詭寄他人戶下希圖藏匿者有謀囑書吏分立花戶詭名以多報少者有減價速求售賣變銀入橐者且有局外匪類從中藉口索詐者夫此僧道既謀利戀財如是揆之仙佛之法乃糠粃稂莠也即取其私橐歸公以養濟貧民亦何不可之有天下後世自有公論但朕之本意原以天地好生之心為心一物不得其所如己推而納之溝中此庸愚無知之僧道亦天下之一物耳朕何忍視同膜外況朕先所降旨甚明原以護持僧道而非有意苛削僧道今觀伊等情形是愚昧無知被人恐嚇而不知原降之諭旨也著該部先行曉諭去其迷惑至於應付僧火居道士之資產因無所歸著是以有養濟窮民之說究竟國家養濟窮民豈需此區區之財物亦可不必稽察歸公此處著重議具奏附大清會典事例一則僧道將寺觀各田地朧投獻王府及內外官豪勢要之家私揑文契典賣者投獻之人問發邊衛永遠充軍田地給還各寺觀其受投獻家長並管莊人參究治罪謹案此條係原例又乾隆五年改定問發邊遠充軍田地給還應得之人又乾隆三十二年御製寶相寺文歲辛巳值聖母皇太后七旬大慶爰奉安輿詣五臺所以祝釐也殊像寺在山之麓為瞻禮文殊初地妙相端嚴光耀香界默識以歸既歸則心追手摹系以贊而勒之香山南麓曩所規菩薩頂之寶諦寺在焉迺於寺右度隙地出內府金錢飭具庀材營構蘭若視摹而像設之金色莊嚴惟具惟肖寺之制甃甓幕圜不施杗廇桴梲而崇廣閎麗則視殊像有加經始於乾隆壬午春越今丁亥蕆工既敬致瓣香而慶落之所司礱石以俟因記之曰文殊師利久住娑婆世界而應現說法獨在清涼山固華嚴品所謂東方世界中菩薩者也夫清涼在畿輔之西而香山亦在京城之西然以清涼視香山則香山為東若以竺乾視震旦則清涼山又皆東也是二山者不可言同何況云異矧陸元暢之答宣律師曰文殊隨緣利見應變不窮是一是二在文殊本不生分別見倘必執清涼為道場而不知香山之亦可為道場則何異鑿井得泉而謂水專在是哉且昔之詣五臺禮文殊所以祝𨤲也而清涼距畿輔千餘里掖輦行慶向惟三至焉若香山則去京城三十里而近歲可一再至繼自今億萬年延洪演乘茲惟其恒是則余建寺香山之初志也寺成名之曰寶相綴以偈曰曼殊室利七佛之師經歷人間至福城東東方世界名曰金色常在其中而演說法摩竭陀國其東五峯是名雪山惟清涼境金剛窟聚北代州是大士示現妙相莊嚴振大法輪坐師子座師子奮迅具足神威中臺現身寺曰殊像我昔瞻禮發大宏願虔誠祝𨤲普諸福緣相好印心如月在水即幻即真證真幻相以此真幻還印金容香山淨域多祇樹園寶諦之西營是寶相莊校七寶晃耀大千日面月面了無分別我聞如是文殊應緣緣即隨緣何有彼此矧東西方因見生名見即不拘名亦不著清涼香山非二非一復念文殊菩薩久住而此世界實曰常喜以常以久延祝慈禧惟願自今歲萬又萬寶算盈積如恒河沙獲妙吉祥生大歡喜以是因緣壽復無量報恩論卷首桐鄉沈善登述海鹽張常惺校錄造論述意千經萬論處處指歸淨土者祇是教人從現前一念動處著力大本無量壽經所謂閉塞諸惡道通達善趣門兩言盡之矣光緒戊寅春為杭州小霍山摩崖事與張子簡常惺等結壇鄧尉聖恩寺念佛寫經寫畢造此論一壇共五人以三為班輪轉五十三晝夜不斷聲限香進退故祇能據魏譯大本直抒胸臆隨口誦出子簡錄稿晝凡四輪退息各三刻積十二刻支支節節而為之越兩旬餘方成得文五篇雜說二十五則詩歌共若干章都凡二萬餘言依三藏例統名為論因摩崖山名適符本朝壽嶽伏念列聖家法相承宏揚佛教與儒並隆深恩至計保我子孫黎民萬世永賴故取寺名一字題曰報恩庶幾覽者相與護持以維繫人心共圖報答論出後傳鈔頗不乏人今忽忽二十年矣老病日深不能復進欲刊布之而慮自來說淨土者濫入禪宗高談元妙佛法世法打成兩橛則全失如來設教本旨而於此反增疑障故復徧引淨宗諸經并注解之以證明論義列於卷首而寫經前後所說有相關涉者別編一卷附焉凡夫鈍根讀書少涉世淺見理粗未知孔教如何佛教如何但知自古至今未有離却萬億愚賤之心而可以為教者未有支離刻覈使人救過不暇而可以教民者未有有民不教聽其放辟邪侈而可以為國者未有君民同一教士大夫別一教而尚能用其民者未有不能用其民而其國不衰弱能用其民而其國不強盛者如是而已故自貢其醜拙以俟十方緇素及當代賢士大夫教政之尚冀餘生得有所聞渙若沈疴之去體云爾光緒丁酉夏沈善登識證經十二則佛說無量壽經魏康僧鎧譯云佛告阿難十方世界諸天人民其有至心願生彼國凡有三輩其上輩者捨家棄欲而作沙門發菩提心一向專念無量壽佛修諸功德願生彼國此等眾生臨壽終時無量壽佛與諸大眾現其人前即隨彼佛往生其國便於七寶華中自然化生住不退轉智慧勇猛神通自在是故阿難其有眾生欲於今世見無量壽佛應發無上菩提之心修行功德願生彼國佛告阿難其中輩者十方世界諸天人民其有至心願生彼國雖不能行作沙門大修功德當發無上菩提之心一向專念無量壽佛多少修善奉持齋戒起立塔像飯食沙門懸繒然燈散華燒香以此迴向願生彼國其人臨終無量壽佛化現其身光明相好具如真佛與諸大眾現其人前即隨化佛往生其國住不退轉功德智慧次如上輩者也佛告阿難其下輩者十方世界諸天人民其有至心欲生彼國假使不能作諸功德當發無上菩提之心彌陀疏鈔云智論五菩提心一發心菩提謂於無量生死中發菩提心也而持名正於凡夫生死心中起大覺故二伏心菩提謂斷諸煩惱降伏其心也而持名則正念纔彰煩惱自滅故三明心菩提謂了達諸法實相也而持名正即此一心明了一切諸法實相故四出到菩提謂得無生忍出三界到薩婆若也而持名即得一二三忍㨗超生死趨一切智故五無上菩提謂坐道場成最正覺也而持名則得不退轉地直至成佛故一向專意乃至十念念無量壽佛願生其國若聞深法歡喜信樂不生疑惑乃至一念念於彼佛以至誠心願生其國此人臨終夢見彼佛亦得往生功德智慧次如中輩者也論據此譯故列於前謹按此經有漢魏吳唐宋五譯而此魏譯文辭詳贍義理圓足故自來講家多據之唐譯差與相近蓋同一梵本也宋譯亦甚明暢而辭句前後大異又一梵本也漢吳二譯文辭拙歰而義有相補備者則又一梵本也其所以不同之故略攷諸經約有三端一則譯手巧拙不同也如楞伽三譯金剛六譯及此小本兩譯皆是此類文小異而義大同足見梵本之一例如儒者解經各有短長蓋以華文化梵語是橫繙也以今人解古書猶直繙也其於原本畢竟非一非二而善讀者就此參觀互考以意逆志自能得之一則梵本傳寫不同也此類義同而文多寡大異密部諸呪最顯而易見佛以一音演說法眾生隨類各得解大經大會記錄自不一手傳鈔浸廣久而沿譌作偽皆人情事理之常統亂六師鉢碎五分迦釋阿難結集多至四次正為此也例如兩楹夢奠後七十子之徒友教四方六經傳本各自成家奚待祖龍始焚繚鶴迨法流東土去聖愈遙張霸劉歆王肅之徒何國蔑有隋唐之際別編疑惑偽妄二門足為中流砥柱矣讖緯概託孔門後世遂動稱符命葢以多知尊聖人以神通眩佛法其弊必至此矣大雲經之偽閱藏知津已辨之若儒童菩薩之為孔子大迦釋之為老聃明是梵僧巧見因道家偽造老子化胡經借以報復特牽率孔聖以泯其迹而宗鏡錄乃徵引不疑者則如李長者之借易釋華嚴欲以間執迂儒疑謗之口非出本心諸如此類宏得有大雅宏達盡通漢唐以來諸儒門徑及其用心之處然後博觀全藏而分類校訂之為之執鞭所欣慕也一則本師前後宣說不同也四十九年說法大半本諸先佛遺經迦釋佛涅槃時藏諸珠函并作書一通囑付樹神迨本師出世傳授之說見廣宏明集梵網法華文有明證所以本經讚德文中有博綜道術貫練羣籍二句而四十二章經亦以廣學博究為一難如壇經出後人人籍口六祖法門之所以日衰也阿難出家時先與佛約以前所說諸經未曾聞者請佛重說佛許可之說見釋迦三譜不記出何一種阿難所指葢即遺經若佛平時與弟子泛說法要如四諦六度十二支十八處等寥寥數十言藏中多集為經豈能一一重說不言可知彌陀成佛在十劫以前十方諸佛無不讚歎例如孔孟動稱堯舜佛佛道同本師三百餘會說法既多指歸淨土則自然屢說不一說而亦隨時隨機開通大意依義不依語顯然可知例如論語稱知仁勇祇三言耳而前後序次不同稱不患人之不己知祇兩言耳而四見各異世間經師尚不貴記問之學況在佛智此經之所以多譯而又見前兩種之不同也至王龍舒彚集之本以意棄取自不足記近邵陽魏氏所訂更不必論矣又按此經三輩皆善類觀經九品有惡人兩說互異而實相足相成蓋眾生因地萬別千差不特三三無盡九九亦無盡緯以四土相望更覺懸殊此經上輩當出家中下二輩當在家乃從其多數粗舉大凡故云凡有三輩觀經就此大凡略開為九而又極其優降以括無量行因之不齊其大意以五品以上約四聖以下約六凡極其優則自初信以至等覺皆在其中故智者大師僅登五品非在家也劉遺民三度見佛衣覆手摩自當上輩非出家也而凡蓮宗諸祖及維摩賢護等一切緇素名德之往生者例推可知矣極其降則自五停心以至一切含靈皆在其中故中下品內有但四禪非謂盡屬但四禪也下二品內有五逆非謂盡屬五逆也而凡初心邪外及六道三塗一切緇素常流之往生者例推可知矣若齊文定旨則六道缺二三塗僅一觸途成滯云何可通三輩皆善類者彌陀本願十念往生唯除五逆謗法者謂極惡重罪不通懺悔餘惡雖重可悔非謂可作也故本師云諸欲往生彼國者雖不能大精進大要當作善悔則改過遷善同歸於善喻如畔逆投誠自許立戰功義在勸降豈云賞盜大聖作用張弛隨時世出世間理無二致至九品有惡人者正是時節因緣不同已詳辨於論中無取和會言各有當諸經不可和會者甚多此經彌陀本願說五逆謗法不得徃生唐譯本亦說不得徃生惟觀經一說得徃生故疏鈔釋之辭理皆極意斟酌並不和會乃後人巧見必欲和會以稱能且不以一本牽合多本反以多本牽合一本以為如此方見淨土收機之盡然則彌陀本師說法皆不免三滲漏乎我不知其居心為何等也佛說無量清淨平等覺經漢支婁迦讖譯云佛言其中輩者其人奉行施與如是者若其然後中復悔心中狐疑不信分檀布施作諸善後世得其福不信有無量清淨佛國不信往生其國中雖爾其人續念不絕暫信暫不信意志猶豫無所專據續結其善願為本續得往生其人壽命病欲終時無量清淨佛則自化作形像令其人目自見之口不能復言便心中歡喜踴躍意念言我悔不知益齋作善今當生無量清淨佛國其人則心中悔過悔過者過差少無所復及其人壽命終盡則生無量清淨佛國佛言其三輩者其人作是以後若復中作悔心意用狐疑不信作善後世當得其福不信往生無量清淨佛國其人雖爾續得往生其人壽命病欲終時無量清淨佛則令其人於臥睡夢中見無量清淨佛國土其人心中歡喜意自念言我悔不知益作善今當生無量清淨佛國其人但心念是口不能復言則自悔過悔過者過差減少悔者無所復及其人命終則生無量清淨佛國謹按此段吳譯本全同不復錄據此可見重在作善散心得生之明證阿彌陀經吳支謙譯云諸欲往生阿彌陀佛國者雖不能大精進禪定持經戒大要當作善一者不得殺生二者不得偷盜三者不得婬泆四者不得調欺五者不得飲酒六者不得兩舌七者不得惡口八者不得妄言九者不得嫉妬十者不得貪饕不得心中有所慳惜不得瞋怒不得愚癡此經原名佛說阿彌陀三耶三佛薩樓佛檀過度人道經謹按此段云云即魏譯三輩中下二品專指在家眾也全文已載論中今略釋之戒有多品皆以在家五戒為根本其云一者不得殺生等即就五戒而一反一正推言之耳五戒全持名滿分戒持三四名多分戒但持一二名少分戒從師求三皈并受戒者則名持戒已入戒品也無歸戒而自持者但名作善未入戒品也由少分漸加至滿分亦可名精進更受優婆塞戒漸加至菩薩戒則名大精進矣其實同是作善而分別言之者求受不破犯利益大破犯者罪過亦大未求受者反之大寶積經無量壽會唐菩提流志譯云阿難若他國眾生發菩提心雖不專念無量壽佛亦非恒種眾多善根隨己修行諸善功德迴向彼佛願欲往生此人臨命終時無量壽佛即遣化身與比邱眾前後圍遶其所化佛光明相好與真無異現其人前攝受導引即隨化佛往生其國得不退轉無上菩提謹按此段可見散心往生重在發願回向即魏譯本萬善迴向之謂也言隨己修行諸善功德者可見不論世法佛法但是善事皆可迴向專重發願也又云阿難若有眾生住大乘者以清淨心向無量壽如來乃至十念念無量壽佛願生其國聞甚深法即生信解心無疑惑乃至獲得一念淨心發一念心念無量壽佛此人臨命終時如在夢中見無量壽佛定生彼國得不退轉無上菩提謹按此段十念往生專指住大乘者言之大乘如禪宗得破參及讀一切大乘經典得解悟者皆是其人不專修淨土如智者永明之類而百丈清規以念佛津送亡僧自唐至今叢林多奉其教猶可見禪教律三宗究竟畢歸淨土不待辯矣無量壽莊嚴經宋法賢譯云復次阿難若有善男子善女人發十種心一不偷盜二不殺生三不婬欲此身三業諸經次序大概為出家說者不婬欲居首為在家說者不殺生居首觀經且於十善中特提不殺尤其明證而此獨以不偷盜居首或當時對機而發如魏譯本說少長男女共憂錢財云云或傳寫誤倒未可知也四不妄言五不綺語六不惡口七不兩舌八不貪九不嗔十不癡如是晝夜思維極樂世界無量壽佛種種功德種種莊嚴志心歸依頂禮供養是人臨終不驚不怖心不顛倒即得往生彼佛國土謹按此譯本宗旨與前數譯皆同而語氣前後詳略大異楊仁山居士依義分章并於三十六願下標提願意至為整贍此十善往生章次於持經持戒兩章之後可見專指世法凡是善行皆可往生但必常常念佛回向即轉世善為淨因故佛說諸經總兼世善而此十善業且特說專經以淨身三口四意三諸業為修持根本也佛說阿彌陀經姚秦鳩摩羅什譯云舍利弗不可以少善根福德因緣得生彼國舍利弗若有善男子善女人聞說阿彌陀佛執持名號若一日若二日若三日若四日若五日若六日若七日一心不亂其人臨命終時阿彌陀佛與諸聖眾現在其前是人終時心不顛倒即得往生阿彌陀佛極樂國土謹按明蘧庵師永樂時吳郡沙門諱大佑彌陀略解云靈芝疏載襄陽石本於一心不亂下有云專持名號以稱名故諸罪消滅即是多善根福德因緣彼石經本六朝人書竊疑今本相傳訛脫幽谿師天啟時天台沙門諱然燈圓中鈔云解中既云今傳訛脫凡讀習者應依古本而增正之稱讚淨土佛攝受經唐玄奘譯即羅什譯小本阿彌陀經云舍利子生彼佛土諸有情類成就無量無邊功德非少善根諸有情類當得往生無量壽佛極樂世界清淨佛土此數句什師祇作兩句其所以非少善根得生之故則略之故知此經譯本什師以簡要勝奘師以詳審勝二者參觀經意方能盡顯又舍利子若有淨信諸善男子或善女人得聞如是無量壽佛無量無邊不可思議功德名號極樂世界功德莊嚴聞已思維諸經說法要處先說聞思次說聞修者甚多此數句即先說聞思也什師祗作聞說阿彌陀佛執持名號兩句所謂舉重包輕也意原重在上句聞字辯已見前若一日夜或二或三或五或六或七繫念不亂此數句次說聞修也大本四十八願中有繫念我國句故此譯依用繫念二字大抵梵文是心念專一而不雜亂之意故什師譯作一心不亂此譯作繫念不亂若泥定華文一心二字解作理一心事一心則此譯亦可解作理繫念事繫念乎善讀者曷深思之是善男子或善女人臨命終時無量壽佛與其聲聞弟子菩薩眾俱前後圍繞來住其前慈悲加祐令心不亂此臨終佛力加被令得正念往生之明文也什師譯作是人終時心不顛倒二句省去慈悲加祐語意者以既先說臨終佛現於前乃說心不顛倒於後即其為佛力加被顯然可知故略之讀疏鈔者參觀此譯悉心體會自不至泥執一心不亂之難而生疑沮矣既捨命已隨佛眾會生無量壽佛極樂世界清淨佛土謹按蓮池疏鈔謂襄本二十一字乃前人解經語誤入正文混書不別緣上有執持名號四字不可更言專持名號上下重復不成文義云云竊疑蓮師此說別有深意不可泥也諸經本皆語錄平鋪直敘譯師祇能依其語之先後輕重繙成華文無可併省蓋併省則必有語意不貫不完處如以文法彌縫串合之不但失真轉多費力惟首末法會大眾及一切莊嚴功德等或剛繁就簡或舉重包輕如十方省作六方十號但稱如來之類參觀諸經之有多譯本者譯手巧拙自見此經無問自說通篇隨說隨解或先設問而後結釋或先虗說而後結正如國土名極樂佛號阿彌陀經名諸佛護念及眾鳥為佛變化等莫不上下語氣兩相呼應此段說不可以少善根云云正與眾鳥一段相類葢先說聞思次說聞修唐譯正如此詳見後其下兩句亦是虗說猶言聞說彼佛名號而信受之再下一日至七日云云方如實說依法修持專一稱名而不雜亂即為多善根福德因緣結證上句靈芝據石刻載入疏中蘧庵幽溪從而稱讚訂正之深合全經語氣葢梵夾皆寫本易致脫誤如漢譯大本經乃爾劫時下脫誤數十字文義不貫又四十二章經藏本與石刻趙文敏寫本及藏外流通各本章節前後多寡各各不同而與法苑珠林所引又不同且有一切經音義所摘字而諸本皆無者大抵誦習多則傳寫多而得失異同亦多情勢使然故唐譯本亦脫此二十一字無足致疑三師可謂法眼圓明矣若蓮師之說則有呼無應通體不類稱名之為多善根乃顯彼佛大願攝持之力全經宗要所繫本師於此豈反不直語正語而使聽者索解於言外乎且什師與蓮宗初祖慧遠師同時書問往還以道相推重遠師與十八高賢結社廬山東林提倡念佛法門什師此譯自必共傳習之襄陽之去廬山地亦不遠當蓮宗初開盛行之際寶此新譯傳寫流通至刻石以垂示將來何等鄭重安得誤以解經語混入正文而都不覺察揆之人情事理殆不可通藏經傳本固有沿誤而不可考者余藏有唐宣宗大中二年楞嚴陀羅尼石幢呪語文句與今所集藏本一字不同以華嚴字母還音求之亦大半不合此藏當武宗滅法之後宣宗立而復興眾姓建立以紀恩頌德安得有誤考之日本國校刊全藏經載有高麗國藏本楞嚴呪正與此藏全同按高麗僧至中國請經在唐中葉然則今藏本此呪之異文自宋始矣蓮師之意正欲主張一心不亂四字而乃直言以稱名故顯然歸重佛名號力而不歸重自心念力則與己所說理一心事一心等未免乖異幸唐譯亦無此二十一字故直斷為前人解經語以圓融之其不明言唐譯亦無者以唐譯作繫念不亂不作一心可見此之一心仍不過大本一向專念之謂六朝寫本原以一心不亂專持名號為一句猶言一心專持名號而不亂也初無深元而襄本二十一字縱使確是解經語亦可見自遠師以來解此經者從無偏重自心念力而不歸重佛名號力者故置之不論試觀臨終佛迎特讚稱名不讚餘行觀經有明文心不顛倒賴佛慈佑唐譯此本有明文萬善迴向散心亦得往生漢吳魏譯大本有明文疏鈔於此諸文概不引據但引王龍舒會輯大本其意可知也葢疏鈔之作原為當時豁達狂禪空腹高心撥無因果而儒家承姚江心學弊極之餘偏喜談禪薄淨土為著相是以專就上品往生立說極力主張一心不亂以抵禦折伏之所謂大權菩薩曲被當機應病與藥時節因緣應爾也余故於論中特解此段經文為尅期取證以斡旋之而詳辯於此善讀疏鈔者當參合諸本以觀其通庶可勸進初心妙合經旨而不負蓮師善巧說法之深意矣且蓮師亦自有圓融散心得生之說明載疏鈔讀者震於一心不亂下諸說不暇深思耳今并錄於後疏鈔卷四志眼法師云往生一門有二淨業一曰正觀默照本心也二曰助行備修萬善也二事俱得則了達四淨土矣如止得事善者近生同居遠作三土因耳故知淨土正究理菩薩所登境界而兼容悠悠眾生耳又云圓機體道是最上淨業苟加願以導之即預優品愚朴之輩但稱佛發願者亦生觀淨土一門則聖人無棄物也按所云正觀通乎上中所云助行通乎中下又法師此論極善觀者毋忽蓮師慎重引此讀者亟宜著眼觀無量壽佛經劉宋畺良耶舍譯云欲生彼國者當修三福一者孝養父母奉事師長慈心不殺修十善業二者受持三歸具足眾戒不犯威儀三者發菩提心深信因果讀誦大乘勸進行者如此三事名為淨業佛告韋提希汝今知不此三種業過去未來現在三世諸佛淨業正因謹按第一專指在家二眾言父母師長則包尊君親上可知殺盜淫為身三惡妄言綺語兩舌惡口為口四惡貪瞋癡亦名邪見名意三惡反是十者名十善業不殺居十善之首重言慈心不殺者自求往生極樂而令眾生劇苦橫死則與本願大相反故特提之以見殺業最重雖不持戒亦不可犯也第二兼在家出家大小乘戒第三則專指大乘凡後後皆兼前前前則不兼後就文自明大本言三輩皆發菩提心此第一第二不言者念佛即是菩提心詳見上註三輩兼論因果故出家居首此專論因故在家居首十善業等無非世間法但受人天福報而為三世諸佛淨業正因者華嚴十地菩薩皆不離念佛又念佛三昧經亦言三世諸佛皆以念佛得度則即轉人天因果為佛因果可見一切法門無非念佛又見一切佛法不離世法矣又云佛告阿難及韋提希下品上生者或有眾生作眾惡業雖不誹謗方等經典如此愚人多造惡法無有慚愧命欲終時遇善知識為說大乘十二部經首題名字以聞如是諸經名故除却千劫極重惡業智者復教合掌叉手稱南無阿彌陀佛稱佛名故除五十億劫生死之罪爾時彼佛即遣化佛化觀世音化大勢至至行者前讚言善男子汝稱佛名故諸罪消滅我來迎汝作是語已行者即見化佛光明徧滿其室見已歡喜即便命終乘寶蓮華隨化佛後生寶池中謹按阿彌陀佛四十八願中有云十方眾生欲生我國至心信樂乃至十念若不生者不取正覺惟除五逆誹謗正法故此品化佛來迎不讚聞經功德但讚稱名為其願力與本願力相應也又云下品下生者或有眾生作不善業五逆十惡具諸不善如此愚人以惡逆故應墮惡道經歷多劫受苦無窮如此愚人臨命終時遇善知識種種安慰為說妙法教令念佛此人苦逼不遑念佛善友告言汝若不能念者應稱無量壽佛名如是至心令聲不絕具足十念稱南無阿彌陀佛名故於念念中除八十億劫生死之罪命終之時見金蓮花猶如日輪住其人前如一念頃即得往生極樂世界謹按念佛與觀佛異觀佛須依經所說光明相好了了分明念則但凝神注想如對佛前此人苦逼心亂并此不能故勸令出聲稱名以助念力也至心者猶言專心致志也此章說九品生相經文或此詳彼略如上節言合掌叉手此節言至心等三句實互相補備也既言至心又言令聲不絕具足十念者正顯稱名威力之大與佛本願相應譬如遇賊追殺奔呼求捄爾時佈急之極或恐救遲或恐追近襍念勢所必有而要其呼求之心仍自十分真切昔人解此為信力念力二俱勇決可謂善於體會矣至五逆不得往生此經與大本經相違乃時節因緣論中已詳辨之又云若念佛者當知此人是人中分陀利華觀世音菩薩大勢至菩薩為其勝友當坐道場生諸佛家佛告阿難汝好持是語持是語者即是持無量壽佛名謹按此結語可見本師先說大本小本後說此本可見淨宗本旨專重持名葢往生彼國全賴彌陀本願以名接物大力攝持其為易行道者在此其為難信法者亦在此故此經特應韋提希之請開異方便令當來眾生現生親證以堅正信而仍結歸本旨概稱念佛又申結以即是持名者以名可賅相舉名而一切功德莊嚴自在其中如稱天而日月星辰在其中稱地而山川原隰在其中眾生妄想分別作觀難而稱名易故特鄭重囑付以顯名號本願威力之大稱名者一一聲中不啻親證一切依正功德莊嚴也然則往生之重在佛名號力可知矣而淨宗本旨之專念他佛仗他力並無自佛自力之說亦可知矣善讀者曷審思之大集賢護經隋都那崛多譯云爾時阿彌陀佛語是菩薩言若人發心求生此者常當繫心正念相續阿彌陀佛便得生也節阿彌陀如來告彼人言諸善男子汝當正念精勤修習發廣大心必生此也節阿彌陀佛復告彼言諸善男子若汝今欲正念佛者當如是念今者阿彌陀如來具有如是三十二相八十隨形好身色光明坐師子座沙門眾中說如斯法其所說者謂一切法本來不壞亦無壞者如不壞色乃至不壞識等諸陰故又如不壞地乃至不壞風等諸大故又不壞色乃至不壞觸等諸入故又不壞梵乃至不壞一切世主等節謹按千經萬論處處指歸淨土西方合論中已略具之修淨業者固當博觀全經而阿彌陀佛說法惟見此經密部摩護壇中徃徃有彌陀說法然皆梵呪故無可引合論失載故特節錄於此上云繫心正念相續下云精勤修習發廣大心者葢即大本一向專念萬行回向之意不壞色等者不離根塵界處也楞嚴二十五菩薩各說方便即其明證不壞梵者不廢諸天業休咎祲祥等也不壞一切世主者不廢十方國土王法人情等也此之謂立處即真此之謂當下即是此之謂唯此一身身外無餘此之謂是法住法位世間相常住此之謂今現在說法是故淨土法門但說事修不說理性極平極實正是極圓極妙而不許說圓說妙若必離平實而說圓妙則早不圓妙矣謹按佛勸父淨飯王歸心極樂淨土而未嘗棄捨王位七萬釋種同奉佛教亦未嘗勸令出家佛豈以其父與族黨不足與語圓妙而姑出於粗俗哉試觀諸經惟遺教專告比邱四十二章經係彼土高僧譔集故不論餘莫不稱善男子善女人兼在家二眾言之此理顯而易見也教判五時除第二鹿苑時說阿含小部諸經不論外其第一時說華嚴部末後以普賢十大願王導歸極樂而善財五十三參善知識在家者居十之八九童子如眾藝等雜流如船師等淫女如婆須密多等外道如徧行等皆與焉更何世法之可嫌也淨土說在第三方等部同部顯教諸經義類固應相通亦姑弗論密部教分三部金剛部以穢跡呪為總持此呪實說在涅槃時以其同為密部故備舉之蓮華部以大悲呪為總持瑜伽部以準提為總持三呪皆護持行人往生極樂皆許呪水治產難諸病準提並特開五葷不忌尤為方便則更何世法之拘礙也第四時說般若部般若為眾經母大小乘顯密諸教無不從此流出摩訶般若波羅密經六百卷窮元極妙義富文繁而天親菩薩造大智度論釋之謂佛說此經欲令眾生修念佛三昧得增益故此念佛不必專指西方而淨土持名法門自在其中且開卷先說六波羅密包括萬善其顯示般若反覆開譬不離根塵界處與賢護經阿彌陀佛所說一切不壞等非異非同則平實之正是元妙又何疑也第五時說法華涅槃部法華通敘如來說教本末開權顯實大暢本懷授記現前大眾皆得成佛又特現女人受持斯經往生極樂以作當來榜樣而其澈底開示直曰若人散亂心入於塔廟中一稱南無佛皆已成佛道又曰治世語言資生產業皆與實相不相違背然則一向專念之必成佛道萬善回向之不離世法不背實相較然可知而又何擬議也涅槃扶律談常最為平實明顯即以律藏論一切諸戒無不以在家五戒為根本廣之為優婆塞戒大本言無尊無𢍉無富無貧少長男女共憂錢財云云以近世人情觀之可謂千古一轍然即此可見佛法之圓融其下文言何不棄世事念道之自然者正謂何必徒多膠擾煩惱非謂當盡棄捐也如優婆塞戒經言善男子受優婆塞戒先學世事既學通達如法求財一分應供父母妻子眷屬二分應作如法販轉留餘一分應積俟用又言財物不應寄付四處一者老人二者遠處三者惡人四者大力云云然則依教奉行不但無礙世法且極精明學者自誤會耳又廣之為比邱二百五十戒無非就世法人情加嚴加密復約之為菩薩十重四十八輕戒統制出家在家七眾其隨時隨地開遮持犯無非圓融世法人情使不障礙非有別法也詳見蓮池戒疏發隱蕅益梵網合註而合註為勝發隱於殺戒中內色外色一條實誤不可從是以大本三輩往生在家居二皆以專念為正行萬善為助行其所謂善自恭敬供養諸佛事外不過就父子君臣夫婦昆弟朋友之間勤修身三口四意三諸業止惡進善五痛五燒章節節唱言獨作諸善即是翻上諸惡文理極明再三申勸全同小乘乃經前列眾歎德特創一切大乘妙典所未有直據本師示現受生示現苦行以至十相成道等會疏備詳其總結言如來出世本懷頓圓上上妙典在文明白誰容擬議味道君子請深著眼云云可謂知言因源果海引發當經此段歎德漢吳二譯無之寶積經中無量壽會唐譯本有之大同小異葢梵夾傳本間有異同諸經皆然類如儒書今古文家之別葢結集者深達如來此會時節因緣寄現前眾表現在法以見三世諸佛菩薩歷劫修證不離乎此而眾生現前介爾一念念佛之心直可現生取辦此其所以為易行道也龍樹菩薩語所以為實教也李長者華嚴合論誤判為權教袁宏道西方合論已辨正之純圓教也蓮池疏鈔判為分圓蕅益要解已辨正之所以當來經滅獨留也本經所以為適道教源濟俗要務也慧遠法師語所以為三根普被萬善同歸也永明禪師語所以一切剎海不能麗一切教網不能收也蕅益師語嗟夫眾生心量昏迷強弱之等差不可勝數四十九年中隨順說之何所不有至末後涅槃會上彈偏斥小歎大襃圓而圓教大法中無不指歸淨土則一代時教之本旨斷可識矣夫劫量無盡世界無盡眾生無盡此非耳目所能及而可意決其必然者也即專論現在劫中娑婆世界中國九州金人入夢至今耳可得聞目可得見矣其中眾生百千萬億分不可說不可說之多也所行之法無非飲食男女倫常日用等種種世法也而佛則如是若干眾中之一人也所說之法如是若干法中之一法也使佛意必離如是若干眾所行之法而後行我法其為偏小極已廢而不行久矣何待三武之暴諸儒之謗使依教奉行者必抑黜世法而後為護持佛法則其必不能護持亦決矣然則今日法門之壞孰壞之說法行法者之巧見戲論壞之才學念佛便道莫著相莫心外見佛等皆是巧見不行而空言契理不契機等皆是戲論非謗法者所能壞也猶之國家立法之美善而奉法者壞之非外國人所能壞也是故欲望法運之轉機莫要於提倡淨宗欲提倡淨宗莫要於不壞世法不談元妙三經具在諸方明眼當共鑒諸答問二十五則問曰子讀儒書近人講西學子亦盛稱之顧專談佛法其將以佛法治天下乎答曰是必不能亦斷不可利祿所勸權勢所歸必至名存實亡奸弊百出有元之國師泰西之教王可證也佛師道也其教止於脩身治心罕及家國上先師書已明辨之見卷附三代以後不可無佛教醒迷歌已略言之夫國所與立萬億愚賤之心也歷代典章制度因之而變者也人心之離散思亂至今極矣誠使三五年中海內幸無事儒教極四部之選西學擅各國之長各得數百數千人功不至大效不至速哉而盡中國四萬萬人莫能與焉莫能解焉以為高遠莫及可畏而不可親也中國人決定不信佛者萬中之一爾信而若存若亡不知好者十之七八知好者十之二三此兩語通言之畏官長良民也以為不可親則殆矣故誠欲親民莫近於佛因此見法藏比邱之棄國實為大慈悉達太子之出家實為大孝而我孔子盛德在庶為萬世師天之位置何異佛之示同凡夫豈無意哉以為與己不同道己所信向且目為背畔犯禁忌也此專指念佛者言之以為不如歸異教者官為保護莫敢指摘也其平日之壅隔揣虞若是一旦有事沿海沿邊耕夫漁戶皆早入其彀中我所召募勇兵皆素拒之門外四兩五兩之守糧戰粮能得其死力乎數千數百之博學高才能獨治之乎嗚呼無與同好誰與同惡故竊謂今日中國以提倡佛教固結人心為第一義此義得而後西學真有用否則被他人用爾前車可鑒已若夫儒之於佛為同為異二教通喻盡之矣聖人復起不易我言乃自論出後惟香巖居士能通其說餘皆不解甚至不能句讀根器陋劣至此尚復何言葢嘗思之今之士習不變仕途不清實無一能為子弟讀四子書畢極多加詩經一部便可應試入學詩經能背誦乎不能也希見之字不識也易幾卦何名十翼何物書禮幾篇春秋幾公概未觸手寓目不知也本朝開國至今若干年咸豐以前年號先後若何不知也本省幾府幾縣在何方向不知也父師不教乎父師先不知也如此等人一縣以數百計無財則可以教鄉里以其道傳徒有財則可以捐納可以得一榜得甲榜得館選得高官問何所能曰能取巧能敷衍能搆虗架孰教之乎曰自其開筆作八股時心思才力一注於此習與性成不待教也然則當局者何取乎曰正取其如此則軟熟不生事可苟安也然則不能改法乎曰非不能也不欲也為己子弟計為宗族親戚交游子弟計為同寮閱卷計何苦作法自斃且取詬病焉嗚呼人之無良邦國殄瘁其果無良至此乎亦非也七百年來憑空講中庸習非成是釀為風氣一人言之必有多人攻之其攻之者徒黨皆此類彼眾我寡明知必不敵也夫如是雖有良民誰能用之余所以徃徃廢書而歎憤極而涕下也一問曰禪教律淨皆佛說也何獨談淨答曰禪佛心也教佛言也律佛行也淨則佛境界也得佛境界而心言行自在其中同戒錄序已言之見卷附捨禪取淨之故法門綱宗已言之曰既言淨宗無參無悟則以何為得手曰執辭害意學者大病綱宗此段全對禪家立說淨家本無所謂得手不得手但念而已因禪家耽著無想無念身境兩忘為好境界却是墮在死水故初祖達磨掃除六宗呵為邪見寂靜居其一不知念佛亦有身境兩忘時不可又誤解作事一心及念自佛葢祇如想一箇人想至出神而已凡人專注一事徃徃有此光景但自不覺耳何足異哉而一句佛名朗朗在口却正是活潑潑地近時惟玉峯師為得淨土正宗每見打佛七者一時香燼止息師家便道此是好消息須着眼玉師呵之曰一向專念不讚其功蹔時止息便稱好消息豈念時反為惡消息乎此語可謂立破餘地非謂別有得手也二問曰何以無參無悟答曰禪家以疑入故須參悟淨家以信入故不須參悟楞嚴大勢至圓通章事理雙顯矣先以二人相憶喻專念他佛次以如母憶子喻彼佛願力接引乃言若眾生心憶佛念佛現前當來必定見佛謂惟其如此故但憑現前一念信心常憶常念直至見佛其事相類又申明其理言去佛不遠不假方便上來二十三菩薩所證圓通皆是參悟方便文殊偈云歸元性無二方便有多門亦正指上文講家以無量方便釋之誤矣既用方便則是遠打之遶自得心開謂如此則正同母子相憶不相違遠故不須參究自然得見而開悟也大勢至本彌陀次子為西天淨土初祖傳法如此何庸致疑三問曰見佛之悟與參得之悟為同為異答曰悟有深淺次第所謂大悟十八變小悟無其數人人不同皆非實悟若豁然徹底無餘則祇是證得現前一念本是不生不滅涅槃妙心就人身言強名為心實則盡虗空徧法界無中邊無今古以其湛寂常存而非靜則謂之一真以其運行不息而非動則謂之一靈諸佛之示現眾生之輪迴皆此物也雖然不可見如此說便去揣擬卜度須知說終說不到會也會不來正恐向意根下摸索故如此着語至心之於性猶水之於濕心祇是生生不已而無生相性即指其生生不已之機故心為統同之大名儒書佛書中往徃混言之須善會此心寂照一如無時分無處所而一切時處離他不得淨家謂之常寂光此亦不可作動而無動靜而無靜等文字相會綱宗發端如人有耳目如正當今日兩喻讀者多忽略過惟息安香巖兩居士直下歡喜色動余謂其實人生終日如是惟背為最顯故易以動靜不失其時其道光明取象於艮背試於此體會看曲園居士說畫卦始於艮雖從陰陽氣交立說而會心甚微似奇實正後世子雲必有知之者故往生者為得度世長壽泥洹之道為次於無為泥洹之道此大本經文也次非次第之次猶言比次類次緣泥洹乃如來滅度之名今實未滅度故云次會疏引下文次如彌勒為證深得經意泥洹即涅槃亦稱般日槃或稱般月槃疑即日字之誤梵音輕重爾拈花示眾曰我有正法眼藏性覺妙明也下句則本覺明妙合言之為如來藏凡教起於有證於知然是本有之知而非後起識見之知永嘉偈云不以知知寂亦不自知知不可謂無知自性了然故不同於無記今即目此了然者為正法眼以起別傳非謂別有涅槃妙心直指人心本來如是所謂本是無生今亦不滅也所謂生滅滅已寂滅現前也若以一念不生解之則大錯實相無相所謂不取於相如如不動也所謂知見無見斯即涅槃也若以金經信心清淨即生實相及念實相佛等解之亦大錯微妙法門云云然則兩家所悟同是涅槃心何異之有且直指人心見性成佛非謂一見便成謂見性則不至錯亂修行如楞嚴所說十種仙業轉成外道故曰理則頓悟乘悟並銷事須漸除因次第盡淨土上品中生以下皆須進修必至等覺補處地位方是無修無證亦同此例然無染緣故能一生取辦視禪家之頭出頭沒於此者難易平險判若天淵矣正同直憑現前一念見佛悟性何異之有四問曰禪淨修證皆同何以禪家多謂淨為非實而教家亦時有之答曰此皆不明教理門戶私見也本師覩明星出現豁然大悟便唱言奇哉一切眾生具有如來智慧德相但以妄想執著不能證得遂說華嚴引逗之五十三參正見當下即是一切諸法無非佛法無乃不會以至割截虗空橫分疆界而機多不契乃反說偏小權教漸進圓大實教教分五時說已見前方等時必先說大本經後乃處處指歸事理可知至法華會開權顯實特現女人往生為證普授現前眾會成佛大暢本懷則一代時教宗旨可知矣拈花在法華之後因迦葉微笑適與最初悟緣本願相合在位菩薩諸弟子等豈皆未悟當下即是之理但久悟者習為故常新悟者未忘管帶偶拈一華亦常有之事迦葉之笑所謂一回提起一回新非至此方悟也惟阿難未證漏盡至結集時迦葉激成之故此時並囑阿難副貳傳化據文推想事理顯然遂囑付之其云不立文字教外別傳者正謂一向教內說盡無可再說祇須自家會取難以言傳非謂別有一法也試觀初祖達磨最後付法仍出楞伽四卷印心最初西來正當蓮宗盛行教觀大明之後二祖神光貫練羣籍兼通儒書而所求之法祇是與汝安心竟一句所得之法祇是禮拜依位而立不著一語豈非修證仍在教中乎後人藉口六祖不識字泥執不立文字以為本不在此殊不知通宗不通教開口便亂道即如六祖壇經云東方人有罪求生西方西方人有罪求生何處便是亂道之明證夫求生西方豈為有罪經文明言西方尚無惡道之名何況有實又安得有罪此數語大礙教理其餘皆平實商量現前指點并無奇特真是徹悟境界也若謂淨土諸教皆權則是法華授記依舊楊葉止啼本懷未暢且四十九年四種悉檀從未及第一義僅此一舉而惟迦葉一人得真黃金有是理乎至教家謗淨賢首宗下為多天台宗因智者教祖有十疑論實非智者手筆陳隋間安得此種文理觀教祖他著述可知葢唐初台家子弟述其師說故理致甚精當也故不敢謗華嚴為眾經中王儒家亦喜誦習如曹魯川與蓮池師諍辨往復二千餘言空數他寶殊不知華嚴所秉乃在阿彌陀經蕅益師要解語且八十卷中本師所說祇有阿僧祇品如來壽量品此品在本經為心王菩薩說別出顯無邊佛土功德經元奘師譯本則本師自說以答不思議光王所問如來隨好光明功德品三品正是無量光無量壽可見淨土教理最初先揭出矣蓮師答曹魯川未計及此可惜錯過來機若謂淨土是權則是華嚴諸菩薩已登寶所而普賢十大願王反導歸中途化城有是理乎凡此異門異見鬬諍堅固猶是教觀未荒近數十年來僅存淨土一門而執自力執一心自難難人戈操同室必至并此門而斷絕滋可懼矣余故不得不極論之然尤望同志高賢見彼異趨勿輕與辨好勝護前賢者不免修行人或數年數十年苦功頗已自負而欲其一旦舍己從人自非大智大勇菩薩現身不辦若果能之則是一撥便轉不煩多言矣當反躬自省生慚愧心葢彼雖終不得一心要不失為散心我倘信願不真并散心而不得蓮池疏鈔命意或亦早見及此而不料法久弊生轉成退阻如今日也若其人不發願心則當引小本經及藕益師說婉勸之如此銷融意見同共扶持法運轉機庶幾有望五問曰從來說念佛者有念自佛念他佛雙念自他佛之別今何以專說念他佛答曰教中說念佛祇有觀佛三昧如上賢護經說及淨土執持名號皆他佛也自禪宗有高推聖境自屈己靈等語於是有念自佛之說如參念佛是誰等皆是淨土家圓融調停之於是有雙念自他佛之說實則淨土法門妙在專念他佛楞嚴文句及直指所解大勢至圓通章最為明確而文句尤圓融宜詳玩之六問曰雖念他佛而不作他想方入自他不二法門然乎否乎答曰子定省父母時曾作是念他是我父母我身自他出故愛敬之乎至顧對子孫時曾作是念他是我子孫他身自我出故親暱之乎曰勿也曰正當爾時子身在乎不在乎曰多不覺也覺則不自在矣曰既不覺則不二矣何疑乎念他佛也七問曰稱名時須觀相否答曰名自賅相相亦兼名從不兩提一到俱到子尋常見金身接引像時意便隱然呼為阿彌陀佛否曰然曰子雖不出聲而宛若自聞否曰然然則名相之不兩離可知矣譬如遙喚熟人豈必揣量其體貌而意到聲出自覺情親故念佛者祇要發願真切輪珠記數定課記數甯少毋多以終身不間輟為要每見學者喜說自在體面話不肯記數終至廢棄所當深戒直下念去高低緩急皆不論果能一心心如對嚴師親承教督一聲聲如呼慈母力與提擕則勢至章所謂現前當來必定見佛兩句自然內勘分明不復向別人討消息矣曰古人以作觀為定善以稱名為散善分明以觀為重何也曰定散二字非抑揚語乃就其行相以別工夫之難易不可誤會葢作觀者必默坐澄心諸根寂靜次第證入故為定善稱名者不拘行住坐臥隨諸動緣現成拈出故稱散善次第證入者全仗自力故難現成拈出者專杖他力故易彌陀本願唯在稱名故本師說觀經末仍結歸本願詳見上段善導大師疏解觀經力袪眾惑而終身專修持名勸化至廣相傳大師為彌陀化身至今推重學者當知所適從矣八問曰人人皆有自性不自力而專仗他力正所謂自屈己靈奈何答曰耳之聞聲目之見色是自性否曰是初祖告異見王亦云然矣曰初祖所謂在眼曰見等六個在字即是心之靈知靈覺否曰是曰假若明有色暗無色俱無見性亦無否喧有聲靜無聲俱無聞性亦無否古來狂禪多半死在此處若近時衲僧并此未曾夢見說甚麼禪若道無則耳目同於木石屈煞己靈若道不無則安向何處此處能離却聲色轉身吐氣救取己靈許有自力分也還救得一半若不能可知古德云從緣薦得相應捷就體消停得力遲此一句佛名正是雷轟電掣勾者畢出萌者盡達矣莫謗他力好從緣薦得兩句特借證託外之義以顯他力不可誤會若果能直下念去忽然如見桃花如聞畫角自不妨出格好手而於他力之信亦是萬牛莫挽若誤作禪宗話頭槃陀掃帚看待則大錯大錯兩門俱破須知既是他力斷不能以自家知見分疏機趣凑泊意識十度氣魄承當惟有直下念去恰恰正好九問曰彌陀本願以名接物眾生發願稱名往生願願相應理在無疑但生者究少事證何以取信答曰千疑萬惑總由不識現前一念所致夫心體寂照一如不落方所有念則有方所矣體猶鏡質念猶鏡光所念種種猶光取影論中已略說見無量壽經綱宗及雜說緣心體實難名狀姑沿舊解取其易明當知心體非真有質且鍊銅發光始名為鏡光若離質便成廢銅諸如此類不可執辭害意請更以楞嚴證之開卷首唱妙湛總持不動尊一句全體大用和盤託出矣正文先以七處徵心者使人即影以推之本體也七處皆影次以八還顯見者乃使離影而直認本體也所還皆影此本體真常不變而其用萬變不窮故無始無終佛證之為無量壽無向無背佛證之為無量光眾生雖迷頭認影依然吾戴吾頭是以現前一念天上地下縱其所如無遠弗屆為其本即無量光也死此生彼隨業輪回至今不休為其本即無量壽也彌陀破此機直據其本發願令眾生念念捨一切法而但稱名字正是念念離一切影而直認本體然則願願相應譬猶鏡鏡對照光光互吞自他條然而渾合無間此理顯而事在其中矣試觀世人或忽然耳熱忽然噴嚏輒曰何人念我故毛詩願言則嚏鄭箋云汝思我心如是我則嚏也今俗人嚏云人道我此古之遺語也據此可見心佛眾生通為一體古今皆知之但習焉不察耳古無佛說而記稱王者禘其祖之所自出孔子謂知禘之說於治天下猶示諸掌果何謂耶讀者曷深思之夫凡心猶相應況在聖心獨願猶相應況在兩願雜念猶相應況在專念偶念猶相應況在常念且凡夫彼此懷思正是光中見影而猶相應況直認本體而勿忘哉理在目前何待身後十問曰彼此懷思猶鏡中影充是說也將肝膽皆楚越君親同路人何以立教答曰盡人皆影己身獨非影乎正惟知一期生死之非真我故所欲有甚於生所惡有甚於死苟違斯義即為失其本心子輿氏早言之矣此特借以證人人之有真我非謂便出三界且三界中地位高下懸殊倍蓰無算觀高僧傳居士傳及諸燈史所載暨宋元明諸儒學案即其見地但證初二禪天者正是不少葢此中自非寄位菩薩難保不退墮生淨土者則圓證三不退盡此一生直至補處所以干經萬論處處指歸也且子不觀大本經乎五痛五燒章歸重倫紀明彰王法反覆開喻幾二千言論中已略解之無量壽經綱宗果能依教奉行萬善回向久久純熟自然會得當下即是立處即真打破鏡來與汝相見乃自禪學盛行此經塵封大藏即念佛者亦高談元妙目此段文為小乘不屑置羣疑眾難皆自取之有志淨宗者所當深戒十一問曰應願往生正報彰矣依報諸願亦有證乎答曰有身斯有土即現在可見依報從正報生亦從正報轉富貴貧賤分殊而境自別極樂四土九品亦如是但三土皆不離常寂光不可不知往生者既必捨此報身而後得彼報身則安能取此報土以借證彼報土若概消歸自性濫入恒真迂儒誤解為寓言蓮池疏鈔苦心孤詣勸進初心而讀者誤會不少蕅益諸師所以力矯之狂禪終墮於空見利小害大西方合論已明辨焉且一一比擬必有所窮何不即以稱名之願證之乎按彼佛本願十方世界諸天人民有不知我名字稱我名字者不取正覺金人入夢之初中國固未嘗聞也迨漢魏之際大本經先後譯出漸次流通東林提倡法門大開緇素傾心捷於風草禪家初猶角立旋即折而兼修不始於百丈清規也惜無可攷佛祖心要有其明文讀晉唐兩高僧傳佛祖統紀及淨土聖賢錄居士傳等書稽其時代纔數十年法周沙界矣甚至不念佛者苦樂違順觸境逢緣不覺失聲便道阿彌陀佛白香山已有此語不論賢愚童髦有若性成而本師釋迦當來彌勒修行者或反不知豈偶然哉豈偶然哉佛無誑語此願之應既彰明較著如此餘願可知何待多辨今泰西各國亦已通行佛教美國有大善士名阿爾格脫本為將軍因自疑其本教徧訪名師後遇俄國優婆夷某某為說佛法大要遂發正信棄官專修提倡勸化本國官紳初以立異為嫌旋察其教法勝善民心歸向遂加意護持凡值開壇傳戒禮送殷勤信從日眾至數十百萬人英法等大小各國士庶莫不聞風傾向以禮延致阿君傳法求戒合議專立佛教大會旗號並設電報三四百所專談佛法日出報帋數十萬張名曰令知報葢西國之於教理隨順氏情不執成見與我三代盛王觀民設教同民出治之意隱相契合如此己丑夏秋間阿君自日本傳教來滬許息安及子簡先後登其舟見之阿君即問曰貴國大皇帝信佛法否息安敬答列聖護持則懽喜曰如此甚好因問其以何為宗旨則言祇要信佛念佛別無宗旨現在總以照順人心大家崇正闢邪為要務如何貴國僧徒但知造廟息安欲請其登岸說法阿君謂能有千百人同會聽講甚所樂從息安恐犯時忌遂止又有西儒李佳白先生名李提摩太英國人兼通中國語言文字且信佛法亦與息安相識徃歲特邀楊仁山居士以起信論翻作英文謂將刊布以勸誘本國諸儒李君志願甚大憫我中國無人提倡正教現於都門倡立尚賢堂以經費不足特回本國勸募期於必成於此可見是非之公自在天壤尤可見彌陀本願名聞十方確有實驗更數十年後當必佛化一統公法所擬弭兵之䇿其在於斯阿李二君殆所謂乘願再來以應舍利重興之讖者與十二問曰心淨土淨乃是妙有境界綱宗謂淨土為實有何也答曰胸中留一毫元字脚便濫入恒真淨土去極樂淨土遠矣曰何也曰維摩經云譬如有人欲於空地造立宮室隨意無礙若於虗空終不能成菩薩如是為成就眾生故願取佛國願取佛國者非於空也是其明證何疑於西方淨土且子今仰首見天曾作是念此有天乎舉足措地曾作是念此有地乎曰否曰是即所謂妙有不有也所謂實相無相也莫又因如此說并上來立處即真當下即是等話概作恒真淨土會子且謂此土為妙有乎實有乎夫即目猶迷元解況乃遠在西方本師歷數四十八願不下一語分疏余每謂凡諸佛菩薩本願度生經自藥師地藏等皆祇可消文釋義不礙常解不可觀心稱理濫入空宗稱讚淨土功德莊嚴自有土有佛連說七有字亦祇指陳名相其於寶池德水行樹微風獨不能言性水性風真空性覺如楞嚴也乎故知淨宗專說事修一味平實正是慈悲之極曲被羣機見淺見深在人不在境惟然故同證寂光而四土有優降九品有等差若一一稱理則反成事相矣試觀小本於靈鳥說法特詳辨惡道之實無大本於四天王忉利天等依何而住特借阿難發問且言我不疑此但為將來眾生除其疑惑此等處讀者能即文字離文字眼光圓照則於淨宗思過半矣觀經心作心是之說疏鈔釋以託外義成惟心觀立兩句心苦分明之極矣讀者猶誤解作別無淨土故綱宗詳辨作是之義而先斷以若不實者雖念無成二語庶幾閱者深思之自西學盛行而佛書足相證明者不少如天算家測星月皆有山河大地形狀類此地球地球在太空中亦一星也眾行星饒日而行其恒星亦各為日亦有無數行星繞之與此日輪等但遠不能盡見爾又言金水二星無隨繞之月火星有二月本星有四月土星有八月天王星亦有四月海王星有一月諸月皆繞行星與地球之月無異按此與佛說百億日月世界可證也又言土星最奇體外有光環分三層廣平而甚溥其環之外徑五十一萬餘里按此光環如雲氣而不散與佛說諸天有地居雲居之別可證也又言諸星球所有動植諸物必較地球諸物不同其故有三一則受日之光熱多少不同二則攝力大小不同三則體質疎密不同按此與佛說十方諸佛國土莊嚴佛事各各勝異等可證也以上諸說足見虗空無盡世界無盡西方極樂國土即三千大千界外之星球確有寶地成就種種功德莊嚴而亦不出眾生不思議心覺體之外自來談淨宗者徃徃謂即此方葢偏着性空有理無事錯之錯矣十三問曰金經言若世界實有者即是一合相淨土正與相相反何也答曰淨宗與空宗對待法門綱宗詳之矣相反正以相成大智度論開卷即是上來亦已引證之矣靈光獨耀迥脫根塵則無一法當情知見不立眾生眼合色而見有色界耳合聲而見有聲界取相分別情執深重無由脫離生死宋譯大本經語故說空宗諸經以除名遣相消歸性空此兩語意猶言一人發真歸元十方世界即時銷殞乃就當人自證分說豈真一切蕩然無存哉此經建首無我推至無四相自始至終以即非是名兩義隨說隨掃至於無得無說極矣顧既言無得又言以無我無人無眾生無壽者修一切善法即得菩提既言無法可說又言於法不說斷滅相却不言不說常相然則畢竟應云何住云何降伏末後揭出宗旨曰於一切法應如是知如是見如是信解不生法相而所謂應如是住如是降伏者了然矣淨宗正從此建立說淨土修淨土者皆當從此契入莫動本位莫見如此說便道淨宗不取於相須知纔着一念不取即是動本位切戒切戒余之篤信淨宗實得於力此數句用敢拈出與諸方明眼共之十四問曰善惡皆情見後起既知性空何用修善答曰修善正為性空不可徒知其說金經以四無修善即是此理葢執著我見是名凡夫但空我見是名二乘并空法見是名大乘二見俱空俱空亦空是名最上乘皆名也其於本體性空實無絲毫得失故宗鏡錄引其經不記何經云自性本無慳貪隨順修習檀此翻布施波羅蜜自性本無邪妄隨順修習尸羅此翻戒波羅蜜自性本無瞋恚隨順修習孱提翻忍辱波羅蜜自性本無懈怠隨順修習毗棃耶翻精進波羅蜜自性本無散亂隨順修習禪那翻靜慮波羅蜜自性本無愚癡隨順修習般若翻智慧波羅蜜教中以善性惡性無記性為三自性實則是業識而推本言之凡此等處皆須詳辨始得即如此段文正說性空布施等六者乃對惡得名亦本無也孟子不斥告子舊說無善無不善之非但言乃若其情可以為善及他章說性善多以惻隱等心指點正為人生而靜以上不可以善惡名也可欲之為善一句真透頂語分明從情見上說起宋儒牽入易繁傳及太極圖謂情可為善便見性之本善全失孟子之意余別有辨諸佛菩薩以此六度包括萬善成就出世上上智自利利他諸惡盡除善自不立如空著楔以楔出之前楔既去後楔豈留故知順性起修便是無修修因修了性便是無證證淨宗之萬善回向亦復如是世人聞說修善即耽著有為小善聞說性空即墮入豁達頑空兩失之矣然前失猶利人天後失大壞世相故淨宗專說事修四十九年熾然無間禪宗於末後方一拈出誠慮其險且難也可見出世本懷觀眾生機熟示現受生者決定不專為一期生死矣綱宗及雜說已略言之十五問曰同是一向專念萬行回向何以往生上輩偏屬沙門答曰此理前已略論之矣在佛重佛猶之在儒重儒世間流品不一而士為四民之首為其身列膠庠也究之通天地人之謂儒萬中無一區區科名豈足以當之佛制欲出家者先受在家五戒滿分能持然後白君王白父母下至妻子奴婢等皆已聽許乃得剃度進沙彌戒多年嚴淨再進比邱戒又多年嚴淨方得圓具菩薩大戒猶必學習精熟開遮持犯圓通無礙然後可以匡徒領眾號曰沙門故一壇祇受三人過即為濫法雖求不得戒夫必能赴至嚴之程途乃不負至寬之歲月不蓄妻子省塵勞必能甘至約之食日中一食樹下一宿乃不負至隆之名為天人師誠如是則四宏誓願圓滿必成矣焉得不重鬚髮之除乃以防出入之渾豈貴其易服毀形哉維摩示疾諸大弟子皆推遜不任往問佛道平等不揀緇素可知矣學佛者既不深思佛制本意但見讚歎出家則遂專於頭毛上著眼出家雖啞羊野狐而偏信在家雖真龍全象而偏疑佛書雖因果小品而見珍儒書雖語孟大經而見忽無惑乎召謗招譏衰敗之不可收拾也噫王制論秀書升管子羣萃州處成周學制也孔孟之周流傳食皆為世衰道微不得已之創格而讀者亦莫或知也可歎十六問曰念佛修善而妄想不除得往生否答曰決定得生妄想不足病也圓覺經云居一切時不起妄念於諸妄心亦不歇滅住妄想境不加了知於無了知不辨真實子今以何者為妄念曰念佛時計算他事曰此却是起妄念病在不覺古德云不怕念起惟恐覺遲覺即已除無待更除所謂知幻即離不作方便離幻即覺亦無漸次縱使數覺數起數起數覺念佛不斷總得往生何以故就覺體觀有念皆妄淨宗教理從初發心便超二乘直望三賢要解謂直超四十一位是究竟說今就凡夫學地說妄與非妄不加了知等圓覺故就法門觀起念念佛正是隨順覺性託外全彰妄無自體但不覺故試於念佛時作意起妄必起不得而口中佛名轉益了了可見祇是一覺更無起處又使於念佛畢後回想所妄作何名相必多茫然毫無影響而所念佛名歷歷可數略一反觀湛寂如在可見正念中句句聲聲實有力用本非與妄成敵兩立何病之有十七問曰並不起念外緣覺觸不能不起奈何答曰起念念佛有念便有身身見未忘覺觸總受但不打失正念便是定慧圓明故學者內自勘驗能於苦樂違順境緣猝然相遭時一句佛名意中先發則臨終把握便在於此不必深求高論杜中下機必謂臨終自有無把握之把握便失法門本旨東坡臨終語原自不錯決定徃生祇為露聰明相至今疑煞學人若尹師魯所謂亦無鬼神亦無恐怖則真差矣大抵儒者學禪徃徃落無想無色諸天境界當時若有善知識祇銷問一句你在何處管教認得東坡曰并無外緣而匪夷所思遠隔久忘境界瞥爾現前又將奈何曰此乃無始以來第八識中六塵緣影正因澄靜生光偶然流露隨時起滅尤不足病但到此境界便入輕昏世人往往貪著以為身境漸忘其實不可亟須提起精神甯使漸散何以故經文至心信樂四字乃是佛願我願相應關鍵昏則四字全失散則非憶非忘聲光了了蕅益師云若執持名號未斷見思隨其或散或定於同居土分三輩九品又云信願堅固臨終十念一念亦決得生若無信願縱將名號持至風吹不入雨打不溼如銀牆銕壁相似亦無得生之理修淨業者不可不知也數語深得經意故綱宗據此謂總之死盡偷心甯可顛倒妄想決不於願門中別求解路方是此法門的的宗旨願深思之偷者苟且徼幸之謂如前所舉知見分疏機趣凑迫等及一切巧見別求解路者皆是蓋一有此心則信願必不真切為法門之內蠹矣故語意極其抑揚不可誤會十八問曰相宗八識之說與淨宗有合乎答曰相宗名目繁多性宗括略為五蘊故從來不許和會而以八識釋淨宗頗易發明憨山八識規矩注解最便初學蓋現前不念起滅不停體即無量光壽寂照不二何以故若非常寂常照誰為倐起倐滅相宗就照用邊指點據楞伽經名為第八阿賴耶識又推其最初無染名第九庵摩羅識眼耳鼻舌身五根對前五塵不動念而自然色來即見聲到即聞名為前五識此本自性靈光相宗謂之現量境界者以自性無量而已落量數故不名性而名識禪宗所謂無位真人常在面門出入者不但不落所見所聞亦並未有能見能聞方是靈照故名無位破參發悟在此然纔覺見聞已是起念因而取相分別名為第六意識落比量矣六祖云無意誰當分別永嘉答云分別亦非意乃是禪家透過一層說不可誤會隨即內計能見能聞外計所見所聞而我相成矣全成非量矣即綱宗所謂二我執其俱生我執乃是宿世帶來觀初生赤子七八朝後便有知識可見所謂知見立知即無明本矣相宗從意識中辨別此我執名為第七末那識無始以來入胎出胎皆此識用事此識但能執着堅固必牽連意識方能作為故四十二章經云切莫信汝意如意不可信證阿羅漢道乃可信汝意可見意本非惡惡在我執不化故曰一切法無我得成於忍聖人絕四意我相為終始便是儒佛同處據此可見名雖分八實無一物惟是現前之一念故淨土家直以此念為始覺佛為本覺起念念佛便是始覺合本法門巧捷至頓至圓莫尚乎是彌陀本古佛現身雖現身相而無身見第七末那識早轉為平等性智故因地名為法藏魏譯亦稱法寶藏漢譯梵語曇摩迦吳譯同亦稱法處唐譯亦稱作法宋譯法在凡夫為意塵在彌陀則意識亦早轉為妙觀察智於法自在即以此法智運用前五識為成所作智攝取二百一十億佛土清淨之行行者全性起修全修在性之事相諸佛土佛事不同故必擇其與此土十方根機相應者修習莊嚴勝妙五塵至本願圓滿則第八第九識亦盡轉為大圓鏡智而即所現身圓證三身名為無量光壽阿翻無彌翻量陀該眾義本師以光壽約之故古德云略舉則應稱阿彌不應稱彌陀今隨通稱即所居土轉為淨土名極樂世界矣諸經中稱劫名某某佛名某某世界名某某皆如是葢佛法統歸師道今泰西各國紀年猶沿此例猶中國統歸君道易代改朔也於是即以果佛名號接引眾生使常稱念何以故以此名號正由最初發願之一念而成與眾生現前一念無二無別故眾生念念我執為多生業根今稱名則念念向他而第七識為他佛願力所攝當下轉矣眾生念念見取徧計我執現生增長由此為現生業相今稱名則念念正觀而前五識為依正觀力所攝當下轉矣故念佛時無論耳自聽聲或觀想依正莊嚴或見或不見總歸正觀然此與上說皆論其理如是非謂便空身見且徃生專重信願不論身見之空不空三惑之斷不斷也故曰五七因中轉六八果上圓蓋第六意識非他即此念引而長之便是教中云集起名心思量名意了別名識起即是念思量即是引長多生至今窮未來際出胎入胎此念不斷念不斷故意無盡諸大乘經佛菩薩及當機大弟子等名號並其先後出現皆有表相如普門品稱讚念彼觀音力則以無盡意菩薩發起持地菩薩結證地即意地也彌陀因地名法藏亦如是表相者如戴記云龜為前列先知也金次之見情也之比不是寓言意欲云何便名願意無盡故願無盡如行願品說彌陀當日示同凡夫發起大願精勤五大劫自至成佛亦用意識惟其無我故不為識而為智諸佛皆然故名轉法輪當知現量境界無所作為惟其不動現量而人比量乃為大機大用乃為無礙智亦名無塵智就無我人眾生壽者等見說名無塵相宗因連前五識說名妙觀察精勤之極多生習氣盡除證入無念本體乃名為圓古佛現身豈有習氣既示同凡夫不能不如是說禪宗大悟後正修習為此否則墮人偏空但空當知一圓一切圓不作次第而喫重在我見故專稱名號皈命他佛捨己就他是淨宗要訣綱宗兩篇備言之頗望留意十九問曰念之引長便是意則念佛為意識用事乎答曰正惟如此乃持名所以為至妙發願所以為至重也試以現前一念作一身觀念之未起猶身之坐非無身也念之起坐而起也然纔說起而起相已不可得變為立矣念念相續循環不斷猶立而旋繞經行矣然而未嘗動一步念念不假思索覓意不可得勢至章云都攝六根淨念相繼即念攝之也譬猶桔槔然兩手扶橫木兩足能用力賴此比口中佛名號兩足上下終日運奔未嘗移尺寸而滔滔法流灌入識田矣故必發願求生彼國使念念不出此願則千念萬念念念是始覺覺在念念相繼處此際即佛清淨法身道有不可得道無決定在故為始覺合本念時或聽聲或觀相分明意識用事而為名號所攝亦多成始覺凡可言說皆是意識邊事為禪宗所大忌持名法門所以超過一切念中偶一妄想猶一足不著機關一足得力如故轆轤旋轉如故戽水如故兩手扶橫木如故名號聲光力此身終不至傾跌聲不斷即念不失觀經特舉惡人往生以顯名號力欲仗自力者務須着眼葢惟意地中有捨穢取淨之本願攝持故句句聲聲多有著落而翻來覆去祇是四字自在流出則一切攀援分別莽蕩無歸之意境自不得行譬猶桔槔實置平地故有可著力而著即無著空亦不空古德所謂取捨之極與不取捨亦非異轍真透頂圓極語也二十問曰明知淨土是實境亦知寶池金地等功德莊嚴皆是自性特借世所貴重以比況之見淺見深雅俗各隨性量而捨穢取淨之願總發不起奈何答曰此由不信彼佛本願正是眾生本願也今試問有生必有死而自性無死法子能信乎曰信雖無死法而不得自主子能信乎曰信曰古云心佛一體又云平常心是道子能信乎曰信信則平時常發是願何獨念佛時發不起乎曰平日何嘗有是願曰子自不覺佛則覺之矣夫無始以來流浪六道至於今日即使世世為人其間種種顛倒妄想無論為名為利為賢為愚為雅為俗歸總不過求生求樂然乎否乎曰然然則往生極樂正是平生本願惟其願之極至於不自知其所以然乃所謂無願願也今試觀此身以一念來而生以一念去而死生死氣之聚散也念體即自性非氣也今之來此六道主何嘗有意來迎子亦何嘗有意欲來而適來者豈非夙世臨終時平日樂生之本願一念感動而業識茫茫重處偏墮乎臨終見所惡而欲避見所好而欲趨皆是平日業識其體即自性也如尹師魯所見亦是習氣偏重終必鑽出頭來已見前註其終不悔悟者又豈非生死總在界內見聞習慣以為天實為之無可如何乎然則西方在界外十萬億剎之遙彌陀之必發願來迎雖是慈力眾生之必發願求往雖似難能要亦不外世間人情平常道理何為而不信乎夫自性猶水也本體一平而已其流之就下非就下也失其本平自性生生不已有身則限於氣數必不能平故雖侯王富貴亦不知足體勢偏重則自趨重以取平固行所無事也是故彌陀本願諸天讚言謂決定得成者為其不外眾生本願非有所加如壽本無盡也自此生追溯無始可見身本無老也觀西人抽氣筒中生物可見眼本洞見耳本徹聞也觀顯徹鏡德律風等器可見空行本無礙也觀電綫空氣球等可見四十八願皆不外人情物理諦審自明眾生發願求生決定決得生者亦惟還其本然非別有得故淨宗專重發願彌陀極言之至心信樂即是願乃至十念亦得生是極力抑揚之本師結讚之又再三申勸之大本言一念得生小本三勸發願歷代祖師著書發明之蕅益堅蜜兩師為最豈強人以所難哉葢求生之一願實據多生至今不自覺知樂生之本願并其所造無量無邊種種業力統結於此念於念念間如長江大河盡受百川趨重之勢併力奔赴於海門其必匯入薩婆若海天神莫禦矣惟有一物能禦曰自疑若不發願則但是現生業力限定一報終始如水在圩內來源去委不通焉能到海若發願而猶疑妄想之或障往生則是見水面之風來魚躍蹙起波瀾遂謂底水因此折回不復順軌誰能信之講求教理者當不河漢斯言二十一問曰何謂念體即自性而非氣答曰此甚易明念乃自性照用本與氣離氣但呼吸而無起滅念非呼吸而有起滅起則為用滅即不用而非無照起念念佛照用並行用現於氣念乃出聲當出聲時而有妄起以本離故然激氣成聲即是此念故聲念相依無全走作其浮與切體認自知若全走作非停即錯矣非謂可以隨口叫喚謂不必着意遣妄耳不可誤會而體認之知即是走作即是起妄何以故念即照在多一照故楞嚴經云我真文殊無是文殊若有是者則二文殊是也不加體認但直下念聲在念在為浮為切多不自知無念而念是名正念經云而我今日非無文殊是也何以故所謂大覺歸於不覺故尋常念起即如是故臨終見佛亦如是故氣絕往生無二覺故葢生死本祇一念念乃覺體之照用與氣無關故死後或為輪迴六道之身現在此身乃識受想行識五蘊所成在凡名世間五蘊身在聖名出世五蘊身死而為鬼名中陰身陰即薀也謂前薀已謝後薀未來也皆是名相實則一念而已或為往生極樂之身而此覺體乃諸佛眾生共之從來無二故臨終所見之佛即彼佛之照用現在之念即往生之身現在之為無念而念念而無念即往生之為無生而生生而無生也往生見佛之身於極樂莊嚴自在受用不假作為即現在念佛之念於萬德洪名自在流出不假思索也入此門者知念之非氣而現在之身以一念生則知往生之身亦以一念生現生此方身土皆實有則知往生彼國亦身土皆實有此身土之實有為在覺體中顯現則知彼身土之實有亦在覺體中顯現何用種種深微元妙之談索之冥漠哉二十二問曰照用二者若何分別答曰照乃是自然覺照因之起用非無作為矣葢心性體用一落言詮但能相似禪家釋此兩字已似極力分疏若微細剖別愈辨將愈惑今姑混括大旨說為一大靈光庶較易明凡光有兩種一內景一外照譬如鏡光至平至淨然能內景而不能外照其內景也毫髮畢現而不留跡譬如日光至直至捷凡光皆直行不轉灣天算家謂日光到地速率無比所謂不疾而速不行而至也火光亦然然能外照而不能內景其外照也目可得見身可得觸而全同虗空不可得取不可得壞此大靈光兼兩能為一體凡姿質之智愚敏鈍是光之內景意象之寬隘重輕是光之外照閱人多者一望而知在本光從來平等而萬別千差者多生之業力氣習為之也故其力用不可思議不可思者心行處滅不可議者言語道斷世多誤解作神妙莫測粗浮可哂超過一切光如鏡光不留跡此則前塵綠影憶持不忘即第八阿賴耶識如日光但直行此則鈎深索隱曲折多到即第六意識又如光皆可阻隔此則洞達無礙如賢護經說余嘗於中夜念佛繞室經行忽見當頭星月皎潔初猶不覺並未舉頭俄而覺之潛隱不見矣又嘗見四面佛高約八尺自頂至踵前後衣摺多了了案上銅香鑪亦全同紅琉璃而佛身卻不琉璃洞徹當時不知自己眼在何處亦並不覺異經須臾間覺之即隱因此知靈光獨耀無物不透而物非無又知見色聞聲時纔覺見聞便落前五識矣十方世界諸佛國土皆此光力攝持而自體常寂人在氣交之中氣聚則生氣散則死其現前一念乃此一大靈光之照全不與氣交黏安有生死譬如空中閃電電之為物全類識神故借以為喻耳外道修習得大光明出入自由以能出陽神為得道自佛法觀之祇是造成一盞大電氣燈耳縱能遠照千百里有成必有毀豈本有哉惟悟真外編不誤各各眼前得一瞥地不但電體與氣無涉即此一瞥亦與氣何涉葢氣有質點故有聚散靈光則渾成一統合同而化氣流行於靈光之中猶煙霧布散於日光之中隨其或疎或密乃至須臾變滅亦仍不離光而光未嘗移又如無數極細粉屑沙粒在一盂水中其屑屑粒粒相際間無非是水隨其體之輕重或沈或浮而水未嘗動也凡夫終日膠擾執定四大假合之身為我第七末那識遂執現前一念謂在身內譬猶日光普照大地喻第八識以鏡映之信手迴轉消第六第七識相併其影滉漾室中認為真日而此一大靈光變為無明業識矣念佛人求生西方無論識性不識性亦無論妄想之多少如何但能發願真切刻定課程終身不間決定得生何以故譬如同一誤認真日而別以凹面迴光鏡喻願對日靈光即自性佛須知鏡與日原是一箇不得不如此說爾安置向西時時逼正其聚光點喻念艾炷承之喻淨土莊嚴實境而日與鏡相距中間常有煙霧冥濛不斷喻氣及妄想其實乃是自身遮蔽其間故身見輕者得力較易日光不能全透臨終氣息漸微煙霧漸散現前一念仍在即是日光佛身即於鏡中顯現我願即佛願故氣絕而煙霧空日光全體透過鏡面艾炷光燄勃發一念淨光成意生身上則證法性身矣即是隨佛往生矣葢日光到地雖捷猶有分力可算以日與地究是彼此兩體故有去來相靈光則西方此土本是一體東頭沒即西頭出如拄杖子一頭放下即是一頭拈起出沒同處拈放同時故曰生則決定生去則實不去也天如禪師語讀者誤解此句謂此土即是西方則濫入恒真淨土矣大本漢吳二譯謂暫信暫不信者臨終見佛如夢中見口不能言心中愧悔歡喜交併於此可證二十三問曰意生身與夢中身將毋同答曰大不同也夢有多種周官太十所掌三者為綱古夢所掌六者為目蓋推其本則皆靈光天倪之動故古人甚重之佛家亦重之要歸不外現前之一念默照故不能發氣出聲以念本離氣出聲即為讛語矣意生身固同是一念而靈光凝聚成形如燈之𦦨顯然有體有聲有息全同現在之身而了無觸礙其聲與息亦全是光明用事與凡夫恃呼吸之氣而生者迥不侔矣然教中多說光明從不說氣惟後人撰五教儀曾一及之以借莊子援督為經之說記亦不真矣祇可以儒書及諸子書證明之蓋十方世界在一大靈光中猶海浮漚耳由其光盛生威乍遇而懍然者是威生耀佛光如月光并不耀眼耀生熱如以無生氣物置赤日中必先生熱後生氣是其驗熱生氣此氣字無可換換則不醒所謂生者亦非母子繼續之生猶水生波非水外別有此氣非呼吸有質點之氣老子謂之谷神谷者謂幽元也音義皆同欲莊子謂之踵息神仙家老莊為道家神仙乃後起託附之謂之祖氣謂之罡氣謂之元陽若坐煞在此便成外道孟子謂之浩然之氣春秋繁露引此說謂常以陽得生其意也班固答賓戲引此作皓然項岱注謂皓白也如天氣皓然葢在成周教學亦但渾言緝熙光明等從無析言之者故借天氣比況之試觀上文先言孟施舍不如曾子又申言志至氣次然後曰善養曰難言復兩提其為氣也而結以集義所生其非謂充體呼吸之氣顯然矣且呼吸之氣豈能塞天地而既充體矣又別生一氣豈不漲死集注但見其水旁浩字不知古人浩皓音義皆同遂謂為盛大流行而論性不論氣不備之說亦從此章起豈知此章已先誤解可哂實則周易所謂乾資大始萬物資始者是也人之覺體是光其用即此始氣強謂此名以便文故稱神用亦稱神力彼國地如琉璃黃金者堅固不動光明相也池水蓮花行樹種種莊嚴皆光明神力所成與此土種類自異葢此土有質點之氣由始氣生如子得母氣莊子言黃帝得之以襲氣母殆即謂此管子輕重篇清神生心一節文義與此最近故能生生不已所謂坤作成物萬物資生者是也記稱氣也者神之盛也是其明證祭義此章明是輪迴之理詳見後朱子以氣之至而伸者為神是有意顛倒說故曰一陰一陽之為道陽為本有之光陰為後生之氣也故女人徃生即現丈夫相離氣純光也又曰陰陽不測之為神者神立於光氣之界間不容髮故莫測也太史公六家要旨道家陰陽家必居儒家之前從其朔也惜其書不傳陰陽家中必有光學故墨家得之董子謂陽常用事陰不用事借天光以立說猶存古義宋儒只知呼吸之氣強為分陰分陽如以一氣言以二氣言等語則并陰陽不識全是夢讛此土物類體質皆氣點所成故化學家化之都還為氣其有數十餘種原質者則又日光菁英所積正是彼土莊嚴諸物之比例也人終身在大光明中不能見而但見日光者譬猶白晝燃巨燭於室中身從日光中久立入室則眼前全黑一物無所覩一步不可行目力勝者或能見燭𦦨亦不辨其遠近方位室即軀殻之比也彼國有日月而無晝夜寒暑即此反比例可見猶日下孤燈照用不行也凡教皆起於有世界後世界初起教中說為如海飄沫正猶海中沙漲漸積而成洲也彌陀因地為寶海大臣誓取淨土者見悲華經猶今西人於海中訪尋沙島以闢地也彼土自有蓮華化生之神明大小本經皆有神明字樣與三輩徃生及聲聞弟子分言之講家不說者從略耳非修成後但是一片白地專待十方徃生也以其種子清潔故取以為淨佛國土也又攝取二百一十億國土清淨之行而莊嚴之即所謂隨其心淨則佛土淨非空無所有也法藏比邱現身此土去國出家而證果在彼土者猶釋迦住世時上升兜率忉利摩醯首羅諸天說法是定中事其應現王宮說觀經游步虗空還耆闍崛山則竟是色身往來諸大弟子得五神通者亦皆能之也修行五大劫成就者猶此土天皇地皇人皇氏等壽皆數萬歲劫有大小猶秝家之分章蔀其積歲自有長短也凡此種種皆不外人情事理之常就佛分上說則曰無作妙用實則亦必舉手動足猶此身舉手動足何嘗用意然祇是習氣業識不為妙用者以身見法見不空也釋迦說諸大乘經多方淘汰使人知心性本來廣大自在終古不滅而必指歸淨土者以此土有成必有壞如漢世昆明池劫灰及西人開壙見有螺蛉結成之土而眾行星古有今無者甚多尤其明證往生彼土則還其本光之原質永不變易也故諸經普勸往生祇作尋常語指成莊嚴名相不下一語分疏譬猶勸人遷居但說某地若何勝利即得矣而必欲深究其何以至此則任舉何物窮推不已皆不可曉如儒書說天開於子地闢於丑等人開人闢乎自開自闢乎子丑二字又從何來孰從而知之乎楞嚴說最初一念流動而生世界講家謂此人在何處動念不許再究正是善會此皆後來說圓說妙種種巧見之理障固釋迦所不及料也二十四問曰子於淨宗可謂思之深言之盡矣顧作十成死語何也答曰言說無深淺深淺在聽言故余敢盡言心得有深淺惟心自知之子心非我心故不知我之淺而求我之深我雖累千百言以自解其不能深子終以為不屑深不欲深也何也深淺之數由量出不得其量終無由見請與子言量如華嚴阿僧祇品說如來所知數量以一百洛叉或謂億或謂萬今從萬為起點遞次自乘至一百二十二次疏鈔作百二十四數者連起點之洛义俱胝兩數計也為不可說不可說轉戞然而止始終有數無義乍讀之愕然莫測惟觀首題大方廣三字知心體無方無盡不落數量而本師開口便說此品者明一一修證皆從體起用也又嘗讀管子知方生於圓圓生於心心體渾圓而用必方體大則用大故此起點極大以算家點綫面體推之為縱橫邊綫各百面積為萬體積百萬成立方體邊綫必用百者綫即一一點之積明此一一點通具十元門十十無盡也所知僅此空理而於一百廿二遞次自乘之事相終莫能入專研久之乃悟此品眼目在一知字此知字乃自性了然覺照全是現量與知見立知之知字不同經文所知二字所謂辭窮便文也說數量正是說心量故以心王菩薩為對機疏鈔云所以心王問者表數不離心是也稱心王者明不落相宗所說五十一心所故別譯亦稱不思議光王疏鈔又云令知普賢諸佛離數重重無盡也所謂知者不但一一識其多少之名當一一見其大小之實實即心光所到之界分所謂量也疏鈔謂寄數顯德分齊為宗是也以分齊二字詮解量字顯豁呈露極矣心本無量全體真空理法界也對物起用為知自然了知名覺對物而覺名知故知訓匹見爾雅便落邊際猶之百萬起點及一百廿二之自乘數皆但空名并無形相苟以物實之則多寡大小立見所謂事法界也如以此起點作寸方立體觀則邊綫百釐面積萬釐體積百萬釐了了可數遞次自乘者如以此百萬釐之寸方立體變作邊綫通長百萬釐即是十萬分即是一萬寸即是一千尺即是一百丈以此百丈自乘則為萬萬萬釐之平方面積似與寸方立體之實積相去懸絕矣而實則即是寸方邊綫之每釐破作百絲共一萬絲以萬自乘即是萬萬絲之平面再以萬乘之即是萬萬萬絲之立方體起點百萬數以算位計之歷七位故初次自乘超六位共十三位凡自乘皆倍本位或倍而少一位例推可知然則仍不出此寸方換名不換體雖換名不換體而多少大小截然不同亦復了了可數所謂理事無礙法界也然則此寸方立體在釐位即名一俱胝在絲位從釐進兩位即名阿庾多在沙位從絲進四位即名那由他從絲進四位以下皆從根位進例推可知是故就方寸觀則為體為本為實為心為性為寂為平等為圓融為因源為真空就遞次自乘觀則為用為跡為權為法為修為照為差別為行布為果海為妙有此乃約教行理三經言之切不可作總別同異成壞六相會而華嚴家以理事賅貫之是故遞次自乘乃至無盡通為事事無礙法界以一多多一互攝互入此乃六相之說歸根總此方寸之起點無餘無欠也故知現前一念即起點也信也點之直行為綫知其邊綫若干數即解也以綫為法遞次自乘即行也求得面積實數即證也葢心量無盡在人擴充信解行證四者凡學皆然下至百工技藝亦莫不然況佛道之無盡藏而凡心光所到學力所得隱然自具一局面如水花之暈燈光之照自然平圓四周均等苟以數約之必用八綫則為方矣其為廣狹精粗內照了了不昧便是本來無盡處故其現於數量則為自乘可見所照所得脚跟下立處即真真亦不住從此起數步步踏實步步向前遞次所用之法即是能擴之心求得面積之實即是所擴之量是則體用一原能所不二其外之推狹以至廣正其內之研粗以至精而此心之同於如來無盡藏顯然可知矣余因之自喜欲自驗其心量大小先就初乘百丈平方作觀不能及半已茫然莫辨丈尺旋收作二三十丈亦仍惝恍不定乃大媿懼竟變百丈作一丈立方體觀始覺分寸了了即刻意求其釐毫亦粗能辨心量之淺至此子尚何求雖然余以此意讀入法界品而益深信淨土法門之圓頓直捷而為一代時教之總要也釋迦成道後初轉法輪便是此經而三十九品中佛說惟三品純是淨土先聲阿僧祇品壽量品明是約彼佛正報隨好光明功德品約依報此品又為開宗明義第一說是則終於入法界品正與此品結應試觀善財所參善知識一一皆言我已先發阿耨菩提心彼善知識自五十位以前自說所得法門亦一一皆曰我惟知此如菩薩某等法門而我云何能知能說汝往問彼某善知識云云則分明以善財當不思議光王以諸善知識所說當如來所知數量全經語脈旨趣節節通靈矣疏鈔謂阿僧祇品該一部之數量又稱賢首謂善財在信是信位在住是住位一身歷五位隨在即彼收以徧一切故如普賢位云云此等皆義學家法眼圓明處視彼一橛頭禪通宗不通教者遠之遠矣夫不思議境界即不思議心之現量如虗空無象而萬象森羅其中豈有能入所入而云入者以念起也念起則猶以丈尺約虗空有數量有次第矣故就聖道門說則為以心入境難行道也就淨土門說則為以境攝心易行道也此品自具一多互入互攝之理不待分疏念佛者以彼佛不思議境界攝我不思議心也念起處即是所謂徧現俱該沙界也心之生生不已為性故達摩稱為佛性因此感而遂通即名不思議光猶儒書言感物而動性之欲也此類名義講家不甚分疏而既落文字相則又有不能不通用不能不便文之處讀者細心體會專重持名者名不虗生必有其實如百萬名一俱胝不同無記性一百二十二之遞次自乘名不可說不可說轉不同無義味話也故以無量光壽名號為能攝現前一念為所攝就所攝觀全念是名念外無名猶之方體起點數通賅渾括為末次滿量數而自無不足何也以我不思議心正彼佛不思議境界依以建立也就能攝觀全名作念名外無念猶以末次滿量數反本還原為方體起點數而亦不見盈何也以彼佛不思議境界正我不思議心託以全彰也按此以心境對待生佛對待原可一反一覆說為彼此互攝凡念自佛之差別正從此生今必以名作能攝念屬所攝為正說者緣名與念相對而分能所乃就法門作用言之若論本體則生佛公共初無能所而在眾生則但是理即毫無力用在彼佛則因行果德為全體名號願力為大用眾生不見其體而聞名稱念則能攝之力在彼不在此彰彰矣故此文特地先言念外無名及境依心立等語以斡旋執著念自佛之異見而使初入門者亦可以自識本體下乃申明名從實生層層結出其所以能攝之故以顯此宗專念他佛散心得生之本旨願與十方緇素明教理者同入無諍三昧平心察之然則念佛即佛念念聲即佛聲念光即佛光若聽若觀若聞不聞若見不見無非佛聲佛光何以故以名從實生此實即彼佛果德清淨法身圓報滿身千百億化身而正當念時則為應機示現身所謂循名核實事如是也亦實即彼佛因行四十八大願圓滿成就名稱普聞熏發我念非我現前思量分別心所能忽然起念所謂實至名歸理如是也是故不論朗念默念定念散念不論他方此方人類異類但能發願持名者無不現生取辦應念往生以彼佛因果不可思議故四十八願力不可思議願力不可思議故名號功德力不可思議名號功德力不可思議故能攝受眾生十念一念之力亦悉不可思議此無他猶之末次滿量數名不可說不可說轉舉前後遞後次自乘數量寬然容納其中而又豈一切方圓弧角諸算術所能測其積之多少邊之大小也哉余是以安於至淺不復求深誠自慙也誠自量也亦願子之離諸元辨自量何如也莊子云大視細不明細視大不盡故數量雖即心量而數多量大心力目力皆不能諦了今依楞嚴經說以十二為輪繪圖列表於左冀覽者易曉也世界數量圖附表如右圖知經以百萬為起點者指小千世界數言之此數歷算七位七位以前之數量人所共知故不釋舊解多以此世界一千為小千世界誤也試觀圖第十位即二千中千世界謂千世界再疊兩箇千字以數之第十三位還歸第一位即三千大千世界亦謂千世界再疊三箇千字以數之則可見小千者亦須以千數之謂一千千也即百萬也中千當第十位其數即十億更進一位即百億又可見佛說百億日月世界仍在華嚴大千界內非出界外也按楞嚴說世界謂世為遷流界為方位葢過去現在未來為三世東西南北為四界故云三四四三宛轉十二流變三疊一十百千今據此以十二為輪乃象數之自然不待安排算術逢十進一位自本位起進一位為十二位百三位千四位萬五位十萬六位百萬華嚴稱大方廣者依數成平面方積者為大成立體六面方者為方再能變立體為平面者為廣如表十則不成平面百則能平不能立千則能立不能平萬數雖百倍於百而仍能平不能立十萬雖百倍於千而平立皆不能但成縱方故必以百萬起點乃真能大能方能廣此所以小千世界其數必為千千也如是再進六位其數萬萬萬即是萬億則滿一輪當第二輪之首為第十三位乃大千世界之大方廣相也如是每進六位皆能平能立至滿第二輪當第三輪之首為廿五位其數疊六箇萬字從此再周兩輪當第五輪之首為四十九位其數疊十二箇萬字再周四輪當第九輪之首為九十七位其數疊廿四箇萬字以下皆依輪數倍倍前進例推可知然輪數位數法界數雖極大極方極廣至不可計算而始終不離第一位故約之方寸而自足也按字書蠶吐為忽五忽為系二系為絲自忽以下微茫不可辨矣然不可謂之無故算家自寸以下列算二十位今以寸方約百二十二倍之數固相去懸絕善讀者不可泥文字以求之佛說華藏世界如倒卓浮圖二十層而娑婆與極樂同在第十三層夫一華藏世界各有十華藏圍繞之遞推無盡而佛如是說者可知正從數量見心量自第一位倍倍增進至第十三位法象相符以輪計位纔到第二輪之首又可見念起即是所謂從第二頭相見法象又相符故彌陀經言十萬億佛剎觀經言西方去此不遠者皆謂其近在比鄰以算計之當第十四位即第二輪之第二位也或疑洛叉為億清涼疏有此說華嚴以十為法故以百億起點正當第十一位其算位亦當以十為輪是從第二輪第一位起如是倍倍增進至第三輪之首為廿一位其數疊五箇萬字再進兩輪當第五輪之首為四十一位其數疊十箇萬字以下亦例推可知此說雖以心量比之亦始終不離第一位而其起點介於中千大千之間固無所取義且其象皆為平方面而不成立體則是但能大而不方不廣與經義不合矣若以十萬為億謂百洛义當第八位其數千萬為起點則自乘之當第十五位其數百萬萬萬則是以縱方起點而以下位次皆雜亂無意義更不待辨矣明眼者幸詳擇之報恩論卷首
