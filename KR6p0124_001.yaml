body:
  text: 桐鄉沈善登述海鹽張常惺校録淨土法門綱宗釋迦如來説法四十九年三百餘會究其要歸惟在極樂淨土稱極樂淨土者是寂照不二體用一如義由其一切具足無假外求一切現成初不預計謂之極樂是就照邊用邊説由具足故有無相忘由現成故前後際斷謂之淨土是就寂邊體邊説由具足故有無相忘者如人有耳目決不自謂無亦決不自謂有而耳目宛在由現成故前後際斷者如正當今日決不計其昨日在前明日在後而今日天然是則寂而常照照而常寂寂為體照為用體用一如寂照不二也此之名義為一代時教之大綱領大結束明文奧旨具在諸經粗舉大端約有六證彌陀經言六方世界恆沙諸佛讚歎釋迦能為一切世間説此難信之法且各於其國讚歎此經普勸信受夫世界無量衆生無量法門差別亦應無量是以本師十二分教隨宜演説各就當機今云一切世間則此界不復揀擇云佛佛同勸則他方亦悉會歸喻如羣曜拱萬流赴海以其為無量門中之總持門故其證一無量壽經言當來經滅我以慈悲哀愍特留此經止住百歲衆生值者皆可得度準善見論法滅在萬年後以衆生壽命百年滅一歲計之則正當人壽減至十歲時矣又一説經道滅後彌陀名號獨留不滅不記出何經典法滅時分久近諸説不同新婆娑論最為諦當論稱世尊不決定説正法住滅久近者欲顯正法隨行法者住滅久近故謂行法者若行正法如佛在世時及滅度未久時則常住不滅否則即滅正法有兩種一世俗正法謂經律論等名句文身二勝義正法謂無漏聖道行法亦有二種一持教法謂讀誦經律論等二持證法謂修證無漏聖道若持教者相續不滅能令世俗正法久住若持證者相續不滅能令勝義正法久住云云夫諸法無常成必有毀世尊哀愍衆生何不多留餘經而但留此又何不令久留不滅而僅百歲蓋餘經聽滅正顯此一切具足一切現成之真心歷劫不滅或問若然則真心本來不滅何假世尊哀愍特留答此之經留正謂世俗正法名句文身有相之物成必有毀非假佛力焉能久留若不久留行法之人何從聞而生信據此則淨土門中勝義世俗二種正法皆留不滅云百歲者當佛在世時人壽早入減劫極長大都百歲故且就目前計之猶言衆生滅盡此經方滅而衆生前後相續不入壞劫畢竟不滅則此經亦畢竟不滅或問壞劫後空劫經與衆生一切滅盡此一切具足一切現成之真心還不滅否答不滅若滅則不復能成前經空劫後安得復有現在世界問既云空劫一切皆空此心不滅住於何處答待到爾時為汝證明不直言不滅者正如新婆娑論説欲顯正法住滅隨行法者住滅久近耳是故彌陀亦有滅度觀音補處觀音亦有滅度勢至補處勢至則永不滅度此之滅度亦當如新婆沙論説溯自法流東土至漢魏時無量壽經始有譯本而自惠遠首倡到今淨土法門旋興旋廢即近例遠彌陀觀音住滅之理可以微會勢至永不滅度者以此法為一切世間難信之法雖當彌陀觀音正法住時猶有隆替久而彌光至此始得佛化一統蓋此菩薩以念佛心入無生忍今於此界攝念佛人歸於淨土是以楞嚴會上選擇圓通觀音居前勢至殿後餘二十三菩薩盡入包羅二菩薩皆彌陀補處勢至尤為念佛初祖足徵一代時教成始成終不越乎此即今普門示現及淨土設施世多崇尚餘法門皆寥寥罕傳已有明徵矣其證二千經萬論指歸淨土乃至華嚴為衆經中王而普賢行願亦以十八願王導歸極樂夫一切法界無非華藏法界今不以淨土歸華藏轉以華藏歸淨土者不但華藏極樂同一土遮那彌陀同一身一多原自互攝小大不妨相入良以一切法界皆唯衆生心作心是詳見無量壽經綱宗篇是故衆生無盡作是無盡法界無盡此作是心不即現前介爾之一念亦不離現前介爾之一念窮根究源祇是本來一切具足一切現成無可譬況強名真心雖在悶絶無記未嘗斷滅三途劇苦宛爾逍遙是以華嚴四法界無量法門橫説豎説漫無歸宿不得不歸宿淨土而善財五十三參處處唱言我已先發阿耨多羅三藐三菩提心亦正指此其證三諸經法門不外除名遣相遣除之極至於無可遣除乃顯真如淨土法門一味建立名相建立之極至於無可建立當體真如所以然者譬如斗斛量米諸經法門意在舉似容積故必傾盡米粒方顯全量淨土法門即以滿盛之米粒實證容積之全量見米即知不待算數是知諸經遣除正為淨土建立猶之傾盡米粒以顯全量正為推求容積以量米粒以大辨才説真空法若不爾者空知其量而不量米同無斗斛非中道第一義空矣其證四色身即法身妄念即正覺全體大用具足現成諸大乘經廣談理性莫要於此淨土諸經不然功德莊嚴不外根塵且但説事十六觀經諸佛如來是法界身八句亦是説事以顯觀體本文自明不説理但説修不説性所以者何種種言説皆是名相有對待法惟此廣大心體一切現成一切具足絶代無對而體不可見假用方明無奈衆生多生惑習欲為其本致為名相所轉迷頭認影千言萬語愈辨愈惑於是彌陀徹底悲心隨順病情方便與藥即彼欲心填我願海還以願海攝彼欲心俾此一切現成一切具足之理性全成事修即體即用覿面呈露不待言説故於淨穢苦樂一如之中特地翻深出淺分別彼此緣淨還他淨穢還他穢樂還他樂苦還他苦如以濁水清水二水同一淨正顯此一念用處全真起妄尚自一切現成一切具足絶待無對況在本體是以説理説性轉成剩言而説事説修正非分外以衆生當體現成衆生具足衆生故譬如富家財庫寶藏現成具足簿籍分明畢竟逐一檢對尤為親切故知諸經所詮無非證成淨土其證五宗門剗除知見一一消歸腳跟下淨土即衆生知見入佛知見一一消歸他佛所以然者無念心體唯佛獨證此心體橫互十方豎窮三際彌陀所證光明無量壽命無量即是此心衆生原與彌陀公共但為念念不停無由證得然現前瞥爾一念起時即是此心用處是以乍聞佛名或聞此經不覺身心踴躍便是從體起用因而起念念佛便是攝用歸體久久純熟任運自念便是體用一如宗門就無念處直指心體不立他佛故曰不用求真惟須息見此中理諦諸經非不廣談但未切指下手工夫建立專門故稱教外別傳淨土即有念時會取心體專仗他佛淨土法門以專念他佛為的的正宗並無念自佛念自他佛念實相佛詳辨在後故曰託外義成唯心觀立此中理諦諸經既多散見而又特説三經歸根一念以總束之乃真教內別傳也四字得未曾有論法門之親切妙密千了百當自然禪宗獨勝淨土則拖泥帶水似乎專接鈍根不知此拖泥帶水近來禪客堅執門戶見從上祖師語録中拖泥帶水處偏能穿鑿解會不知我釋迦一生所説種種法門無非拖泥帶水而淨土為尤甚若能從淨土中薦取得管教掀翻禪榻矣正是將彼所謂兩面回途三關進步一齊越過設有禪客不肯云敢問如何是初關答曰南無阿彌陀佛如何是重關答曰南無阿彌陀佛如何是透三關句答曰南無阿彌陀佛還有末後牢關聻答曰逢人但與麼舉惟上根方能信入從上禪門宗匠永明而下諸大老最後皆歸心淨土從可知矣即中下亦自入國中不知信受此説除是木人名腸是以不立悟門更無悟門也不尚參究無可再參也三性中不落無記近人不識無記性往往誤當心空故辨之有念攝持也得手後不墮死水當念活潑也惟然故聞名皆得不退凡夫例登補處蕅益所謂上善一處是生同居即已橫生上三土一生補佛是位不退即已圓證三不退較彼頓悟正因僅為出塵階漸生生不退始可期於佛階者不可同日語矣故知此法門包盡宗教為教內別傳大集經云若人但念阿彌陀是為無上深妙禪近人但著眼此禪字便謂禪即淨淨即禪不知上句特下但念二字下句特下是為無上深妙六字經意分明以淨攝禪可見不念阿彌陀不妨是禪而不為無上深妙禪曷審思之至心想像見佛時即是不生不滅法正謂此也其證六此條宗家閲之不妨不肯姑舉一重公案與諸方商量香巖頌云去年貧未是貧今年貧始是貧去年貧無立錐之地今年貧錐也無仰山道如來禪許汝會祖師禪未夢見在香巖復云我有一機瞬目視伊若還不會別喚沙彌仰山大喜云且喜汝會得祖師禪遂報溈山證明之近人多謂香巖前説正是祖師禪後説正是如來禪而仰山偏顛倒説溈仰家風大都如此余謂如此判煞正好被兩公將黑豆換卻眼睛且道應如何判若道作家居士宛爾不同又正好被我俗漢將黑豆換卻眼睛畢竟應如何判莫是道合取狗口莫是默然良久莫是打一圓相喝一喝掩耳便走拂袖便行攔腮與掌擘胸進拳饒你將從上老古錐所有一絡索傾情搬盡又正好自家將黑豆換卻眼睛畢竟應如何判有此六證行者自可深入法門不為他歧所惑矣然其中猶有千古淆訛公案不得不明辨者唯心淨土自性彌陀二語古人原恐學者高推聖境不敢承當特為親切言之以見人人有分乃後人又因此誤解以為但淨其心極樂不離當下但了此性彌陀原非別人説土説佛純是寓言則毫釐之差天地懸隔於是蓮池蕅益諸大老又痛辨之謂淨土乃唯心之淨土實有可到之地彌陀乃自性之彌陀實有可見之人斯亦苦心分明之極矣而至今學者猶儱侗顢頇咬嚼不爛推原其故總由離句絶非種種元妙理解結習難忘不覺微涉恆真淨土化現淨土兩門時露楮墨致令讀者借此躲跟不知實際理地圓融行布原不相妨而法門則判然不容混濫也今不得已甘招口業將此二語破句讀作何為唯心則淨土是何為自性則彌陀是所以然者不到淨土焉證唯心現在妄想不名心也不見彌陀安了自性現在業識不名性也夫所以反覆詳辨唯心自性者為欲使人依經所説深知彼土之他佛即是自佛彼土有相之他佛即是自性無相之實相佛而不礙有他也今又以為既是自佛實相佛便念自佛實相佛則始終是他見未忘他見未忘則始終是我執不化念念之間盡成大小鐵圍山重重障礙西方極樂去此十萬億剎之程途未為遠在且必回他作自而後可以證心了性則能念所念之阿彌陀佛四字畢竟與唯心自性四字名相不同何不直念唯心自性四字之為徑捷而復多此之繞耶是故此宗專念他佛稍涉意見便成大法魔殃戒之戒之無量壽經綱宗出世無法即世法中修證圓滿不見有法名曰出世以自心性本無出入稱出入者分別凡聖但換其名不換其體此乃佛説一切經中第一真實圓頓了義不如是説即皆魔説諸經法門廣談性相不壞世諦密説此也淨土法門無量壽經專談世諦包羅性相顯説此也約而舉之有六要門其第一者世間人民四字本經節節特提五倫為本因欲所蔽都無義理不成法度臣欺其君子欺其父兄弟夫婦中外知識更相欺誑七句經文是故當經苦心誨喻教令修善二句經文反覆開示二千餘言歸重人倫處處特提再三不倦且復懸記當來經滅惟此獨留化度無盡是則人道一日不壞此經典亦一日不壞我佛如來出世因緣設教本末昭若日星苟有心胸應同信受其第二者世間人民幽明共理明有國法幽有天神因欲所蔽無禮無義無所顧難王法牢獄不肯畏慎不畏天地神明日月自用偃蹇謂可常爾八句經文是故當經開陳報應神道設教摹寫情狀前後重疊纍數百言令知警戒其第三者世間之民治生為急因欲所蔽徙倚懈惰不肯作善治身修業家室眷屬飢寒困苦耽酒嗜美飲食無度肆心蕩逸魯扈抵突無尊無卑無貧無富少長男女共憂錢財十三句經文是故當經殷重特提父子兄弟夫婦家室中外親屬當相敬愛無相憎嫉有無相通無得貪惜六句經文為説報應警其遊惰化其吝私令安生理其第四者世間人民生死死生本是常理因欲所蔽戀著形壽昧自心性本無生死蒙冥抵突不信經法二句經文生大邪見作諸魔業或撥因果棄有覓空或弄識神認賊為子或修仙業長生久視或習邪定空散消沈是故當經開示五趣決正生死泥洹之道三句經文節節唱言自然三塗無量苦惱展轉其中世世纍劫無有出期難得解脫痛不可言令捨五惡令持五善九句經文專談世諦具如上陳重重誨勉三輩往生皆言臨終佛來接引觀經小本亦同此説不許現生空談妙悟又復唱言善人行善從樂入樂從明入明惡人行惡從苦入苦從冥入冥六句經文不諱生死斷諸疑網其第五者世間人民如上種種既因欲故作諸罪本窮欲之原即是佛性全真起妄不可斷除攝妄歸真還從欲入是故當經阿彌陀佛開大願門隨順衆欲莊嚴淨土令生彼者惟身所適意之所念眼色耳聲鼻香口味勝妙自然盡滿所欲自身眷屬顏貌光明與佛齊等亦滿所欲壽命無量皆與佛同長聚不散亦滿所欲願來度世修短自如亦滿所欲是種種欲即生死本為涅槃因就路還家至極直捷是故唱言宜自決斷端身正行益作諸善修己潔淨洗除心垢言行忠信表裏相應人能自度轉相拯濟精明求願積纍善本十一句經文一世勤苦亦須臾間後生彼國快樂無極四句經文略潤節之法門善巧至實非權以離俗諦別無真諦非一二故其第六者世間人民不識自心有如是力聞斯經典初念生信轉念生疑還為欲牽念世五欲念既不一入善無門善又多途注念無所彌陀大慈現身説法令專念已闢直捷路為總持門以一佛名名一切善回一切念念一佛名正當念時餘念自斷久久純熟欲纍漸輕觸境遇緣此念先發何善不集何惡不除熟極兩忘證自心體是故當經六八願中其十八云設我得佛十方衆生至心信樂欲生我國乃至十念若不生者不取正覺七句經文又本師云信心歡喜乃至一念至心回向欲生彼國即得往生住不退轉六句經文觀經勸信小本勸願相傳作觀經勸行小本勸信非也當經文義自明善讀者自能得之不待詳辨皆同此説此六要門如大醫王曲體病情次第與藥前三對症急則治標第四斷根令不變復所以者何欲生惡死凡人常情轉凡成聖幸賴有此若不惡死則不可教惡而能免亦不可教知不能免聽之不惡仍不可教雖必不免而畢竟惡乃可以教緣惡之源即從欲起而欲之極無過樂生是故唱言人在世間愛欲之中獨生獨死獨去獨來苦樂之地身自當之無有代者善惡變化殃福異處當熟思計遠離衆惡擇其善者勤而行之愛欲榮華不可常保皆當別離無可樂者十七句經文欲得常樂當求往生欲得往生當積衆善欲積衆善當盡倫紀苦心孤詣截斷衆流如是如是第五培本本者惟心心體無念遍十法界無明業識攬境局一餘界似隔而互隱現隨了別之成念起滅此了別識如鏡之光不即鏡體不離鏡體但患局一不可強無大聖權巧開念佛門因其局一而不自知謂為本爾故令舉念自局一佛不局餘者因此業識由欲障生欲無厭期原即佛性惟佛法界光明壽命功德莊嚴無量無邊勝妙殊特能滿所欲發其肯心行者當知諸佛國土非寓非幻皆是實有若不實者雖念無成故觀經言是心作佛是心是佛語極明顯惟其本是所以可作譬如蒸砂終不成飯砂非米故惟其可作方顯本是譬如生米亦不名飯煮斯成故又復當知佛界既爾餘界亦然無非自心全作全是全是全作何有苦樂而容欲惡才有欲惡即復自局多生以來不自覺知念念不停局於六道故現六道今回此念念念不停局於淨土自現淨土現淨土已確然證得惟是自心而亦宛然非無淨土可知餘界亦惟自心善惡因果決定不虗苦樂境緣自然順應如元氣復病藥兩捐自在無礙第六藥引導引諸藥深入病所非此不靈衆生業識積劫沈疴窮推病源從我執起此執有二遍計我執名為見我俱生我執名為慢我前粗後細二乘菩薩猶所不免若不抉去雖藥無功或反增病彌陀悲智照了此執猝難遣忘隨順其情故現我相以我名字令他執持所以者何二種我相均對餘他隱自主宰若他主宰如僕從主我聽命他則我虗立假名為我自無可執行者當知彌陀往昔兆載永劫為我等故積植衆德嚴淨國土難捨能捨難忍難忍難行能行具足修滿六八大願接引我等而令我修祇是平常日用間事初無少難但稱他名發願回向盡形不廢即得往生又其國土超勝獨妙如我所欲一切具足不費我力我所愛樂為創現成我所苦纍為祛現成我有功德未能修者為修現成我有願力未能滿者為滿現成即今一念能念於他亦他宏誓歷劫感我我不自由自非宿世與我緣深安能如是如是信入生大歡喜作必生想一心亦生散心亦生二六時中不妨作務默自稱念亦復不妨念念有我緣稱名故為名所轉早自念念全翻向他法門巧密名字功德利益之大超過十方彌陀所獨諸佛皆有宏願接引衆生或相好或音聲或光或通大同小異而名字接引則彌陀所獨是故當經六八願中稱我名字聞我名字居三之一共十七見其一言乃至十念不明著名號二字而本師言生彼佛國諸菩薩等所可講説常宣正法隨順智慧無違無失於其國土所有萬物無我所心無染著心去來進止情無所係隨意自在無所適莫無彼無我無競無訟十六句經文種種功德八百餘言以法無我建首為本足知此經往生正行專念佛名餘俱為助念佛名中專念他佛不念自佛實相佛等稱佛本願力用勝故如阿伽陀萬病總持不可思議如上所述綱宗粗具一代時教歸本淨土淨土五經歸本願門願門六八歸本念佛念佛多方歸本他佛是以本師復説小本發明此旨其云不可以少善根福德因緣生彼國者正顯本旨持名為正餘行為助純助無正不發願心則不得生正助並修不發願心亦不得生均違本願善惡易雜難明心故大意略具第五六節純正無助發願往生決定得生但須權巧撥置世事尅期取證證後兼助以應本願圓融真俗揀二乘故以正攝助發願往生畢生無改亦決定生正合本願助亦歸正不須現證自圓證故是四料揀孰難孰易孰便不便有智行人宜早決擇其餘同部往生呪經鼓音王經賢護經等淨土之支流甚多西方合論略備矣皆當參觀則皆本師隨機演説令生正信業障本與此持名力用不同無取和會嗟乎此經性修不二理事雙融普攝三根總持八教開闡心法而質於言經綸皇猷而泯其迹自非大聖孰與於斯乃自後漢始譯到今塵封大藏千六百年疏解罕傳遑云信受聞東洋有善導疏本惜未得見何以中國失傳亦所不解推原其故高者談空下者數寶禪宗既盛門戶益分波及吾儒鬬諍堅固此經尤朴兩為所遺講師家法矜守一途推高鑿深均所不免此經義富世諦紛陳判教既難亦遂忽棄二林居士起信論極力主張理致深元初心難入今之綱宗但據所譯順文演説無取苟同致令如來懸記孤留徹底悲心無量衆生萬劫依怙常住大典若存若亡訛替日甚羣魔伺便借法售欺惑亂愚民分立邪黨世相之壞言之痛心而我儒流曾弗少悟猶復闢佛為魔助攻哀哉斯人何辜至此是用大懼述為此文千慮之愚容有一得其間疑難應申論者著於後篇往生正因定論淨土法門以一佛名貫攝衆善使稱念者時時處處如憶慈母如對嚴師如質帝天如臨君上則惡念起時自能降化善念起時自能擴充此正彌陀善巧方便令衆生心不離佛法以行世法自然不壞世法而證佛法是以彌陀本願度生之力雖歷兆載永劫之久能感衆生發願往生衆生發願往生之力雖隔十萬億剎之遙能感彌陀本願來度緣法法之本一故願願之皆如惟然則何論伏惑斷惑何論一心散心但肯發願持名孰不現生取辦法門之巧功用之大全在乎此斷可識矣小本彌陀經言不可以少善根福德因緣得生彼國者正恐世人雜修善根福德而不專念求生則違彌陀本願故云不可以見持名之為正因也下言執持名號一心不亂臨終見佛即得往生者復恐世人不信散心得生之理又違彌陀本願故令尅期自證以見字字句句念念之間本無二心本來不亂證與未證皆不過如此臨終往生亦不過如此非謂苟未證到便不得往生也蓋彌陀衆生同此心但在衆生為理即佛在彌陀為究竟佛所異者修證階漸耳而心性實無可修證則惟即一念之專雜憶忘以為修證即修證亦難分階漸則惟即世法之善惡等差以為階漸若必高談無善尅求一心轉推轉遠緣離善惡外別無無善離散心外別無一心理境愈元收機愈狹又安見名字功德之不可思議哉此説非創具在無量壽經如佛前發願章第一願云設我得佛國有地獄餓鬼畜生者不取正覺此願為衆願之綱以見人性至善本無容惡之地故其國無三惡道第二願國中天人壽終之後復更三惡道者不取正覺第十五願國中天人壽命無能限量除其本願修短自在若不爾者不取正覺此二願互相補備發明以見至善之性本來不滅所以生彼國者壽命無量縱使發願度生回入惡世本性圓明自不更作惡業第十六願國中天人乃至聞有不善名者不取正覺此願見生彼國者永不退轉故能純善無惡第十八願十方衆生至心信樂欲生我國乃至十念若不生者不取正覺唯除五逆誹謗正法此願見欲生彼國者必遷善改過故曰至心信樂凡罪皆許懺悔故曰唯除五逆誹謗正法若不遷改即非至心若聞佛名恃以無恐或借法作諸邪業即是誹謗此二種雖畢生念佛亦不得生第十九願十方衆生發菩提心修諸功德至心發願欲生我國臨壽終時假令不與大衆圍繞現其人前者不取正覺第二十願十方衆生聞我名號繫念我國植衆德本至心回向欲生我國不果遂者不取正覺第三十五願十方無量不可思議諸佛世界其有女人聞我名字歡喜信樂發菩提心厭惡女身壽終之後復為女像者不取正覺此三願菩提心與修衆德詳略互見即下文三輩往生之差等以見欲生彼國必兼衆善淨土極詣不同二乘第三十七願十方無量不可思議諸佛世界諸天人民聞我名字五體投地稽首作禮歡喜信樂修菩薩行諸天世人莫不致敬若不爾者不取正覺此願言菩薩行者具足萬善永斷惡緣故得現生天人致敬壽終往生不言可知按四十八願中其四十願詳陳彼國種種功德莊嚴令得生者悉獲種種快樂自在及他方諸佛菩薩聞名稱讚修行之類惟此八願為接引人天衆生往生正因自始至終不過曰善曰惡曰至心曰發願曰繫念曰十念曰諸功德曰衆德本曰菩薩行詳略互見初無散心一心之分此一證也三輩往生章上輩行作沙門發菩提心一向專念無量壽佛修諸功德願生彼國中輩不能行作沙門大修功德當發無上菩提之心一向專念無量壽佛多少修善以此回向願生彼國下輩假使不能作諸功德當發無上菩提之心一向專意乃至十念念無量壽佛願生其國按一向專念與發菩提心三輩皆同惟一則曰修諸功德一則曰多少修善一則曰假使不能而品位遂判此二證也勸進往生章首言何不力為善念道之自然著於無上下洞達無邊際宜各勤精進努力自求之必得超絶去往生安樂國中言當熟思計遠離衆惡擇其善者勤而行之其有至願生安樂國者可得智慧明達功德殊勝末言宜自決斷端身正行益作諸善精明求願積纍善本雖一世勤苦亦須臾之間後生無量壽國快樂無極按此章重在愛欲本斷生死根然其法不過為善擇善作善積善而以念力願力貫攝之此三證也五善五惡章略準五戒十善五番唱言一心制意端身正行獨作諸善不為衆惡又吳譯本云諸欲往生阿彌陀佛國者雖不能大精進禪定持經戒大要當作善一者不得殺生二者不得盜竊三者不得淫泆四者不得調欺五者不得飲酒六者不得兩舌七者不得惡口八者不得妄言九者不得嫉妒十者不得貪叨不得慳惜不得瞋怒不得愚癡不得隨心嗜欲不得中悔不得狐疑當作孝順當作至誠忠信當信受佛經當信作善後世得福奉持如是之法不虧失者在心所願可得往生阿彌陀佛國按五戒十善本人天因今以念佛回向遂為淨因其云一心制意者仍不過一向專念之謂初無深元此四證也四證之中以第二證為綱紐上順彌陀願輪下開當經教理特標發菩提心一向專念為正行修諸功德萬行回向為助行以正攝助於念念間轉一切因一切緣一切業一切果為淨因淨緣淨業淨果轉一切法門一切功德一切知見一切境界為佛法門佛功德佛知見佛境界而惟是一念不假方便即初步即究竟此其所以能全收三乘十二分教當來經滅巋然獨存衆生值者皆可以具縛凡夫徑登補處也行者從此信入決定得生莫更計較散心一心自生障礙且所謂散心得生者非悠悠泛泛之謂也必須尅定課程畢生無間隨時隨處覺一念善便提佛名著力回向覺一念惡便提佛名著力懺悔不得體究此覺是誰流入默照邪禪不得自疑能覺即佛無須更提佛名當面蹉過亦不得疑此是察識端倪工夫為儒家所唾棄總之死盡偷心和身倒入彌陀願海寧可顛倒妄想決不於願門中別求解路方是此法門專念他佛的的宗旨行者須知盡我多生以來所有福德乃至所積罪業在彌陀願海中皆不及毛端之一滴則亦何不攝受之有盡我多生以來所有智慧乃至所見理諦在彌陀願海中亦不及毛端之一滴而亦何可思議之有近見修淨土者多為一心不亂四字自生疑阻特為拈出此旨俾知得生與否在當人於念慮間默自勘驗不必計較臨終之如何而旁人則勘驗其平生行履亦不得槩舉臨終為定論也此中大有淆訛與世法亦大有關係略判等差如右俟明眼正之壇中所作正論五篇傳鈔不乏人惟香巖李丈評點一過今照録之稱譽過情知必為世所詬病然而不遑自恤者不獨解人難得不忍棄也近世禪宗掃地無復可言而淨宗亦淆訛不少魔民乘間亂本日深鄉曲豎儒曾不知國家二百數十年來護持至意與夫近時近地若彭若單諸君子隨機化誘深心方復奮其吏氣封禪院括寺田嚴禁喫齋驅迫窮黎入於異教可駭可痛情狀今略具於醒迷歌中有心人當自覺之是論出後息安許居士讀疏文至挽回路絶呼籲天高二語北向稽首痛哭失聲持示李丈為評點之如此天下之大知必有通儒碩彥乘願再來能擔當此評語者余願生生世世捨身供養丁酉冬日附識辨正五逆謗法不得往生説無量壽經彌陀釋迦前後兩言往生衆生唯除五逆誹謗正法而觀經言下品下生者五逆謗法具諸不善應墮惡道臨命終時遇善知識種種安慰教令稱念阿彌陀佛令聲不絶具足十念命終見金蓮花住其人前如一念頃即得往生二經相反講家多方和會終有未安昨念佛頃豁然心開悟得兩經本文正自相成無勞和會蓋觀經許得生者是指臨終甫聞淨土法門者言之按本文九品前五品皆言以此功德回向求願往生後四品皆言臨終遇善知識為講淨土教令念佛可知下品下生者生平未聞臨終甫聞一聞即念念畢即終悔力信力二俱勇決更無轉念故得往生此剎那頃稍一遲疑決難僥幸其所以生平未聞者按無量壽經言佛告彌勒汝及十方諸天人民永劫以來輾轉五道乃至今世生死不絶與佛相值又復得聞無量壽佛快哉甚善吾助爾喜又言多有菩薩欲聞此經而不可得又言諸佛經道難得難聞若聞斯經信樂受持難中之難無過此難據此足證斯經難聞菩薩尚爾況下品下生平日具諸不善者乎然則其所誹謗之正法必是其餘十二部方等經典而非淨土諸經可知緣語氣承上節下品上生雖不誹謗方等經典而來故但言具諸不善不重出經若謗淨土諸經則平日疑根已深臨終何能盡拔雖有善友開慰亦力薄無濟矣五逆重罪幸逃法網臨終地獄相現亦承上節下品中生而言故不重出苦逼求救必其自陳罪本善友方能知之而為説法開慰若所犯衆著早罹王難又誰能曲庇令得病終乎且阿闍世王固早聞淨土法門矣然逆事未成痛悔求佛佛為親與懺摩方得脫罪則下品三輩所遇善友亦必身證聖道方能開示拔濟不同尋常講師可知而諸經典中多言持誦功德臨刑可免者亦非五逆之比又可知矣無量壽經不許往生者是指平日已聞淨土法門者言之按本文彌陀成佛在釋迦十劫之前發願時又經不可思議兆載永劫方能滿願成佛則所言誹謗之正法即指本願而非釋迦所説一切經典可知既聞猶謗自不得生然猶可懺悔世親菩薩初謗大乘後悔欲自截舌其兄無著勸令轉謗為讚乃真懺悔遂著唯識論等成菩薩道是其證也若五逆明知故犯則必墮地獄經歷多劫受苦無量經有明文緣所害冤對難逃而性種不能復發故不通懺悔也兩經各明一義正顯彌陀大願所開淨土法門其力用之大世諦之圓衆生得聞信受之難當來獨留關係之重直有超過一切經典不可思議者即自曹魏時始譯至今閲千六百餘年若緇若素罕聞受持讀誦無量壽經者難得難信之説已明驗矣佛豈有虗語哉諸有智人如何勿思二教通喻空有相資無方無盡本此立教中道斯顯教由緣起其緣維何千萬億年千萬億衆人心結成時至理彰有聖人出因斯建立法爾如然初不作意自有生民嗜欲日開機智日出變故日更養欲給求日新月盛規制損益亦日整齊譬如造屋梁柱椽楶長短大小牆壁窗戶厚薄闊狹與地相準斧者削者鋸者鑿者斫者汙者次第奏工色色粗備大匠指揮遂成廣廈非散匠拙而大匠巧時之未至則物不備物之不備即時未至至斯備矣備斯至矣法爾如然緣起故也惟我孔子生春秋時書契以來羣聖制作爰集大成故稱至聖釋迦降生先百餘歲過去七佛化儀遺教道通為一故稱法王其先後者中國西竺衆生緣熟機感不同應迹斯異隨宜設教大旨維均其均若何如屋成已此屋主人與其眷屬下逮奴婢於此屋中舉足下足無非空地安置家具無非空地方位左右次序上下維適維宜無非空地初不在於梁柱之上牆壁之間安身立命亦復不計此為梁柱彼為牆壁制度何若并其從前土木經營辛苦有此承誰之力亦都相忘惟遺大匠所記簿籍料配羣材丈尺贏縮及其間架寬窄之度巨細分明後來仿造隨地變通不離都較上來取譬孔教大旨比例可知佛教亦然相資為用教分五時善巧方便發明心性緣此心性隨時隨處無在不在難言説故如屋主人忽逢人問向所造屋土木萬千堆砌而成汝居其中不窒礙否主人則答屋中空曠受用自在向所經營梁柱椽楶牆壁窗戶但是外廓何所窒礙復問主人汝云空曠都無窒礙故得自在向之土木將非幻化抑太虗中可搆造耶答云否否我屋實有不同化城太虗空中無可措足安能建立我之自在實據平地復問主人室廬外廓汝力所成自是己有所據平地非關汝力孰容汝據答云此地是我祖遺曠大無垠莫識涯畔隨屋所在都是世業復問主人屋據平地上下四旁邊廓周正其中實空空非太虗與地相資此空與地較屋外者有分別否答無分別又復問云汝之自在由地與空既與屋外空地無別則屋虗設從前經營得無多事答云否否屋外空地盡眼所見莽蕩無歸為見空故轉不自在即今屋中空地相資習久不覺承問憶屋乃始恍然故知一向受用自在全賴有屋屋雖外廓原與空地相資不離居之斯安不為多事又復問云如斯受用承誰之力答云我念屋中空地雖我本有不加尺寸非屋不顯不得受用輾轉推求大匠之力今寶所記經營簿籍傳之子孫流播世間普同自在上來取譬佛教大旨比例可知故知凡教不外空有有不自有空不自空即有見空即空見有互顯互隱中道宛然并中道忘斯為極詣工夫階漸仍在二邊由是則知世人種種演孔刮佛佛日儒星彼此相傾都成戲論由是則知惟孔與佛離不成二合亦非一並垂萬古不容偏廢由是則知孔佛而外決無他教可參為三緣有與空人心所同物理亦爾離空有外更無三故普望一切異見衆生平心靜氣諦審思之雜説理學家言氣聚則生氣散則死無所謂輪回世多信之以為精理不知善人惡人多不免死善人死後還之太虗猶之可也惡人死後亦還太虗否還則樂得作惡不還則在何處若云其氣澌滅多盡此滅盡處有空隙否若有空隙仍是太虗若無空隙仍在一氣何云澌滅即如彼説似乎還之太虗常存不滅為勝澌滅都盡為劣既太虗矣誰受勝者既澌滅矣誰受劣者善惡報應皆無所施輾轉矛盾何以立教今人不識自心所以不信佛以上六條門內人自應洞然明白門外人乍聞念頭是用別有一心是體必然大駭今不得不設喻以明之心譬如鏡念譬如鏡之光念東念西念好念醜譬如鏡光照東照西照好照醜假若除却一切口可得説眼可得見之名物形狀便無從起念可見此念頭上之東西好醜全是外物影子落在心光裏並非心體然心體無從尋覔無可拈舉不比鏡體易於辨別以才欲尋覔拈舉即是念頭早已落在光上非心體矣問曰既云離念之外別有心體而又無可尋覔拈舉將何作證答曰仍將念頭作證譬如室中懸一大鏡四面不露邊際門外人不知有鏡而驟見己身及一切物影子在對面顯現便決定知其有鏡夫不見鏡體而可就其光之照影證其有體則不見心體亦可就其念之照物證其有體問曰鏡或銅質或玻璃質故能發光心無形段光從何來答云此問甚善可以識性凡物虗極淨極則有光如火本當喻以雲海鏡光因見者少姑借火喻其實火無自體頗類識神明眼者辨之平極淨極則有光如水密極堅極則有光如五金如玉石心無形相可言此虗淨平靜堅密六者則其性也由有此性不同頑空是故當知性從心生其文左心為母右生為子聲兼義也又復當知物各有例此六者借物例推實不同物其虗也一切莫能窒塞之其淨也一切莫能汙染之其平也一切莫能高下之其靜也一切莫能撓亂之其堅也一切莫能破壞之其密也一切莫能間入之故曰性善柳子厚大鑒禪師塔云其教人也始以至善終以至善不假耘鋤本其靜矣可謂知言今心為念亦聲兼義説文云今急時也世間最急莫過於念如念阿彌陀佛後念才起前念已滅微細推求當念阿字時前念佛字已滅念彌字時阿字已滅念陀字時彌字已滅念佛字時陀字已滅句句字字當處出生隨處滅盡然則念念是現在即念念是過去念念是未來三際皆不可得畢竟何物是常住不滅者若無常住不滅者則亦無過現未三際矣四時代謝而不窮為天常住也五方易位而不亂為地常住也天無實體地有變滅姑借以發喻耳人肖天地以生而念念不停若此獨無常住不滅者在乎此理可深思矣戰國時天下之言非楊即墨孟子辭而闢之才一二百言而其道遂熄今其書僅存楊氏之書附見列子無傳其業者佛法入中國殆二千年漢魏迄唐儒家攻之僅在粗述漢魏間闢佛大意略見牟子宋儒輩出以為是固未足以服之也於是略涉其藩并其精義而亦巧辨醜詆之此風相沿至今未息可謂極盛其間復經三武之暴魏太武帝劉宋武帝唐武宗設為厲禁滅之而到今天下佛法如故自搢紳先生下至氓庶無智無愚斷然以為不足信者千中不及一二夫楊墨之言盈天下其禍烈矣孟子闢之如是之易使佛果為禍於中國二千年來貽害無窮不啻百倍於楊墨乃以人主之威力諸儒先析理之精審持論之嚴正曾不能動其毫末吾不知闢之者之心思才力猶有所未至耶抑其道果不可闢耶兩者必居其一矣使果不可闢請無以孟子藉口使猶有所未至則狂夫之言聖人猶述焉具如後條幸平心察之方今法門衰極僅存粗迹矣敢即就粗迹略論之直省州縣僧徒多少通牽約共四百人香工等之依以為活者約百人是一千三百餘州縣統計得六十餘萬人此六十餘萬人不耕而食不蠶而衣誠哉可恨徐而察之直自魏晉至今歲歲如是終唐之世且不啻數倍之假使此千八百餘年中天下郡縣率有六十餘萬飢民需終歲之賑恐雖有聖人不能以一朝居自頃南北數省飢荒國家發帑官紳勸分約二百萬金首尾不及兩年間已竭蹶不遑若此然後知福田利益布施之説所以破慳囊為久計者固非自私而自利也以昌黎原道之義正詞嚴而必結以鰥寡孤獨廢疾者有養蓋知其故云此六十餘萬僧徒中窮極無歸者十之七八怨懟自廢者十之二三或逃罪或耽間錯雜此兩類中者十或一二真知佛理而為之者千不得一焉浮慕其名者百或得一焉綜此數類大率鄉愚無知氣質粗駁假使吾書院義學中歲歲聚此一輩鄉愚而教督之歷千八百年之久其不敗壞者幾希今彼中略識字者居然十得九粗解筆墨者居然十二三且皆勉就範圍粗嫻禮貌其借法售姦者百中或二三公然為惡全無顧忌者千中一二耳而其間出類拔萃通知大道行解相副卓然為一代宗匠者歷朝史傳先賢文集及諸家燈史所載指不勝屈焉然後知一代時教規制之善罪福因果報應諸説裁成變化之巧實有合於古昔盛王先養後教之遺意明道先生於某寺觀齋僧歎為三代禮法盡在於是蓋知其故云印度文字與泰西各國相類但有語聲並無義理經律論三藏皆是語録翻譯時先通其語代以華言然後述為華文譯語與筆述者各有巧拙不同故諸經有前後數譯本者詳略亦異然大旨皆同即金剛六譯本可見諸呪相傳有五不翻或謂如軍中口號但許密傳故不許翻或謂一句兼數義故不能盡翻諸説皆是臆度蓋印度語言有中國所無者如人名地名物名之類現翻泰西各國之書祇能肖其口音不能以文字替代泰西各國之書載中國人名地名者亦然即如稱中原為采納實則彼國向無中原之稱仍是中原二字之轉音耳佛書稱中原為支那正與采納相類皆轉音也昔人即不解呪語本無可翻創為五不翻之説理學家尋縫覓隙遂謗為呪必淺陋借不翻以藏其拙均是癡人説夢五不翻中其一謂惟佛與佛能解此頗近理佛菩薩及八部鬼神之見聞境界與人不同譯師不解祇能仍其本旨諸呪從無弟子説者是其明證四果八部之名目不與凡夫同類難以文字替代故亦仍其本音猶今西國各書之稱中國人名也阿耨多羅三藐三菩提心但翻心字者心之一言華言所有故能翻阿耨多羅三藐三菩提九字華言所無但知其為無上正等正覺之稱譬如中國常言至精極妙一語彼國所無但知為極好之稱故寧譯釋其意而不改其口語一則以其為一代時教中總要名目故極意加謹不敢輒易一則佛之常言諸經屢見故亦仍其本真示尊敬意如遼金元三史多仍國語其詔旨直録原文不改即其證也佛制諸經不立文字蓋有深意照録當時語言直敘問答氣象一涉文筆易失真面目也如諸經中世尊語止復説必重呼弟子名不憚再三弟子答語亦纍呼世尊不憚再三且有節節詳述世尊向某人邊某人向世尊邊不憚再三者讀之覺世尊慈悲懇切弟子親愛尊敬之意流露言外其偈頌則是佛教中文字如中國詩歌針銘之比故必申明欲重宣此意而説云云以見長行是語而不是文字也偈語原必有韻譯以中國文字則無可協故無韻間有用韻者如後出偈經之類譯師善巧點竄既是文辭但求達意不妨略改令人易誦也華嚴字母教中極重流入中國遂為韻學鼻祖是其明證儒者不解此理刻意求疵見偈中有韻者反謂彼教焉得有有韻文字斷為緇流臆造且即以證經之類多臆造何不思之甚也佛教既不立文字故三藏皆是語録本無經傳序記等名目經之梵語為修多羅原翻為線言其貫穿也流入東土後以中國文字經為尊稱故亦稱經既是語録弟子尊其師説有聞必録不必皆有深義如小乘中傳述因果報應或問答名義諸小品在中國成書則如雜考雜説之類醫痔經偶説方劑呪水治病在中國成書則如藝術之類教中亦不以為重但同是平鋪直敘而無中國文字一切體製不得不概謂之經儒者分別觀之可也鬬諍堅固不暇深求才覩首題便斥為僭竊吾聖人箸作之尊號然則楊子之太元經文中子之元經既同其名并擬其體何説乎兵家術數家藝術家亦多稱經甚至相馬相貝品茶品酒亦概稱經更何説乎且惟帝王制法於民則謂之律臣下箸述章程之屬罕有敢用此稱者惟醫門法律他未之見今不惡律藏之稱律獨惡經藏之稱經平心自思其故安在古聖人心迹出處之難於窺測莫如吳泰伯背棄君親偕弟遠遁病不歸省喪不奔赴且斷髮文身裸以為飾自孔子歎為至德又申之以民無得而稱焉可見當時是非未定至今三吳文物之盛甲天下咸知推本於讓王開基設非孔子有此語或有之而不見於論語僅見於他書恐至今少可多否是非未易定也有宋諸賢類多探索內典或積至十餘年之久最後則曰佛教滅絶彝倫其他何須更問夫佛之出家誰不知之不待讀其書使果滅絶彝倫則是罪惡彰著顯而易見之粗迹也乃遲之十餘年之久而始覺之有是理乎亦可知其非出本心矣佛制在家男女受五戒者須先咨白父母次眷屬次君王皆聽許已乃為説戒其欲出家者先以此戒為基出家時重白父母眷屬君王皆聽許已乃得剃度受持沙彌戒五年習熟進比邱戒七年習熟進菩薩戒其不得受戒出家而與法會者曰清信男清信女凡出家二衆冬夏入蘭若講學春秋歸家養父母故僧家序齒稱夏臘不稱年在家四衆亦冬夏入蘭若聽講思欲則歸欲飽還來皆聽之此佛在世時也逮滅度後遺制凡受戒每壇三人過則法師得濫法罪出家必剃除鬚髮者猶吾師儒章服必異於衆又重為之防不使兩混也合前後觀之其圓通方便若彼鄭重謹嚴若此曩有客問余曰使佛教盛行人類當絶奈何余曰賴有卿輩在否則當時被教各國人民旱無孑遺安能流入東夏其人不悅余曰子不讀論孟乎樊遲學稼夫子答以好禮義信焉用稼孟子闢許行而言大人勞心小人勞力使當時孔孟之教盛行人人皆欲不稼而好禮義信不勞力而學為大人應亦孔孟所深許而不能禁也子將不慮其復變為茹毛飲血之世乎其人失笑而退或言自古高僧類皆絶異於衆可畏不可近是以先儒見歸宗禪師遺像雄偉歎為狀貌如此必其資性能為賊禍於天下如操莽之流余笑曰子誤矣此先儒讚佛語子以為毀乎夫操莽皆以文學見重於當時其初固吾黨人也今云歸宗之資性即操莽之流可知操莽之資性亦歸宗之流矣以本歸宗之流濟之以文學而卒成操莽以本操莽之流納之於叢林而遂變歸宗佛教之入中國害乎利乎問者笑謝去心性之學莫精邃於佛書宋儒千言萬語或録全文或括大旨皆本於此其大綱領之顯著者如事理對舉惟楊子有説事者莫詳於書説理者莫辨於春秋二語亦是分説無為善惡對舉心要內外兩忘心有全體大用及體用一原顯微無間此程子所謂必不得已而説出者諸説皆唐代諸禪師經疏語録中首發者蓋時至理彰入而俱化不自覺知必謂陰用而陽拒之亦過也其毀之者無極太極陰陽五行之成見牢不可不知六經語孟言心性處原不如此也或難云至理愈闡愈精六經語孟辭意簡質本無如許高妙之談安得以其原本佛書者為是原本太極圖者為非答曰此理易曉譬如作時文以心性為題由淺入深逐層疏剔不假安排道理完密者自是正宗文字而經旨亦合別立柱意或創新解或專一經縱説得盛水不漏終是強題就我偏鋒文字與經旨微隔一絲矣類聚六經語孟及西漢以前諸子百家言心性者為第一編東京而下迄於隋初諸子百家言心性者為第二編唐代諸儒及宋五子前言心性者為第三編宋五子以下迄於國朝諸大老言心性者并其為學宗旨為第四編諸儒或贊歎佛書或拈弄機鋒及與高僧往來贈答詩文皆附編末第一編可以觀吾儒言心性之本旨第二第三編可以觀其漸入佛理第四編則儒佛之異同原委燦若列眉時代前後彰彰可考自不容以筆舌空爭矣類聚闢佛之説若史傳所論及詔令奏議私家著述等唐以前為第一編其崇佛者為第二編唐以後迄於國朝其人生存者不録為第三編其崇佛者為第四編四編中凡僧俗辨正及講學家彼此互諍者隨條附入如此則一時之風尚兩家得失之淺深及其用心之公私厚薄均可於言語氣象間得之四編之前恭録本朝列聖闡揚佛理護持正法諸詔旨詩文從無闢佛者及當時諸僧奏對機緣編定入藏或見於諸大老文集者為卷首以見本朝家法儒佛並重聖人作用道合時中所以為子孫黎民計者至深且遠普天率土千萬億年長承幬覆於此而猶生疑謗辜負深恩井蛙小天何足以辨哉昌黎與大顛三書顯然緇徒偽託東坡篤好佛乘而不信三書紫陽闢佛之力遠過昌黎而偏以三書為真且著為論説以證實之竊所未喻周子大賢曾與東林佛印諸禪師往還論道亦誠有之不必諱彼徒遂稱太極圖為東林口訣誣罔孰甚夫周子太極圖得於穆修修得於种放放得於陳摶胡五峰言之詳審彼徒既倡為陳摶得於麻衣麻衣得於壽涯壽涯得於國一之説以為東林祕授之證而朱子又并諱其源流直云周子之學莫知其師傳之所自亦所未喻蓋自儒佛兩家鬬諍不已彼徒往往援引名公列入宗派以自固最為無識可醜吾儒分別觀之宜取諸家燈史所載諸名公之與高僧往還者詳考事迹萃為一編各著所出其生平奉佛見於他書而無論説可入前數編者依時代先後并入此編若韓子之詢佛法大顛叩齒三下周子之問易理東林勸倡道學之類隨條辨正之蓋賢者學佛固多而不肖者亦不少不必以此為賢者諱亦不當以此為不肖寬前如張無盡之傾險後如李卓吾之狂悖並稱宗教兼通真是法門之玷佛法難做人情此編足為龜鑑焉以佛理入儒書蓋始於魏晉間今易論語注疏及皇侃義疏可證此亦所謂入而俱化不自覺知苟足發明雖聖人復起亦不責也佛書能所二字猶之儒書動靜字最為簡明以詮易理自然要言不煩必謂原本乾始能以美利利天下不言所利亦是強辨若朱子釋書能覺為道心所覺為人心亦可謂之原本易文言乎若李長者華嚴合論處處以八卦五行方位牽配則直有意藉此歆動儒者不特齊文定旨墮語滲漏矣夫儒佛兩家離之固不成二合之亦正非一明教嵩禪師稱其可以心通難以迹較洵為知言若從文字上牽引附會縱能密合亦是借重他家無益有損憨山之注莊子內篇蕅益之釋周易及四子書用心良苦而不知儒者早有讀華嚴八十卷不如讀艮卦一爻之誚此風沿流到今動稱三教同源著為邪説惑世誣民釀成亂本搜剔病根畢竟是急於求信之一念走作至此故不得不痛辨之頗望後賢永為炯戒三教之稱蓋創自北魏道士寇謙之故文中子亦有此二字不知道不成教所祖之老子不過九流之一漢書藝文志彰彰可考生平著述祇有道德經五千言不但與後世道士虗誕之説全然風馬牛且與莊列亦大相徑庭世俗所行常清靜經是唐時學禪者偽託文理字句全不類春秋時語極易辨別至靈寶等經皆是寇謙之鮑靜林靈素輩先後偽造全竊佛書之粗淺者甚至套襲句調昔人早痛辦之其源流之雜湊不一方維甸先生抱朴子序考論最詳并附録於後尤可笑者佛家諸呪其字多著口旁緣華書無其字祇能以數字合音代之著口旁者須讀作彈舌音之標記猶儒書之發音加圈耳并非其字有圈也乃道士偽造呪字亦多口旁試問老子與所稱元始天尊者外國人乎張天師一派本非道家乃周時巫祝之遺法能交鬼神秦漢之際失傳後為黃巾賊張角兄弟所得張道陵即張角之後裔其交鬼神之道還是古法後人不知恪守見世俗道士偽派盛行又互相比附如𥷳𥸞𥸛𥸟四字係明嘉靖間妖道所造今天師府亦用以為正法真堪絶倒方維甸抱朴子序道家宗旨清淨沖虗而已其弊或流為權謀或流為放誕無所謂金丹仙藥黃白元素吐納導引禁呪符籙之術也秦漢方士絶不附會老子即依託黃帝亦非道家之説漢書藝文志以黃帝諸篇分屬道家神仙蓋本七略七略又本於別録劉子政固誦習鴻寶篤信神仙者而典校祕書仍別方技於諸子之外不相殽也東漢之季桓帝好神仙祠老子張陵之子衡使人為祭酒主以老子五千文都習神仙之附會道家實昉於此抱朴子內篇古之神仙家言也雖自以內篇屬之道家然所舉仙經神符多至二百八十二種絶無道家諸子且謂老子泛論較略莊子文子關尹喜之徒祖述黃老永無至言去神仙千億里尋其旨趣與道家判然不同又後世學仙者奉魏伯陽為正宗是書偶及伯陽內篇之名並無一語稱述惟神仙傳中言參同契假爻象以説作丹之意而已是稚川之學匪特與道家異併與後世神仙家無幾微之合余嘗謂漢之仙術元與黃老分途魏晉之世元言日盛經術多岐道家自詭於儒神仙遂溷於道然第假借其名不易其實也逮及宋元乃緣參同爐火而言內丹鍊養陰陽混合元氣斥服食胎息為小道金石符呪為旁門黃白元素為邪術惟以性命交修為谷神不死羽化登真之訣其説旁涉禪宗兼附易理襲微重妙且欲併儒釋而一之自是而漢晉相傳神仙之説盡變無餘名實交溷矣然則葛氏之書墨守師傳不矜妙悟譬之儒者説經其神仙家之漢學乎孫伯淵漕司篤好古義兼綜九流以明抱朴子及天一閣鈔本錯亂脫誤手自校讎復屬余與顧澗薲各以家藏諸本參證他書覆校數過伯淵敘録篇目將以刊行余因舉神仙與道家者流古今分合之故論次為序覽者或有考焉凡教必有化被一方不變之儀式其所以能如此者前篇論之所謂空有二邊互形互顯人心物理皆同必不能廢儒佛兩家本斯立教故能獨立空有之外無第三件可説故道不成教試問道家化被何方其全藏經文雜出不一任意更改定制安在世俗不察以誤傳誤向見日本人所編內外一覽詳考五大洲中各國之教其中國下注云儒教佛教嗟乎堂堂中國千餘年來莫能決擇轉為海外小冷眼窺破可歎可愧佛教以發菩提心為初步涅槃為究竟涅槃者不生不滅之謂不生不滅者本自無生今亦不滅也故又借以為死之稱正所以證明常住真心死亦不滅也子張云君子曰終小人曰死吾今日其庶幾乎子貢曰大哉死乎君子息焉小人休焉可見常住真心不滅之説儒家謂之道心孔門亦然諸侯曰薨大夫曰卒士曰不祿德必稱位故皆不斥言死庶人則言死矣死者人之所必不免佛滅度時頭痛背痛右脅而臥經有明文世人徒見幻身之委化不見神明之常留千言萬語莫能開悟所以諸大弟子往往臨終示現瑞相而中國諸禪師亦每坐脫立亡以顯此常住不滅之説實有憑據利之所在弊即隨生後人專在此處著眼甚至垂危之際旁人強扶之坐盤屈其膝以顯異惑衆不知坐脫立亡外道邪定者亦能之是以佛門不貴石霜禪師早有坐脫立亡即不無先師意未夢見在之呵夫此際尚欲作意擺布更何事非作意擺布哉去道之遠何啻萬里吾孔子夢奠之讖記者明言寢疾曾子易簀之際亦稱反席未安後儒乃多以端坐而逝為美談蓋即此可見平日之定力非杜撰禪和作意擺布之比焉如來為一大事因緣出現於世一大事因緣者死生是也生必有死常事常理何為大事蓋生者欲之極死者惡之極蠢蠢凡愚莫不皆然故孟子云所欲有甚於生者所惡有甚於死者人皆有之賢者能弗喪耳充此欲惡之極可以無所不至理喻勢禁二者俱窮然雖欲之極而生終不可以苟得雖惡之極而死終不可以苟免亦萬億愚賤之所莫能奈何也至於莫能奈何而欲惡之心終不死然後常住真心本無生滅之理可以方便開示有本無生滅之理以順其欲惡然後可以閉塞惡門開通善道如來所謂張大教網入生死海漉人天魚置涅槃岸者手眼全在此際故曰一大事因緣又曰觀衆生機熟示現受生世人著眼大事二字忽略因緣二字遂以死生事大無常迅速語意依稀解會則是專為一己生死何所謂衆生機熟哉今人多言儒家但有入世法佛家兼有出世法古來若僧若俗通曉佛理者亦不免作此語不惟鄙淺且多誤人茲詳辨之惟入世法無出世法無量壽經反覆開示二千餘言不出三綱五常而總結以度世上天泥洹之道其證一遺教經佛臨涅槃略説法要二千餘言首以淨戒終以四諦而總結之以當勤精進早求解脫其證二金剛經以無我人衆生壽者修一切善法即得阿耨多羅三藐三菩提其證三法華經治世語言資生産業皆與實相不相違背其證四諸如此類不勝枚舉可知出世法即在入世法中換名不換體緣但就常住法身言之則本未嘗入何所謂出兼就一期報身言之則始終不能離世又安能出世哉侍者問鳥窩禪師如何是佛法大意師拈起布毛吹之白香山問佛法師答曰諸惡莫作衆善奉行有人問師前答怎地奇特後答三歲孩兒都説得師云三歲孩兒説得八十老人行不得可知不能入世者必不能出世其所謂出高則不過二乘下則竟是邪魔畢竟不出三界正我佛所深呵也佛法平等者乃物物本來平等今令各還本位故稱佛法平等譬如色有妍𡟎不到眼則已到則普見聲有清濁不入耳則已入則普聞此即眼耳之本來平等處並非不可揀擇實是不能揀擇乍見聞時自然妍還他妍𡟎還他𡟎清還他清濁還他濁此即物物之本來平等處並非不可安排實在無從安排人惟從不能揀擇無可安排中工夫打成一片親切證到是箇甚麼佛法盡在是矣不得將儒家廓然而大公物來而順應依稀解會近來一種邪魔誤解此二語又誤解金剛經是法平等無有高下二語男女混雜則曰平等無男女相善惡不分則曰平等無善惡相世法敗壞至此佛法從何建立安得大權菩薩現宰官身起而正之達摩答異見王問性云在眼曰見在耳曰聞在鼻嗅香在口談論在手執捉在足運奔遍現俱賅沙界收攝在一微塵識者知是佛性不識喚作精魂此數語宋儒誤解以為與告子以知覺運動為性同病正孟子所呵不知見聞等六者原是知覺運動其每句安一在字是何物耶明道先生云會得時自活潑潑地不會得只是弄精魂斯不誤矣近來宗徒逢人問著便擎拳豎掌説相似禪余嘗問如何是遍現俱賅沙界便舉手指眼前又問如何是收攝在一微塵便默坐良久余曰正好錯會假饒不錯也只是達磨底大德分上如何其人罔措反詰余曰不辭道破恐道了又只是我底與大德分上仍沒交涉固詰不已曰但道適來錯在何處余曰適來原不錯只消倒過來其人有省余後舉似許靈虗靈虗亦首肯余兩人都不會禪痛宗門之掃地并此不解因記其説於此俟諸方明眼檢點達磨在西竺為二十八祖在東土為初祖受二十七初祖般若多羅尊者之傳發明心要先在本國降化六宗一有相宗二無相宗三定慧宗四戒行宗五無得宗六寂靜宗後至中國見梁武帝機緣不合退入嵩山少室面壁枯坐九年罕與人接蓋為當時義學家執著文字講得口水漉漉地故以枯坐不語痛掃之據此可見達磨早證聖道故能降化六宗並非到中國後方學坐禪也世人誤解謂是九年枯坐面壁功成以訛傳訛外道邪師因此偽造達磨胎息歌如云一息便指氣氣歸臍一提便咽三家相見云云此楞嚴十種仙中之邪法大悖佛教達磨安得有此引誘男女教他結跏趺坐海底穴不得著運氣咽津種種邪法試問此類多在色身上打點如何可對婦女面談且莫論從此別生過犯即其誤信之根利者功夫逼緊現諸怪異為魔所攝而根鈍者至於積年呆坐不食不眠深山窮谷中往往有肌體衣服與土石黏連不分惟兩眼尚自閃爍者非鬼非人不死不活哀哉哀哉假饒如此成佛於己何益於世何補西來大法安能流傳到今普望明眼作家逢人開導世道隆汙法門興替關係均不小也代衆回向發願疏淨業弟子沈善登等同共發心不為自求世間福報祇以上年杭州般若庵僧妙然倡願摩崖大字阿彌陀經屬付弟子善登書寫今於本年二月十五日在江蘇吳縣聖恩寺延請住持僧中安依法結壇對佛長跽虔持穢迹金剛呪敬謹書寫字字頂禮並遵造像法式一一密安梵書𠶹哩字種冀此經法普放光明常住不壞閲三七日寫畢復如前法寫楞嚴大勢至菩薩圓通章留藏本寺荷蒙慈佑次第告成因竭愚忱依教演説淨土法門綱宗無量壽經綱宗往生正因定論五逆謗法不得往生説各一篇及二教通喻一篇辨正沿訛等雜説二十五則綜為報恩論二萬餘言清稿先具餘意未盡如勸俗醒迷等歌擬撤壇後續成以顯正教翊皇度息諍辨破邪外仰答慈恩萬分之一自發筆日始弟子胡雅澄張敬朱謙張德培等隨同念佛寺僧中安亦隨喜助念共歷五十三晝夜無間無雜於今四月初八日佛誕良辰一切圓滿剖瀝微忱願垂聽許伏念大法東流垂二千載歷代崇奉無踰本朝列聖宏揚佐成上理蓋惟聖知聖導俗無方以心合心同民出治本見仁而見知為與知而與能默寓勸懲曲談因果順幽明之一理開折攝之二門斯欲惡之與同自觀聽而不惑近自數十年來中外多故民病財殫治世資生上下交瘁至教因茲訛替魔説日以喧豗往歲兵災較然覆轍曾瘡痍之甫起昧萌蘖之有由凡我同倫鮮克遠覽或因噎而廢食甚吹毛以索癍執一家門戶之私言忘列聖提撕之深意龍藏未窺隻字狐疑已溢千端遂令學語淺夫效尤苦諍邪見外道抵隙生心樹黨售較誣民惑世法門既壞名教亦虧弟子等半解一知口衆我寡挽回路絶呼籲天高惟同體之大悲或積誠而冥感既幸宿霑法乳薄植信心忍坐視其淪胥負含靈之同具雖復障深慧淺業重福輕自度未能敢云普濟而力不自量心不自安願以五十三晝夜中書寫持誦毫末善根代為回向所冀他方此界男衆女流盡其畢生所積疑謗或囿於方俗或溺於見聞或借此以稱能或無知而誤會如是等衆下逮愚氓或輕聽邪師曾立惡誓或被牽魔侶誤入岐途或中悔而已遲或護前而不覺種種緣業種種罪愆若重若輕若故若誤若覆若露若憶若忘仗佛威神普與懺悔願從今日窮盡未來一切異見衆生早萌信種一切執迷魔外悉化正因同入願門同歸覺路同扶聖化同作良民弟子等今生多生宛愆業障承斯善利亦悉消除盡此報身同生安養仍回濁世廣度衆生統祈三寶證明哀憫攝受謹疏上聞光緒四年四月初八日寫經記聖清光緒三年丁丑般若庵僧妙然募刻此經明年戊寅二月佛涅槃日桐鄉沈善登結壇吳縣聖恩寺對佛長跽頂禮書寫筆墨到處以穢迹金剛呪攝持之并仿造像法式字字安𠶹里伊斯四合音字種閲三七日寫成復寫楞嚴大勢至圓通章表法門所自始留本寺別勒石既畢略述淨土大旨汛及儒佛異同為報恩論以顯正教翊聖化息諍辨破邪外餘二萬言海鹽胡雅澄張敬張德培海寧朱謙同會念佛輪轉五十三晝夜不絶聲住持僧中安隨喜助念至四月佛降生日一切圓滿其檀施為錢唐許息庵樾身並與中安及餘姚錢步高為外護壇內給事則甘泉強慶恩臨胊談心成例得并書閣筆謹記
